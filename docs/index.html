stAPI process.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"phase1-vs-phase2.md\" href=\"#\">phase1-vs-phase2.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-full-search-flow","text":"The full search flow"},{"level":2,"id":"faiss-only-knows-positions","text":"FAISS only knows positions"},{"level":2,"id":"persistence","text":"Persistence"}],"text":"how faiss search works — step by step 💡 tl;dr you hand faiss a query vector and k. it returns the k most similar vectors (by inner product) and their positions. you use positions to look up the actual chunk text. the full search flow 1. ragpipeline.query(\"how do black holes form?\") ↓ 2. retriever.retrieve(question, top_k=4) ↓ 3. embedder.encode([\"how do black holes form?\"]) → query_vec (384 floats) ↓ 4. faissvectorstore.search(query_vec, top_k=4) ↓ 5. faiss.indexflatip.search(query_vec.reshape(1,-1), k=4) → scores = [[0.8141, 0.6333, 0.5691, 0.5240]] → indices = [[0, 4, 1, 2 ]] ↓ 6. look up self._chunks[0], self._chunks[4], self._chunks[1], self._chunks[2] ↓ 7. return [searchresult(chunk=..., score=0.8141), ...] faiss only knows positions faiss stores vectors, not text. when it returns indices = [12, 3, 8, 15] , those are positions in the flat array. the faissvectorstore class maintains a parallel list self._chunks that maps position → chunk object: # docsmind/index/faiss_store.py def add( self , chunks: list [chunk], embeddings: np .ndarray) -> none : self ._index.add(embeddings) # faiss stores vectors self ._chunks.extend(chunks) # we store chunks, in the same order def search( self , query_embedding, top_k): scores, indices = self ._index.search(query, top_k) return [ searchresult(chunk= self ._chunks[idx], score= float (score)) for score, idx in zip (scores[ 0 ], indices[ 0 ]) if idx >= 0 # faiss pads with -1 if fewer than top_k results exist ] the idx >= 0 guard handles the edge case where the index has fewer than top_k vectors — faiss pads missing results with index -1 . persistence after building the index, it's saved to disk so it doesn't need to be rebuilt on every server restart: def save( self , path): faiss .write_index( self ._index, str (path / \"index.faiss\" )) # binary json.dump({ \"chunks\" : [...], \"dim\" : 384 , ...}, open (path / \"meta.json\" )) @classmethod def load(cls, path): store = cls.__new__(cls) store._index = faiss .read_index( str (path / \"index.faiss\" )) meta = json.load( open (path / \"meta.json\" )) store._chunks = [chunk(**c) for c in meta[ \"chunks\" ]] return store make ingest writes the index. make serve loads it. the loaded index is kept in memory for the lifetime of the fastapi process. → next: phase1-vs-phase2.md","words":358},{"path":"05-faiss/code-walkthrough.md","title":"Code Walkthrough","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"faiss-code-walkthrough-phase-1\">FAISS Code Walkthrough — Phase 1<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The <code>FaissVectorStore<\/code> class wraps FAISS and keeps a parallel list of chunks. FAISS handles the math; the class handles the mapping back to human-readable text.<\/div><\/div>\n<h2 id=\"the-full-class-annotated\">The full class, annotated<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/faiss_store.py<\/span>\n\n<span class=\"tok-keyword\">class<\/span> FaissVectorStore(VectorStore):\n\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, dim: <span class=\"tok-builtin\">int<\/span>, index_type: <span class=\"tok-builtin\">str<\/span> = <span class=\"tok-string\">\"flat\"<\/span>) -&gt; <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">self<\/span>.dim = dim                          <span class=\"tok-comment\"># 384 for bge-small<\/span>\n        <span class=\"tok-keyword\">self<\/span>._index_type = index_type\n        <span class=\"tok-keyword\">self<\/span>._index = <span class=\"tok-builtin\">faiss<\/span>.IndexFlatIP(dim)   <span class=\"tok-comment\"># the FAISS index (math layer)<\/span>\n        <span class=\"tok-keyword\">self<\/span>._chunks: <span class=\"tok-builtin\">list<\/span>[Chunk] = []         <span class=\"tok-comment\"># parallel list (text layer)<\/span>\n\n    <span class=\"tok-keyword\">def<\/span> add(<span class=\"tok-keyword\">self<\/span>, chunks: <span class=\"tok-builtin\">list<\/span>[Chunk], embeddings: <span class=\"tok-builtin\">np<\/span>.ndarray) -&gt; <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-comment\"># embeddings shape: (N, 384)  N = number of chunks<\/span>\n        <span class=\"tok-keyword\">self<\/span>._index.add(                       <span class=\"tok-comment\"># give vectors to FAISS<\/span>\n            <span class=\"tok-builtin\">np<\/span>.ascontiguousarray(embeddings, dtype=<span class=\"tok-builtin\">np<\/span>.float32)\n        )\n        <span class=\"tok-keyword\">self<\/span>._chunks.extend(chunks)            <span class=\"tok-comment\"># remember the chunks in order<\/span>\n        <span class=\"tok-comment\"># Now: self._chunks[i] ↔ FAISS position i  (always in sync)<\/span>\n\n    <span class=\"tok-keyword\">def<\/span> search(<span class=\"tok-keyword\">self<\/span>, query_embedding: <span class=\"tok-builtin\">np<\/span>.ndarray, top_k: <span class=\"tok-builtin\">int<\/span>) -&gt; <span class=\"tok-builtin\">list<\/span>[SearchResult]:\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">self<\/span>.size == <span class=\"tok-number\">0<\/span>:\n            <span class=\"tok-keyword\">return<\/span> []                           <span class=\"tok-comment\"># can't search an empty index<\/span>\n\n        query = query_embedding.reshape(<span class=\"tok-number\">1<\/span>, -<span class=\"tok-number\">1<\/span>)  <span class=\"tok-comment\"># FAISS expects shape (1, 384)<\/span>\n        scores, indices = <span class=\"tok-keyword\">self<\/span>._index.search(   <span class=\"tok-comment\"># the actual search<\/span>\n            query, <span class=\"tok-builtin\">min<\/span>(top_k, <span class=\"tok-keyword\">self<\/span>.size)        <span class=\"tok-comment\"># can't ask for more than we have<\/span>\n        )\n\n        results = []\n        <span class=\"tok-keyword\">for<\/span> score, idx <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">zip<\/span>(scores[<span class=\"tok-number\">0<\/span>], indices[<span class=\"tok-number\">0<\/span>]):\n            <span class=\"tok-keyword\">if<\/span> idx &lt; <span class=\"tok-number\">0<\/span>:                         <span class=\"tok-comment\"># FAISS pads with -1 if &lt; top_k results<\/span>\n                <span class=\"tok-keyword\">continue<\/span>\n            results.append(\n                SearchResult(chunk=<span class=\"tok-keyword\">self<\/span>._chunks[idx], score=<span class=\"tok-builtin\">float<\/span>(score))\n            )\n        <span class=\"tok-keyword\">return<\/span> results\n\n    <span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>, path: Path) -&gt; <span class=\"tok-keyword\">None<\/span>:\n        path.mkdir(parents=<span class=\"tok-keyword\">True<\/span>, exist_ok=<span class=\"tok-keyword\">True<\/span>)\n        <span class=\"tok-builtin\">faiss<\/span>.write_index(<span class=\"tok-keyword\">self<\/span>._index, <span class=\"tok-builtin\">str<\/span>(path / <span class=\"tok-string\">\"index.faiss\"<\/span>))  <span class=\"tok-comment\"># binary file<\/span>\n        meta = {\n            <span class=\"tok-string\">\"dim\"<\/span>: <span class=\"tok-keyword\">self<\/span>.dim,\n            <span class=\"tok-string\">\"index_type\"<\/span>: <span class=\"tok-keyword\">self<\/span>._index_type,\n            <span class=\"tok-string\">\"chunks\"<\/span>: [c.model_dump() <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> <span class=\"tok-keyword\">self<\/span>._chunks],      <span class=\"tok-comment\"># JSON<\/span>\n        }\n        (path / <span class=\"tok-string\">\"meta.json\"<\/span>).write_text(json.dumps(meta))\n\n    <span class=\"tok-decorator\">@classmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> load(cls, path: Path) -&gt; <span class=\"tok-string\">\"FaissVectorStore\"<\/span>:\n        meta = json.loads((path / <span class=\"tok-string\">\"meta.json\"<\/span>).read_text())\n        store = cls(dim=meta[<span class=\"tok-string\">\"dim\"<\/span>], index_type=meta[<span class=\"tok-string\">\"index_type\"<\/span>])\n        store._index = <span class=\"tok-builtin\">faiss<\/span>.read_index(<span class=\"tok-builtin\">str<\/span>(path / <span class=\"tok-string\">\"index.faiss\"<\/span>))\n        store._chunks = [Chunk(**c) <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> meta[<span class=\"tok-string\">\"chunks\"<\/span>]]\n        <span class=\"tok-keyword\">return<\/span> store\n\n    <span class=\"tok-decorator\">@property<\/span>\n    <span class=\"tok-keyword\">def<\/span> size(<span class=\"tok-keyword\">self<\/span>) -&gt; <span class=\"tok-builtin\">int<\/span>:\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-keyword\">self<\/span>._index.ntotal)          <span class=\"tok-comment\"># how many vectors are stored<\/span><\/code><\/pre>\n<h2 id=\"the-key-design-pluggable-interface\">The key design: pluggable interface<\/h2>\n<p><code>FaissVectorStore<\/code> implements the abstract <code>VectorStore<\/code> base class (<code class=\"srcref\" title=\"source file in the repo\">base.py<\/code>):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> VectorStore(ABC):\n    <span class=\"tok-decorator\">@abstractmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> add(<span class=\"tok-keyword\">self<\/span>, chunks, embeddings): ...\n    <span class=\"tok-decorator\">@abstractmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> search(<span class=\"tok-keyword\">self<\/span>, query_embedding, top_k): ...\n    <span class=\"tok-decorator\">@abstractmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>, path): ...<\/code><\/pre>\n<p>Phase 2's Qdrant backend will implement the same interface. The <code>Retriever<\/code> class doesn't know or care whether it's talking to FAISS or Qdrant — it just calls <code>.search()<\/code>. That's the abstraction working.<\/p>\n<h2 id=\"whats-stored-where\">What's stored where<\/h2>\n<pre><code>data/index/\n  ├── index.faiss    ← Binary. Contains the 50 float32 vectors (FAISS format).\n  │                     ~75 KB for 50 chunks × 384 dims × 4 bytes\n  └── meta.json      ← JSON. Contains dim, index_type, and the full\n                        list of Chunk objects (id, text, source, metadata).<\/code><\/pre>\n<p>When the FastAPI server starts, <code>build_pipeline()<\/code> calls <code>FaissVectorStore.load()<\/code> which reads both files and reconstructs the in-memory index. Queries then run entirely in memory — no disk I/O per query.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../06-generation/README.md\" href=\"#\">06-generation/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-full-class-annotated","text":"The full class, annotated"},{"level":2,"id":"the-key-design-pluggable-interface","text":"The key design: pluggable interface"},{"level":2,"id":"whats-stored-where","text":"What's stored where"}],"text":"faiss code walkthrough — phase 1 💡 tl;dr the faissvectorstore class wraps faiss and keeps a parallel list of chunks. faiss handles the math; the class handles the mapping back to human-readable text. the full class, annotated # docsmind/index/faiss_store.py class faissvectorstore(vectorstore): def __init__( self , dim: int , index_type: str = \"flat\" ) -> none : self .dim = dim # 384 for bge-small self ._index_type = index_type self ._index = faiss .indexflatip(dim) # the faiss index (math layer) self ._chunks: list [chunk] = [] # parallel list (text layer) def add( self , chunks: list [chunk], embeddings: np .ndarray) -> none : # embeddings shape: (n, 384) n = number of chunks self ._index.add( # give vectors to faiss np .ascontiguousarray(embeddings, dtype= np .float32) ) self ._chunks.extend(chunks) # remember the chunks in order # now: self._chunks[i] ↔ faiss position i (always in sync) def search( self , query_embedding: np .ndarray, top_k: int ) -> list [searchresult]: if self .size == 0 : return [] # can't search an empty index query = query_embedding.reshape( 1 , - 1 ) # faiss expects shape (1, 384) scores, indices = self ._index.search( # the actual search query, min (top_k, self .size) # can't ask for more than we have ) results = [] for score, idx in zip (scores[ 0 ], indices[ 0 ]): if idx < 0 : # faiss pads with -1 if < top_k results continue results.append( searchresult(chunk= self ._chunks[idx], score= float (score)) ) return results def save( self , path: path) -> none : path.mkdir(parents= true , exist_ok= true ) faiss .write_index( self ._index, str (path / \"index.faiss\" )) # binary file meta = { \"dim\" : self .dim, \"index_type\" : self ._index_type, \"chunks\" : [c.model_dump() for c in self ._chunks], # json } (path / \"meta.json\" ).write_text(json.dumps(meta)) @classmethod def load(cls, path: path) -> \"faissvectorstore\" : meta = json.loads((path / \"meta.json\" ).read_text()) store = cls(dim=meta[ \"dim\" ], index_type=meta[ \"index_type\" ]) store._index = faiss .read_index( str (path / \"index.faiss\" )) store._chunks = [chunk(**c) for c in meta[ \"chunks\" ]] return store @property def size( self ) -> int : return int ( self ._index.ntotal) # how many vectors are stored the key design: pluggable interface faissvectorstore implements the abstract vectorstore base class ( base.py ): class vectorstore(abc): @abstractmethod def add( self , chunks, embeddings): ... @abstractmethod def search( self , query_embedding, top_k): ... @abstractmethod def save( self , path): ... phase 2's qdrant backend will implement the same interface. the retriever class doesn't know or care whether it's talking to faiss or qdrant — it just calls .search() . that's the abstraction working. what's stored where data/index/ ├── index.faiss ← binary. contains the 50 float32 vectors (faiss format). │ ~75 kb for 50 chunks × 384 dims × 4 bytes └── meta.json ← json. contains dim, index_type, and the full list of chunk objects (id, text, source, metadata). when the fastapi server starts, build_pipeline() calls faissvectorstore.load() which reads both files and reconstructs the in-memory index. queries then run entirely in memory — no disk i/o per query. → back to: readme.md → next topic: 06-generation/readme.md","words":516},{"path":"05-faiss/benchmark-results.md","title":"Benchmark Results","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"benchmark-results-flat-vs-ivf-vs-hnsw-vs-ivfpq-real-numbers\">Benchmark Results — Flat vs IVF vs HNSW vs IVFPQ (real numbers)<\/h1>\n<p><strong>Where in the pipeline:<\/strong> this is the <strong>Index<\/strong> stage (build time) and the <strong>Search<\/strong> stage (query latency + recall). Nothing else in the pipeline moves. Phase 1 hard-wired <code>flat<\/code> here; Phase 2 makes the index type a config dial and measures what each choice costs you.<\/p>\n<pre><code>Ingest → Chunk → Embed → [ INDEX ]      ← build time, memory\nQuery  → Embed → [ SEARCH ] → Generate  ← latency, recall@k\n                     ▲\n            flat | ivf | hnsw | ivfpq   ← the only thing that changes<\/code><\/pre>\n<p>The previous doc (<a class=\"mdlink\" data-href=\"phase1-vs-phase2.md\" href=\"#\">phase1-vs-phase2.md<\/a>) gave the <em>theory<\/em>. This one runs <code>scripts/benchmark.py<\/code> and reports what actually happened.<\/p>\n<h2 id=\"why-synthetic-data-and-why-clustered\">Why synthetic data (and why clustered)<\/h2>\n<p>Our real corpus is ~15 chunks. Approximate indexes need <em>thousands<\/em> of vectors before their tradeoff even appears — and IVF/IVFPQ can't train on 15 points. So the benchmark generates synthetic unit vectors instead.<\/p>\n<p>But not <em>random<\/em> vectors. In 384 dimensions, uniform-random points are nearly all equidistant (the \"curse of dimensionality\") — there are no neighborhoods, so every approximate index scores terribly and the numbers lie. Real embeddings <strong>cluster<\/strong> (similar text → nearby vectors). So the benchmark builds clustered vectors, which behave like the embeddings your pipeline actually produces.<\/p>\n<p><code>flat<\/code> is the ground truth: its exact top-k <em>is<\/em> the correct answer. Every other index is graded on how much of flat's top-k it recovers.<\/p>\n<h2 id=\"the-headline-run-50000-vectors-dim-384-top_k10\">The headline run — 50,000 vectors, dim 384, top_k=10<\/h2>\n<pre><code>index     recall@k    p50 ms    p95 ms   build ms   mem MB   mem x\n------------------------------------------------------------------\nflat         1.000     0.775     0.885          5     76.8    1.00\nivf          0.900     0.104     0.134         71     77.4    1.01\nhnsw         0.862     0.404     0.496      10658     90.4    1.18\nivfpq        0.332     0.086     0.096       1750      3.3    0.04<\/code><\/pre>\n<p>Read it as <strong>what you pay and what you get<\/strong>:<\/p>\n<ul><li><strong>flat<\/strong> — perfect recall, but it scans all 50k vectors every query. Zero<\/li><\/ul>\n<p>build cost, zero training. The baseline you grade everyone against.<\/p>\n<ul><li><strong>ivf<\/strong> — 90% recall for <strong>7× faster<\/strong> queries (0.10 vs 0.78 ms) and almost no<\/li><\/ul>\n<p>extra memory. It clustered the vectors once (71 ms) and now probes only 8 of   100 cells per query. Best all-round trade here.<\/p>\n<ul><li><strong>hnsw<\/strong> — 86% recall, ~2× faster than flat, but <strong>18% more memory<\/strong> (it stores<\/li><\/ul>\n<p>a graph on top of the vectors) and a <strong>brutal 10.7 s build<\/strong>. The graph is   what you pay up front to get fast walks later.<\/p>\n<ul><li><strong>ivfpq<\/strong> — <strong>25× smaller<\/strong> (3.3 MB vs 76.8 MB) by compressing each vector to a<\/li><\/ul>\n<p>short code. The price is recall: 33%. It's a memory play, not an accuracy play   — you'd use it at billion-scale and re-rank survivors with exact vectors.<\/p>\n<h2 id=\"the-whole-point-flat-scales-on-approximate-doesnt\">The whole point — flat scales O(N), approximate doesn't<\/h2>\n<p>Same benchmark at <strong>500,000 vectors<\/strong> (10× the data):<\/p>\n<pre><code>              p50 latency\nindex       50k  →  500k\n-----------------------------\nflat       0.78  →  7.22 ms     10× data = 10× slower   (linear scan)\nivf        0.10  →  0.95 ms     stays ~1 ms             (probes a fixed slice)<\/code><\/pre>\n<p>That single comparison is the reason approximate indexes exist. Flat's cost grows with the corpus; IVF's barely moves. At 50k, flat's 0.78 ms is fine — <strong>you would not bother switching.<\/strong> At millions, flat's tens of milliseconds per query is the bottleneck, and IVF/HNSW earn their complexity.<\/p>\n<h2 id=\"the-gotcha-parameters-must-scale-with-n\">The gotcha — parameters must scale with N<\/h2>\n<p>At 500k, IVF's recall <em>dropped<\/em> to ~0.23 with the same settings. Why? <code>nlist<\/code> auto-scaled to ~1000 cells, but <code>nprobe<\/code> stayed at 8 — so we searched only <strong>8 of 1000<\/strong> cells instead of 8 of 100. The fix is to raise <code>nprobe<\/code> (and HNSW's <code>efSearch<\/code>) as the corpus grows. The dials:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Dial<\/th><th>Index<\/th><th>Turn up →<\/th><th>Turn down →<\/th><\/tr><\/thead><tbody><tr><td><code>nprobe<\/code><\/td><td>ivf, ivfpq<\/td><td>better recall, slower<\/td><td>faster, lower recall<\/td><\/tr><tr><td><code>efSearch<\/code><\/td><td>hnsw<\/td><td>better recall, slower<\/td><td>faster, lower recall<\/td><\/tr><tr><td><code>nlist<\/code><\/td><td>ivf, ivfpq<\/td><td>finer cells (needs higher nprobe)<\/td><td>coarser cells<\/td><\/tr><tr><td><code>hnsw_m<\/code><\/td><td>hnsw<\/td><td>better recall, more memory<\/td><td>less memory<\/td><\/tr><\/tbody><\/table><\/div>\n<p>These live in <code class=\"srcref\" title=\"source file in the repo\">config.py<\/code> (<code>ivf_nprobe<\/code>, <code>hnsw_ef_search<\/code>, …) so you tune them without touching code.<\/p>\n<h2 id=\"what-this-means-for-docsmind\">What this means for DocsMind<\/h2>\n<p>The real pipeline <strong>stays on <code>flat<\/code><\/strong> — correct, simplest, and instant for a small corpus. Phase 2's deliverable isn't a switch; it's the <em>evidence<\/em> that tells you exactly when to switch and what each option costs. That's the interview answer: not \"HNSW is fast,\" but \"at 50k flat was 0.78 ms so I kept it; the benchmark shows IVF wins ~100k+ at 90% recall for 7× the speed.\"<\/p>\n<h2 id=\"run-it-yourself\">Run it yourself<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">make<\/span> benchmark                          <span class=\"tok-comment\"># 50k vectors<\/span>\n<span class=\"tok-command\">python<\/span> <span class=\"tok-flag\">-m<\/span> scripts.benchmark <span class=\"tok-flag\">--n<\/span> <span class=\"tok-number\">500000<\/span>  <span class=\"tok-comment\"># bigger, shows flat's O(N) climb<\/span><\/code><\/pre>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"phase1-vs-phase2.md\" href=\"#\">phase1-vs-phase2.md<\/a><\/strong> → Code: <strong><code class=\"srcref\" title=\"source file in the repo\">scripts/benchmark.py<\/code><\/strong> · <strong><code class=\"srcref\" title=\"source file in the repo\">faiss_store.py<\/code><\/strong><\/p>","toc":[{"level":2,"id":"why-synthetic-data-and-why-clustered","text":"Why synthetic data (and why clustered)"},{"level":2,"id":"the-headline-run-50000-vectors-dim-384-top_k10","text":"The headline run — 50,000 vectors, dim 384, top_k=10"},{"level":2,"id":"the-whole-point-flat-scales-on-approximate-doesnt","text":"The whole point — flat scales O(N), approximate doesn't"},{"level":2,"id":"the-gotcha-parameters-must-scale-with-n","text":"The gotcha — parameters must scale with N"},{"level":2,"id":"what-this-means-for-docsmind","text":"What this means for DocsMind"},{"level":2,"id":"run-it-yourself","text":"Run it yourself"}],"text":"benchmark results — flat vs ivf vs hnsw vs ivfpq (real numbers) where in the pipeline: this is the index stage (build time) and the search stage (query latency + recall). nothing else in the pipeline moves. phase 1 hard-wired flat here; phase 2 makes the index type a config dial and measures what each choice costs you. ingest → chunk → embed → [ index ] ← build time, memory query → embed → [ search ] → generate ← latency, recall@k ▲ flat | ivf | hnsw | ivfpq ← the only thing that changes the previous doc ( phase1-vs-phase2.md ) gave the theory . this one runs scripts/benchmark.py and reports what actually happened. why synthetic data (and why clustered) our real corpus is ~15 chunks. approximate indexes need thousands of vectors before their tradeoff even appears — and ivf/ivfpq can't train on 15 points. so the benchmark generates synthetic unit vectors instead. but not random vectors. in 384 dimensions, uniform-random points are nearly all equidistant (the \"curse of dimensionality\") — there are no neighborhoods, so every approximate index scores terribly and the numbers lie. real embeddings cluster (similar text → nearby vectors). so the benchmark builds clustered vectors, which behave like the embeddings your pipeline actually produces. flat is the ground truth: its exact top-k is the correct answer. every other index is graded on how much of flat's top-k it recovers. the headline run — 50,000 vectors, dim 384, top_k=10 index recall@k p50 ms p95 ms build ms mem mb mem x ------------------------------------------------------------------ flat 1.000 0.775 0.885 5 76.8 1.00 ivf 0.900 0.104 0.134 71 77.4 1.01 hnsw 0.862 0.404 0.496 10658 90.4 1.18 ivfpq 0.332 0.086 0.096 1750 3.3 0.04 read it as what you pay and what you get : flat — perfect recall, but it scans all 50k vectors every query. zero build cost, zero training. the baseline you grade everyone against. ivf — 90% recall for 7× faster queries (0.10 vs 0.78 ms) and almost no extra memory. it clustered the vectors once (71 ms) and now probes only 8 of 100 cells per query. best all-round trade here. hnsw — 86% recall, ~2× faster than flat, but 18% more memory (it stores a graph on top of the vectors) and a brutal 10.7 s build . the graph is what you pay up front to get fast walks later. ivfpq — 25× smaller (3.3 mb vs 76.8 mb) by compressing each vector to a short code. the price is recall: 33%. it's a memory play, not an accuracy play — you'd use it at billion-scale and re-rank survivors with exact vectors. the whole point — flat scales o(n), approximate doesn't same benchmark at 500,000 vectors (10× the data): p50 latency index 50k → 500k ----------------------------- flat 0.78 → 7.22 ms 10× data = 10× slower (linear scan) ivf 0.10 → 0.95 ms stays ~1 ms (probes a fixed slice) that single comparison is the reason approximate indexes exist. flat's cost grows with the corpus; ivf's barely moves. at 50k, flat's 0.78 ms is fine — you would not bother switching. at millions, flat's tens of milliseconds per query is the bottleneck, and ivf/hnsw earn their complexity. the gotcha — parameters must scale with n at 500k, ivf's recall dropped to ~0.23 with the same settings. why? nlist auto-scaled to ~1000 cells, but nprobe stayed at 8 — so we searched only 8 of 1000 cells instead of 8 of 100. the fix is to raise nprobe (and hnsw's efsearch ) as the corpus grows. the dials: dial index turn up → turn down → nprobe ivf, ivfpq better recall, slower faster, lower recall efsearch hnsw better recall, slower faster, lower recall nlist ivf, ivfpq finer cells (needs higher nprobe) coarser cells hnsw_m hnsw better recall, more memory less memory these live in config.py ( ivf_nprobe , hnsw_ef_search , …) so you tune them without touching code. what this means for docsmind the real pipeline stays on flat — correct, simplest, and instant for a small corpus. phase 2's deliverable isn't a switch; it's the evidence that tells you exactly when to switch and what each option costs. that's the interview answer: not \"hnsw is fast,\" but \"at 50k flat was 0.78 ms so i kept it; the benchmark shows ivf wins ~100k+ at 90% recall for 7× the speed.\" run it yourself make benchmark # 50k vectors python -m scripts.benchmark --n 500000 # bigger, shows flat's o(n) climb → back to: phase1-vs-phase2.md → code: scripts/benchmark.py · faiss_store.py","words":756},{"path":"05-faiss/phase1-vs-phase2.md","title":"Flat vs IVF vs HNSW vs PQ","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"flat-vs-ivf-vs-hnsw-vs-pq-the-full-comparison\">Flat vs IVF vs HNSW vs PQ — The Full Comparison<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Four index types, four different tradeoffs between speed, memory, recall, and complexity. Phase 1 uses Flat. Phase 2 benchmarks the rest.<\/div><\/div>\n<h2 id=\"the-four-index-types\">The four index types<\/h2>\n<h3 id=\"1-indexflatip-phase-1\">1. IndexFlatIP (Phase 1)<\/h3>\n<ul><li><strong>How:<\/strong> Stores all vectors. Compares query to every single one.<\/li><li><strong>Recall:<\/strong> 100% — exact, no approximation<\/li><li><strong>Speed:<\/strong> O(N) — gets slower as N grows linearly<\/li><li><strong>Memory:<\/strong> N × 384 × 4 bytes (raw float32 vectors)<\/li><li><strong>Training:<\/strong> None<\/li><li><strong>Good for:<\/strong> Small corpora, ground-truth benchmarking<\/li><\/ul>\n<pre><code>Query ──→ [compare to all N vectors] ──→ top-k<\/code><\/pre>\n<h3 id=\"2-indexivf-inverted-file\">2. IndexIVF (Inverted File)<\/h3>\n<ul><li><strong>How:<\/strong> Clusters vectors into <code>nlist<\/code> groups using k-means at build time.<\/li><\/ul>\n<p>At query time, only searches the <code>nprobe<\/code> closest groups.<\/p>\n<ul><li><strong>Recall:<\/strong> ~90–99% (depending on <code>nprobe<\/code>)<\/li><li><strong>Speed:<\/strong> Much faster than Flat at large N — only searches a fraction of vectors<\/li><li><strong>Memory:<\/strong> Similar to Flat (stores raw vectors + cluster assignments)<\/li><li><strong>Training:<\/strong> Requires running k-means on a representative sample first<\/li><li><strong>Good for:<\/strong> 100k–10M vectors where exact search is too slow<\/li><\/ul>\n<pre><code>Build: cluster all vectors into groups (k-means)\nQuery ──→ [find closest nprobe groups] ──→ [compare to those vectors only] ──→ top-k<\/code><\/pre>\n<h3 id=\"3-indexhnsw-hierarchical-navigable-small-world\">3. IndexHNSW (Hierarchical Navigable Small World)<\/h3>\n<ul><li><strong>How:<\/strong> Builds a multi-layer graph at ingest time. At query time, starts<\/li><\/ul>\n<p>at the top layer and navigates greedily to the closest nodes.<\/p>\n<ul><li><strong>Recall:<\/strong> ~95–99% with good parameters<\/li><li><strong>Speed:<\/strong> Very fast — milliseconds even at millions of vectors<\/li><li><strong>Memory:<\/strong> Higher than Flat — stores graph edges in addition to vectors<\/li><\/ul>\n<p>(~1.5–2× more memory)<\/p>\n<ul><li><strong>Training:<\/strong> None — graph is built incrementally as vectors are added<\/li><li><strong>Good for:<\/strong> Up to ~5–10M vectors in RAM where latency is critical<\/li><\/ul>\n<pre><code>Build: link each vector to its M nearest neighbors at each layer\nQuery ──→ [start at top layer, greedy graph walk] ──→ top-k (approximate)<\/code><\/pre>\n<p>Key parameters:<\/p>\n<ul><li><code>M<\/code> — number of edges per node (higher = better recall, more memory)<\/li><li><code>efSearch<\/code> — search breadth (higher = better recall, slower)<\/li><\/ul>\n<h3 id=\"4-indexpq-indexivfpq-product-quantization\">4. IndexPQ / IndexIVFPQ (Product Quantization)<\/h3>\n<ul><li><strong>How:<\/strong> Compresses each vector by splitting it into sub-vectors and<\/li><\/ul>\n<p>replacing each with a code (quantization). Stores codes instead of raw floats.<\/p>\n<ul><li><strong>Recall:<\/strong> Lower than other methods — lossy compression<\/li><li><strong>Speed:<\/strong> Fast — smaller data fits in CPU cache better<\/li><li><strong>Memory:<\/strong> Dramatically lower — can be 8–32× smaller than raw vectors<\/li><li><strong>Training:<\/strong> Requires training the quantizer<\/li><li><strong>Good for:<\/strong> Billion-scale corpora where you can't fit raw vectors in RAM<\/li><\/ul>\n<pre><code>Compress: [0.267, 0.535, 0.802, ..., (384 floats)] → [42, 17, 8] (3 codes)\nQuery ──→ [compare codes, not full floats] ──→ top-k (approximate, lossy)<\/code><\/pre>\n<hr>\n<h2 id=\"side-by-side-comparison\">Side-by-side comparison<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Index<\/th><th>Recall<\/th><th>Speed at 1M<\/th><th>Memory<\/th><th>Training<\/th><th>Best for<\/th><\/tr><\/thead><tbody><tr><td><strong>Flat<\/strong><\/td><td>100%<\/td><td>Slow (~100ms)<\/td><td>1×<\/td><td>None<\/td><td>&lt; 100k, baseline<\/td><\/tr><tr><td><strong>IVF<\/strong><\/td><td>~95%<\/td><td>Fast (~5ms)<\/td><td>1×<\/td><td>Yes<\/td><td>100k–10M<\/td><\/tr><tr><td><strong>HNSW<\/strong><\/td><td>~98%<\/td><td>Very fast (~1ms)<\/td><td>1.5–2×<\/td><td>None<\/td><td>&lt; 10M, low latency<\/td><\/tr><tr><td><strong>IVFPQ<\/strong><\/td><td>~85%<\/td><td>Very fast (~1ms)<\/td><td>0.03–0.1×<\/td><td>Yes<\/td><td>Billions, memory-limited<\/td><\/tr><\/tbody><\/table><\/div>\n<hr>\n<h2 id=\"what-phase-2-will-do\">What Phase 2 will do<\/h2>\n<p>Run all four on the same corpus and measure:<\/p>\n<ul><li>Recall@k (did we find the true top-k?)<\/li><li>Query latency (ms per query)<\/li><li>Index build time<\/li><li>Memory usage<\/li><\/ul>\n<p>Then decide which index type to use based on those numbers — not theory. That's the \"benchmark notebook\" deliverable of Phase 2.<\/p>\n<p><strong>✅ Done.<\/strong> The benchmark is built (<code>scripts/benchmark.py<\/code>) and the real measured numbers — recall@k, latency, build time, and memory for all four index types at 50k and 500k vectors — are in <strong><a class=\"mdlink\" data-href=\"benchmark-results.md\" href=\"#\">benchmark-results.md<\/a><\/strong>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"benchmark-results.md\" href=\"#\">benchmark-results.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-four-index-types","text":"The four index types"},{"level":3,"id":"1-indexflatip-phase-1","text":"1. IndexFlatIP (Phase 1)"},{"level":3,"id":"2-indexivf-inverted-file","text":"2. IndexIVF (Inverted File)"},{"level":3,"id":"3-indexhnsw-hierarchical-navigable-small-world","text":"3. IndexHNSW (Hierarchical Navigable Small World)"},{"level":3,"id":"4-indexpq-indexivfpq-product-quantization","text":"4. IndexPQ / IndexIVFPQ (Product Quantization)"},{"level":2,"id":"side-by-side-comparison","text":"Side-by-side comparison"},{"level":2,"id":"what-phase-2-will-do","text":"What Phase 2 will do"}],"text":"flat vs ivf vs hnsw vs pq — the full comparison 💡 tl;dr four index types, four different tradeoffs between speed, memory, recall, and complexity. phase 1 uses flat. phase 2 benchmarks the rest. the four index types 1. indexflatip (phase 1) how: stores all vectors. compares query to every single one. recall: 100% — exact, no approximation speed: o(n) — gets slower as n grows linearly memory: n × 384 × 4 bytes (raw float32 vectors) training: none good for: small corpora, ground-truth benchmarking query ──→ [compare to all n vectors] ──→ top-k 2. indexivf (inverted file) how: clusters vectors into nlist groups using k-means at build time. at query time, only searches the nprobe closest groups. recall: ~90–99% (depending on nprobe ) speed: much faster than flat at large n — only searches a fraction of vectors memory: similar to flat (stores raw vectors + cluster assignments) training: requires running k-means on a representative sample first good for: 100k–10m vectors where exact search is too slow build: cluster all vectors into groups (k-means) query ──→ [find closest nprobe groups] ──→ [compare to those vectors only] ──→ top-k 3. indexhnsw (hierarchical navigable small world) how: builds a multi-layer graph at ingest time. at query time, starts at the top layer and navigates greedily to the closest nodes. recall: ~95–99% with good parameters speed: very fast — milliseconds even at millions of vectors memory: higher than flat — stores graph edges in addition to vectors (~1.5–2× more memory) training: none — graph is built incrementally as vectors are added good for: up to ~5–10m vectors in ram where latency is critical build: link each vector to its m nearest neighbors at each layer query ──→ [start at top layer, greedy graph walk] ──→ top-k (approximate) key parameters: m — number of edges per node (higher = better recall, more memory) efsearch — search breadth (higher = better recall, slower) 4. indexpq / indexivfpq (product quantization) how: compresses each vector by splitting it into sub-vectors and replacing each with a code (quantization). stores codes instead of raw floats. recall: lower than other methods — lossy compression speed: fast — smaller data fits in cpu cache better memory: dramatically lower — can be 8–32× smaller than raw vectors training: requires training the quantizer good for: billion-scale corpora where you can't fit raw vectors in ram compress: [0.267, 0.535, 0.802, ..., (384 floats)] → [42, 17, 8] (3 codes) query ──→ [compare codes, not full floats] ──→ top-k (approximate, lossy) side-by-side comparison index recall speed at 1m memory training best for flat 100% slow (~100ms) 1× none < 100k, baseline ivf ~95% fast (~5ms) 1× yes 100k–10m hnsw ~98% very fast (~1ms) 1.5–2× none < 10m, low latency ivfpq ~85% very fast (~1ms) 0.03–0.1× yes billions, memory-limited what phase 2 will do run all four on the same corpus and measure: recall@k (did we find the true top-k?) query latency (ms per query) index build time memory usage then decide which index type to use based on those numbers — not theory. that's the \"benchmark notebook\" deliverable of phase 2. ✅ done. the benchmark is built ( scripts/benchmark.py ) and the real measured numbers — recall@k, latency, build time, and memory for all four index types at 50k and 500k vectors — are in benchmark-results.md . → next: benchmark-results.md","words":556},{"path":"06-generation/README.md","title":"Overview","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"06-generation\">06 — Generation<\/h1>\n<p><strong>The big idea:<\/strong> After FAISS returns the top-k chunks, the pipeline turns them into a grounded answer. It formats the chunks as numbered passages, sends them to Claude with a strict system prompt, parses the citations from the response, and checks whether the answer is grounded or not.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"building-context.md\" href=\"#\">building-context.md<\/a><\/td><td>How chunks become numbered <code>[1][2][3]<\/code> passages<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"system-prompt.md\" href=\"#\">system-prompt.md<\/a><\/td><td>Why the prompt is designed the way it is<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"claude-generates.md\" href=\"#\">claude-generates.md<\/a><\/td><td>What Claude does with the context<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"citation-extraction.md\" href=\"#\">citation-extraction.md<\/a><\/td><td>How <code>[n]<\/code> markers are parsed and mapped back to source files<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"guardrail.md\" href=\"#\">guardrail.md<\/a><\/td><td><code>INSUFFICIENT_CONTEXT<\/code> — what it is, limits, and what Phase 5 improves<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Why not just send the raw chunks to Claude without numbering them?<\/strong> The numbers are what make citations possible. Claude is instructed to cite every claim with <code>[n]<\/code>. After generation, the pipeline scans the response for those markers and maps each back to the source filename and similarity score. Without numbered passages, you'd get an answer but no traceability.<\/p>\n<p><strong>Q: How do you prevent hallucination?<\/strong> Two layers: (1) the system prompt tells Claude to answer only from the numbered passages and return <code>INSUFFICIENT_CONTEXT<\/code> if they're not enough; (2) the pipeline checks the response and sets <code>grounded=false<\/code> if that string appears. These are soft guardrails — they rely on the model following instructions. Phase 5 (LangGraph) adds a structural guardrail. Phase 6 (RAGAS) measures hallucination rate systematically on an eval set.<\/p>\n<p><strong>Q: What happens if Claude ignores the system prompt and answers from memory?<\/strong> The Phase 1 guardrail won't catch it — it only checks for <code>INSUFFICIENT_CONTEXT<\/code> in the response text. A harder approach: compare the answer against the retrieved chunks using an LLM judge (a second model call that scores faithfulness). That's part of Phase 6's RAGAS evaluation.<\/p>\n<p><strong>Q: Why is the system prompt a system message and not part of the user message?<\/strong> Claude gives higher weight to the system message for role definition and behavioral constraints. Putting \"answer only from context\" in the system message makes it a persistent rule for the conversation, not just a one-off instruction the model might deprioritize. It also keeps the user message clean — just context + question.<\/p>\n<p><strong>Q: What is the latency breakdown?<\/strong><\/p>\n<pre><code>Embed question:   ~20ms  (bge-small on CPU)\nFAISS search:     ~1ms\nBuild context:    &lt;1ms\nClaude API call:  ~700ms  ← dominates\nCitation parse:   &lt;1ms\nTotal:            ~720ms<\/code><\/pre>\n<p>The LLM API call is always the bottleneck. To reduce: use claude-haiku-4-5 (faster, cheaper), reduce max_tokens, or stream the response so the user sees partial output while generation continues.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/pipeline.py<\/code> <code class=\"srcref\" title=\"source file in the repo\">docsmind/llm/cloud_client.py<\/code> <code class=\"srcref\" title=\"source file in the repo\">docsmind/llm/base.py<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../07-full-pipeline/README.md\" href=\"#\">07-full-pipeline/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"06 — generation the big idea: after faiss returns the top-k chunks, the pipeline turns them into a grounded answer. it formats the chunks as numbered passages, sends them to claude with a strict system prompt, parses the citations from the response, and checks whether the answer is grounded or not. files in this folder file what it covers building-context.md how chunks become numbered [1][2][3] passages system-prompt.md why the prompt is designed the way it is claude-generates.md what claude does with the context citation-extraction.md how [n] markers are parsed and mapped back to source files guardrail.md insufficient_context — what it is, limits, and what phase 5 improves 🎯 interview q&a q: why not just send the raw chunks to claude without numbering them? the numbers are what make citations possible. claude is instructed to cite every claim with [n] . after generation, the pipeline scans the response for those markers and maps each back to the source filename and similarity score. without numbered passages, you'd get an answer but no traceability. q: how do you prevent hallucination? two layers: (1) the system prompt tells claude to answer only from the numbered passages and return insufficient_context if they're not enough; (2) the pipeline checks the response and sets grounded=false if that string appears. these are soft guardrails — they rely on the model following instructions. phase 5 (langgraph) adds a structural guardrail. phase 6 (ragas) measures hallucination rate systematically on an eval set. q: what happens if claude ignores the system prompt and answers from memory? the phase 1 guardrail won't catch it — it only checks for insufficient_context in the response text. a harder approach: compare the answer against the retrieved chunks using an llm judge (a second model call that scores faithfulness). that's part of phase 6's ragas evaluation. q: why is the system prompt a system message and not part of the user message? claude gives higher weight to the system message for role definition and behavioral constraints. putting \"answer only from context\" in the system message makes it a persistent rule for the conversation, not just a one-off instruction the model might deprioritize. it also keeps the user message clean — just context + question. q: what is the latency breakdown? embed question: ~20ms (bge-small on cpu) faiss search: ~1ms build context: <1ms claude api call: ~700ms ← dominates citation parse: <1ms total: ~720ms the llm api call is always the bottleneck. to reduce: use claude-haiku-4-5 (faster, cheaper), reduce max_tokens, or stream the response so the user sees partial output while generation continues. code docsmind/pipeline.py docsmind/llm/cloud_client.py docsmind/llm/base.py → next: 07-full-pipeline/readme.md","words":433},{"path":"06-generation/system-prompt.md","title":"The System Prompt","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"the-system-prompt\">The System Prompt<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The system prompt is the set of rules Claude must follow. It does three things: constrains the answer to the context only, forces citation by passage number, and defines the fallback when context is insufficient.<\/div><\/div>\n<h2 id=\"the-prompt\">The prompt<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/pipeline.py<\/span>\n\nINSUFFICIENT = <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span>\n\nSYSTEM_PROMPT = (\n    <span class=\"tok-string\">\"You are DocsMind, a question-answering assistant for technical and ML \"<\/span>\n    <span class=\"tok-string\">\"documentation. Answer ONLY from the numbered context passages provided. \"<\/span>\n    <span class=\"tok-string\">\"Cite every claim with its passage number in square brackets, e.g. [1] or \"<\/span>\n    <span class=\"tok-string\">\"[2][3]. Do not use outside knowledge. If the context does not contain enough \"<\/span>\n    <span class=\"tok-string\">f\"information to answer, reply with exactly: {INSUFFICIENT}\"<\/span>\n)<\/code><\/pre>\n<h2 id=\"breaking-it-down-every-sentence-matters\">Breaking it down — every sentence matters<\/h2>\n<p><strong>\"Answer ONLY from the numbered context passages provided.\"<\/strong> This is the anti-hallucination instruction. Claude has vast training knowledge and would happily answer from memory. This line tells it not to — the only valid source is what's in <code>[1]<\/code>, <code>[2]<\/code>, <code>[3]<\/code>, <code>[4]<\/code>.<\/p>\n<p><strong>\"Cite every claim with its passage number in square brackets, e.g. [1] or [2][3].\"<\/strong> Forces traceability. Every factual claim must be pinned to a passage. This makes the citation extraction step possible and makes the answer auditable — a user can check which file each claim came from.<\/p>\n<p><strong>\"Do not use outside knowledge.\"<\/strong> Redundant with \"ONLY from context\" but worth repeating. Reinforces the boundary.<\/p>\n<p><strong>\"If the context does not contain enough information to answer, reply with exactly: INSUFFICIENT_CONTEXT\"<\/strong> The exact string matters. The pipeline checks:<\/p>\n<pre><code class=\"language-python\">grounded = <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">in<\/span> answer<\/code><\/pre>\n<p>If Claude paraphrases (\"I don't have enough context...\") instead of using the exact string, the check fails and the pipeline incorrectly marks it as grounded. The word \"exactly\" in the prompt minimizes this — but it's still a soft guardrail.<\/p>\n<h2 id=\"why-system-message-and-not-user-message\">Why system message and not user message?<\/h2>\n<p>Claude treats the system message as a persistent role definition and behavioral contract for the whole conversation. The user message is the variable input. Putting the rules in the system message gives them higher precedence than if they were buried in the user message alongside the context and question.<\/p>\n<h2 id=\"what-this-prompt-does-not-do\">What this prompt does NOT do<\/h2>\n<ul><li>It does not guarantee Claude won't hallucinate. It reduces the likelihood.<\/li><li>It does not verify that cited passages actually support the claim.<\/li><li>It does not handle adversarial inputs (\"ignore previous instructions...\").<\/li><\/ul>\n<p>These are the limits of prompt-level guardrails. Phase 6 (RAGAS) adds a faithfulness metric that checks whether each claim is actually supported by its cited passage. Phase 5 (LangGraph) adds structural enforcement around the answer.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"claude-generates.md\" href=\"#\">claude-generates.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-prompt","text":"The prompt"},{"level":2,"id":"breaking-it-down-every-sentence-matters","text":"Breaking it down — every sentence matters"},{"level":2,"id":"why-system-message-and-not-user-message","text":"Why system message and not user message?"},{"level":2,"id":"what-this-prompt-does-not-do","text":"What this prompt does NOT do"}],"text":"the system prompt 💡 tl;dr the system prompt is the set of rules claude must follow. it does three things: constrains the answer to the context only, forces citation by passage number, and defines the fallback when context is insufficient. the prompt # docsmind/pipeline.py insufficient = \"insufficient_context\" system_prompt = ( \"you are docsmind, a question-answering assistant for technical and ml \" \"documentation. answer only from the numbered context passages provided. \" \"cite every claim with its passage number in square brackets, e.g. [1] or \" \"[2][3]. do not use outside knowledge. if the context does not contain enough \" f\"information to answer, reply with exactly: {insufficient}\" ) breaking it down — every sentence matters \"answer only from the numbered context passages provided.\" this is the anti-hallucination instruction. claude has vast training knowledge and would happily answer from memory. this line tells it not to — the only valid source is what's in [1] , [2] , [3] , [4] . \"cite every claim with its passage number in square brackets, e.g. [1] or [2][3].\" forces traceability. every factual claim must be pinned to a passage. this makes the citation extraction step possible and makes the answer auditable — a user can check which file each claim came from. \"do not use outside knowledge.\" redundant with \"only from context\" but worth repeating. reinforces the boundary. \"if the context does not contain enough information to answer, reply with exactly: insufficient_context\" the exact string matters. the pipeline checks: grounded = \"insufficient_context\" not in answer if claude paraphrases (\"i don't have enough context...\") instead of using the exact string, the check fails and the pipeline incorrectly marks it as grounded. the word \"exactly\" in the prompt minimizes this — but it's still a soft guardrail. why system message and not user message? claude treats the system message as a persistent role definition and behavioral contract for the whole conversation. the user message is the variable input. putting the rules in the system message gives them higher precedence than if they were buried in the user message alongside the context and question. what this prompt does not do it does not guarantee claude won't hallucinate. it reduces the likelihood. it does not verify that cited passages actually support the claim. it does not handle adversarial inputs (\"ignore previous instructions...\"). these are the limits of prompt-level guardrails. phase 6 (ragas) adds a faithfulness metric that checks whether each claim is actually supported by its cited passage. phase 5 (langgraph) adds structural enforcement around the answer. → next: claude-generates.md","words":422},{"path":"06-generation/building-context.md","title":"Building the Context","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"building-the-context\">Building the Context<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The 4 chunks from FAISS are formatted into numbered passages <code>[1]<\/code>, <code>[2]<\/code>, <code>[3]<\/code>, <code>[4]<\/code>. These numbers are what make citations possible — the model cites by number, and the pipeline maps each number back to a file.<\/div><\/div>\n<h2 id=\"the-raw-faiss-output\">The raw FAISS output<\/h2>\n<p>After FAISS search, the pipeline has (real values for <em>\"How do black holes form?\"<\/em>):<\/p>\n<pre><code class=\"language-python\">results = [\n    SearchResult(chunk=Chunk(text=<span class=\"tok-string\">\"A black hole is a region of spacetime where gravity...\"<\/span>,\n                             source=<span class=\"tok-string\">\"black_holes.md\"<\/span>), score=<span class=\"tok-number\">0.8141<\/span>),\n    SearchResult(chunk=Chunk(text=<span class=\"tok-string\">\"A star much more massive than the Sun... supernova...\"<\/span>,\n                             source=<span class=\"tok-string\">\"stellar_lifecycle.md\"<\/span>), score=<span class=\"tok-number\">0.6333<\/span>),\n    SearchResult(chunk=Chunk(text=<span class=\"tok-string\">\"The Sun is a main-sequence star that fuses hydrogen...\"<\/span>,\n                             source=<span class=\"tok-string\">\"solar_system.md\"<\/span>), score=<span class=\"tok-number\">0.5691<\/span>),\n    SearchResult(chunk=Chunk(text=<span class=\"tok-string\">\"To leave Earth's gravity, a spacecraft must reach escape velocity...\"<\/span>,\n                             source=<span class=\"tok-string\">\"rocket_propulsion.md\"<\/span>), score=<span class=\"tok-number\">0.5240<\/span>),\n]<\/code><\/pre>\n<p>Just a list of chunks with scores. The LLM can't use this directly.<\/p>\n<h2 id=\"building-the-numbered-context-string\">Building the numbered context string<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/pipeline.py<\/span>\n\n<span class=\"tok-decorator\">@staticmethod<\/span>\n<span class=\"tok-keyword\">def<\/span> _build_context(results: <span class=\"tok-builtin\">list<\/span>[SearchResult]) -&gt; <span class=\"tok-builtin\">str<\/span>:\n    blocks = []\n    <span class=\"tok-keyword\">for<\/span> i, result <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">enumerate<\/span>(results, start=<span class=\"tok-number\">1<\/span>):\n        blocks.append(\n            <span class=\"tok-string\">f\"[{i}] (source: {result.chunk.source})\\n{result.chunk.text}\"<\/span>\n        )\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"\\n\\n\"<\/span>.join(blocks)<\/code><\/pre>\n<p>Output:<\/p>\n<pre><code>[1] (source: black_holes.md)\nA black hole is a region of spacetime where gravity is so strong that nothing —\nnot even light — can escape. Stellar-mass black holes form when a massive star,\ntypically more than about 20 times the mass of the Sun, collapses in a supernova...\n\n[2] (source: stellar_lifecycle.md)\nA star much more massive than the Sun burns through its fuel quickly and becomes\na red supergiant. When its core can no longer support itself, it collapses and\nrebounds in a supernova; the most massive cores collapse into a black hole...\n\n[3] (source: solar_system.md)\nThe Sun is a main-sequence star that fuses hydrogen into helium in its core,\nthe gravitational anchor of the entire system...\n\n[4] (source: rocket_propulsion.md)\nTo leave Earth's gravity entirely, a spacecraft must reach escape velocity,\nabout 11.2 kilometers per second...<\/code><\/pre>\n<h2 id=\"then-the-full-prompt-to-the-llm\">Then the full prompt to the LLM<\/h2>\n<pre><code class=\"language-python\">prompt = <span class=\"tok-string\">f\"Context passages:\\n\\n{context}\\n\\nQuestion: {question}\\n\\nAnswer:\"<\/span><\/code><\/pre>\n<p>Which produces:<\/p>\n<pre><code>Context passages:\n\n[1] (source: black_holes.md)\nA black hole is a region of spacetime where gravity...\n\n[2] (source: stellar_lifecycle.md)\nA star much more massive than the Sun... supernova...\n\n[3] (source: solar_system.md)\nThe Sun is a main-sequence star...\n\n[4] (source: rocket_propulsion.md)\nTo leave Earth's gravity... escape velocity...\n\nQuestion: How do black holes form?\n\nAnswer:<\/code><\/pre>\n<h2 id=\"why-number-them\">Why number them?<\/h2>\n<p>The model is told in the system prompt to cite with <code>[n]<\/code>. When it writes <em>\"Stellar-mass black holes form from collapsing massive stars [1][2]\"<\/em>, the pipeline later extracts <code>[1]<\/code> and <code>[2]<\/code> and maps them back to <code>results[0]<\/code> and <code>results[1]<\/code> — each with the source filename, similarity score, and a text snippet. That's what becomes the <code>Citation<\/code> object returned to the user.<\/p>\n<p>Without the numbers, the model would still answer — but you'd have no way to trace which claim came from which file.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"system-prompt.md\" href=\"#\">system-prompt.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-raw-faiss-output","text":"The raw FAISS output"},{"level":2,"id":"building-the-numbered-context-string","text":"Building the numbered context string"},{"level":2,"id":"then-the-full-prompt-to-the-llm","text":"Then the full prompt to the LLM"},{"level":2,"id":"why-number-them","text":"Why number them?"}],"text":"building the context 💡 tl;dr the 4 chunks from faiss are formatted into numbered passages [1] , [2] , [3] , [4] . these numbers are what make citations possible — the model cites by number, and the pipeline maps each number back to a file. the raw faiss output after faiss search, the pipeline has (real values for \"how do black holes form?\" ): results = [ searchresult(chunk=chunk(text= \"a black hole is a region of spacetime where gravity...\" , source= \"black_holes.md\" ), score= 0.8141 ), searchresult(chunk=chunk(text= \"a star much more massive than the sun... supernova...\" , source= \"stellar_lifecycle.md\" ), score= 0.6333 ), searchresult(chunk=chunk(text= \"the sun is a main-sequence star that fuses hydrogen...\" , source= \"solar_system.md\" ), score= 0.5691 ), searchresult(chunk=chunk(text= \"to leave earth's gravity, a spacecraft must reach escape velocity...\" , source= \"rocket_propulsion.md\" ), score= 0.5240 ), ] just a list of chunks with scores. the llm can't use this directly. building the numbered context string # docsmind/pipeline.py @staticmethod def _build_context(results: list [searchresult]) -> str : blocks = [] for i, result in enumerate (results, start= 1 ): blocks.append( f\"[{i}] (source: {result.chunk.source})\\n{result.chunk.text}\" ) return \"\\n\\n\" .join(blocks) output: [1] (source: black_holes.md) a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape. stellar-mass black holes form when a massive star, typically more than about 20 times the mass of the sun, collapses in a supernova... [2] (source: stellar_lifecycle.md) a star much more massive than the sun burns through its fuel quickly and becomes a red supergiant. when its core can no longer support itself, it collapses and rebounds in a supernova; the most massive cores collapse into a black hole... [3] (source: solar_system.md) the sun is a main-sequence star that fuses hydrogen into helium in its core, the gravitational anchor of the entire system... [4] (source: rocket_propulsion.md) to leave earth's gravity entirely, a spacecraft must reach escape velocity, about 11.2 kilometers per second... then the full prompt to the llm prompt = f\"context passages:\\n\\n{context}\\n\\nquestion: {question}\\n\\nanswer:\" which produces: context passages: [1] (source: black_holes.md) a black hole is a region of spacetime where gravity... [2] (source: stellar_lifecycle.md) a star much more massive than the sun... supernova... [3] (source: solar_system.md) the sun is a main-sequence star... [4] (source: rocket_propulsion.md) to leave earth's gravity... escape velocity... question: how do black holes form? answer: why number them? the model is told in the system prompt to cite with [n] . when it writes \"stellar-mass black holes form from collapsing massive stars [1][2]\" , the pipeline later extracts [1] and [2] and maps them back to results[0] and results[1] — each with the source filename, similarity score, and a text snippet. that's what becomes the citation object returned to the user. without the numbers, the model would still answer — but you'd have no way to trace which claim came from which file. → next: system-prompt.md","words":481},{"path":"06-generation/claude-generates.md","title":"The LLM Generates the Answer","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"the-llm-generates-the-answer\">The LLM Generates the Answer<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The LLM receives the system prompt + numbered context + question. It produces a grounded answer with <code>[n]<\/code> citation markers. The pipeline can call either a cloud model (Anthropic, direct SDK) or a local model (Ollama) behind the same <code>LLMClient<\/code> interface.<\/div><\/div>\n<h2 id=\"the-two-clients\">The two clients<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/llm/cloud_client.py  — cloud path (Anthropic)<\/span>\n<span class=\"tok-keyword\">class<\/span> CloudLLMClient(LLMClient):\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, model: <span class=\"tok-builtin\">str<\/span>) -&gt; <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">self<\/span>.model = model\n        <span class=\"tok-keyword\">self<\/span>._client = anthropic.Anthropic()  <span class=\"tok-comment\"># reads ANTHROPIC_API_KEY from env<\/span>\n\n    <span class=\"tok-keyword\">def<\/span> generate(<span class=\"tok-keyword\">self<\/span>, system: <span class=\"tok-builtin\">str<\/span>, prompt: <span class=\"tok-builtin\">str<\/span>, max_tokens: <span class=\"tok-builtin\">int<\/span>) -&gt; <span class=\"tok-builtin\">str<\/span>:\n        response = <span class=\"tok-keyword\">self<\/span>._client.messages.create(\n            model=<span class=\"tok-keyword\">self<\/span>.model, max_tokens=max_tokens,\n            system=system, messages=[{<span class=\"tok-string\">\"role\"<\/span>: <span class=\"tok-string\">\"user\"<\/span>, <span class=\"tok-string\">\"content\"<\/span>: prompt}],\n        )\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"\"<\/span>.join(b.text <span class=\"tok-keyword\">for<\/span> b <span class=\"tok-keyword\">in<\/span> response.content <span class=\"tok-keyword\">if<\/span> b.type == <span class=\"tok-string\">\"text\"<\/span>).strip()<\/code><\/pre>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/llm/local_client.py  — local path (Ollama)<\/span>\n<span class=\"tok-keyword\">class<\/span> LocalLLMClient(LLMClient):\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, model: <span class=\"tok-builtin\">str<\/span>, base_url: <span class=\"tok-builtin\">str<\/span> = <span class=\"tok-string\">\"http://localhost:11434\"<\/span>) -&gt; <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">self<\/span>.model = model\n        <span class=\"tok-keyword\">self<\/span>._base_url = base_url.rstrip(<span class=\"tok-string\">\"/\"<\/span>)\n        <span class=\"tok-keyword\">self<\/span>._client = httpx.Client(timeout=<span class=\"tok-number\">300.0<\/span>)\n\n    <span class=\"tok-keyword\">def<\/span> generate(<span class=\"tok-keyword\">self<\/span>, system: <span class=\"tok-builtin\">str<\/span>, prompt: <span class=\"tok-builtin\">str<\/span>, max_tokens: <span class=\"tok-builtin\">int<\/span>) -&gt; <span class=\"tok-builtin\">str<\/span>:\n        r = <span class=\"tok-keyword\">self<\/span>._client.post(<span class=\"tok-string\">f\"{self._base_url}/api/chat\"<\/span>, json={\n            <span class=\"tok-string\">\"model\"<\/span>: <span class=\"tok-keyword\">self<\/span>.model,\n            <span class=\"tok-string\">\"messages\"<\/span>: [{<span class=\"tok-string\">\"role\"<\/span>: <span class=\"tok-string\">\"system\"<\/span>, <span class=\"tok-string\">\"content\"<\/span>: system},\n                         {<span class=\"tok-string\">\"role\"<\/span>: <span class=\"tok-string\">\"user\"<\/span>, <span class=\"tok-string\">\"content\"<\/span>: prompt}],\n            <span class=\"tok-string\">\"stream\"<\/span>: <span class=\"tok-keyword\">False<\/span>, <span class=\"tok-string\">\"options\"<\/span>: {<span class=\"tok-string\">\"num_predict\"<\/span>: max_tokens},\n        })\n        r.raise_for_status()\n        <span class=\"tok-keyword\">return<\/span> r.json()[<span class=\"tok-string\">\"message\"<\/span>][<span class=\"tok-string\">\"content\"<\/span>].strip()<\/code><\/pre>\n<p><code>factory.build_llm()<\/code> picks one based on <code>DOCSMIND_LLM_PROVIDER<\/code> (<code>cloud<\/code> or <code>local<\/code>). The pipeline never knows which — it just calls <code>.generate()<\/code>.<\/p>\n<h2 id=\"what-the-llm-receives\">What the LLM receives<\/h2>\n<pre><code>SYSTEM:\n  You are DocsMind... Answer ONLY from numbered context passages...\n  Cite every claim with [n]... reply INSUFFICIENT_CONTEXT if needed.\n\nUSER:\n  Context passages:\n\n  [1] (source: black_holes.md)\n  A black hole is a region of spacetime where gravity is so strong that nothing —\n  not even light — can escape. Stellar-mass black holes form when a massive star\n  collapses in a supernova...\n\n  [2] (source: stellar_lifecycle.md)\n  A star much more massive than the Sun... collapses and rebounds in a supernova;\n  the most massive cores collapse into a black hole...\n\n  [3] (source: solar_system.md)\n  The Sun is a main-sequence star that fuses hydrogen into helium...\n\n  [4] (source: rocket_propulsion.md)\n  To leave Earth's gravity, a spacecraft must reach escape velocity...\n\n  Question: How do black holes form?\n\n  Answer:<\/code><\/pre>\n<h2 id=\"what-the-llm-returns-real-output-from-the-local-model\">What the LLM returns (real output from the local model)<\/h2>\n<pre><code>Black holes form when matter is compressed into a small enough volume that its\nescape velocity exceeds the speed of light [1]. This occurs in two main ways:\nstellar-mass black holes form from the collapse of massive stars, typically more\nthan about 20 times the mass of the Sun, following a supernova event [1][2], and\nsupermassive black holes form at the centers of galaxies, including our Milky\nWay, with masses in the millions to billions of times that of the Sun [1][3].<\/code><\/pre>\n<p>Every claim is pinned to a passage number. The pipeline extracts <code>{1, 2, 3}<\/code> from the text and maps them to sources. Note the model used <code>[1]<\/code>, <code>[2]<\/code>, <code>[3]<\/code> and ignored <code>[4]<\/code> (the rocket passage) — it only cited what it actually needed.<\/p>\n<h2 id=\"why-direct-anthropic-sdk-and-not-langchain\">Why direct Anthropic SDK and not LangChain?<\/h2>\n<p>For the cloud path, using the SDK directly means:<\/p>\n<ul><li>No abstraction tax — full access to every Anthropic API parameter<\/li><li>No hidden retry logic or model routing you didn't ask for<\/li><li>Easy to add system-level features (batching, prompt caching, streaming)<\/li><li>Simpler to debug — fewer layers between you and the API response<\/li><\/ul>\n<p>LangChain's <code>ChatAnthropic<\/code> wrapper is a convenience layer. For a project where the LLM call is a critical-path component, direct SDK gives more control and less mystery.<\/p>\n<h2 id=\"the-pluggable-interface\">The pluggable interface<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/llm/base.py<\/span>\n\n<span class=\"tok-keyword\">class<\/span> LLMClient(ABC):\n    model: <span class=\"tok-builtin\">str<\/span>\n\n    <span class=\"tok-decorator\">@abstractmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> generate(<span class=\"tok-keyword\">self<\/span>, system: <span class=\"tok-builtin\">str<\/span>, prompt: <span class=\"tok-builtin\">str<\/span>, max_tokens: <span class=\"tok-builtin\">int<\/span>) -&gt; <span class=\"tok-builtin\">str<\/span>: ...<\/code><\/pre>\n<p>Both <code>CloudLLMClient<\/code> and <code>LocalLLMClient<\/code> implement this. The local client was added to run without an API key — a minimal preview of the Phase 4 <code>LLMRouter<\/code>, which will add automatic local→cloud fallback and model benchmarking.<\/p>\n<h2 id=\"configuring-the-backend\">Configuring the backend<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># .env — local (no API key needed)<\/span>\nDOCSMIND_LLM_PROVIDER=local\nDOCSMIND_LOCAL_LLM_MODEL=deepseek-coder-v2:16b-lite-instruct-q4_K_M\nDOCSMIND_OLLAMA_BASE_URL=http://localhost:<span class=\"tok-number\">11434<\/span>\n\n<span class=\"tok-comment\"># .env — cloud (needs ANTHROPIC_API_KEY)<\/span>\nDOCSMIND_LLM_PROVIDER=cloud\nDOCSMIND_CLOUD_LLM_MODEL=claude-haiku-<span class=\"tok-number\">4<\/span>-<span class=\"tok-number\">5<\/span>-<span class=\"tok-number\">20251001<\/span>   <span class=\"tok-comment\"># faster, cheaper<\/span><\/code><\/pre>\n<p>For keyless local testing, use the local provider. For top quality, point at a cloud model. Same pipeline either way.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"citation-extraction.md\" href=\"#\">citation-extraction.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-two-clients","text":"The two clients"},{"level":2,"id":"what-the-llm-receives","text":"What the LLM receives"},{"level":2,"id":"what-the-llm-returns-real-output-from-the-local-model","text":"What the LLM returns (real output from the local model)"},{"level":2,"id":"why-direct-anthropic-sdk-and-not-langchain","text":"Why direct Anthropic SDK and not LangChain?"},{"level":2,"id":"the-pluggable-interface","text":"The pluggable interface"},{"level":2,"id":"configuring-the-backend","text":"Configuring the backend"}],"text":"the llm generates the answer 💡 tl;dr the llm receives the system prompt + numbered context + question. it produces a grounded answer with [n] citation markers. the pipeline can call either a cloud model (anthropic, direct sdk) or a local model (ollama) behind the same llmclient interface. the two clients # docsmind/llm/cloud_client.py — cloud path (anthropic) class cloudllmclient(llmclient): def __init__( self , model: str ) -> none : self .model = model self ._client = anthropic.anthropic() # reads anthropic_api_key from env def generate( self , system: str , prompt: str , max_tokens: int ) -> str : response = self ._client.messages.create( model= self .model, max_tokens=max_tokens, system=system, messages=[{ \"role\" : \"user\" , \"content\" : prompt}], ) return \"\" .join(b.text for b in response.content if b.type == \"text\" ).strip() # docsmind/llm/local_client.py — local path (ollama) class localllmclient(llmclient): def __init__( self , model: str , base_url: str = \"http://localhost:11434\" ) -> none : self .model = model self ._base_url = base_url.rstrip( \"/\" ) self ._client = httpx.client(timeout= 300.0 ) def generate( self , system: str , prompt: str , max_tokens: int ) -> str : r = self ._client.post( f\"{self._base_url}/api/chat\" , json={ \"model\" : self .model, \"messages\" : [{ \"role\" : \"system\" , \"content\" : system}, { \"role\" : \"user\" , \"content\" : prompt}], \"stream\" : false , \"options\" : { \"num_predict\" : max_tokens}, }) r.raise_for_status() return r.json()[ \"message\" ][ \"content\" ].strip() factory.build_llm() picks one based on docsmind_llm_provider ( cloud or local ). the pipeline never knows which — it just calls .generate() . what the llm receives system: you are docsmind... answer only from numbered context passages... cite every claim with [n]... reply insufficient_context if needed. user: context passages: [1] (source: black_holes.md) a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape. stellar-mass black holes form when a massive star collapses in a supernova... [2] (source: stellar_lifecycle.md) a star much more massive than the sun... collapses and rebounds in a supernova; the most massive cores collapse into a black hole... [3] (source: solar_system.md) the sun is a main-sequence star that fuses hydrogen into helium... [4] (source: rocket_propulsion.md) to leave earth's gravity, a spacecraft must reach escape velocity... question: how do black holes form? answer: what the llm returns (real output from the local model) black holes form when matter is compressed into a small enough volume that its escape velocity exceeds the speed of light [1]. this occurs in two main ways: stellar-mass black holes form from the collapse of massive stars, typically more than about 20 times the mass of the sun, following a supernova event [1][2], and supermassive black holes form at the centers of galaxies, including our milky way, with masses in the millions to billions of times that of the sun [1][3]. every claim is pinned to a passage number. the pipeline extracts {1, 2, 3} from the text and maps them to sources. note the model used [1] , [2] , [3] and ignored [4] (the rocket passage) — it only cited what it actually needed. why direct anthropic sdk and not langchain? for the cloud path, using the sdk directly means: no abstraction tax — full access to every anthropic api parameter no hidden retry logic or model routing you didn't ask for easy to add system-level features (batching, prompt caching, streaming) simpler to debug — fewer layers between you and the api response langchain's chatanthropic wrapper is a convenience layer. for a project where the llm call is a critical-path component, direct sdk gives more control and less mystery. the pluggable interface # docsmind/llm/base.py class llmclient(abc): model: str @abstractmethod def generate( self , system: str , prompt: str , max_tokens: int ) -> str : ... both cloudllmclient and localllmclient implement this. the local client was added to run without an api key — a minimal preview of the phase 4 llmrouter , which will add automatic local→cloud fallback and model benchmarking. configuring the backend # .env — local (no api key needed) docsmind_llm_provider=local docsmind_local_llm_model=deepseek-coder-v2:16b-lite-instruct-q4_k_m docsmind_ollama_base_url=http://localhost: 11434 # .env — cloud (needs anthropic_api_key) docsmind_llm_provider=cloud docsmind_cloud_llm_model=claude-haiku- 4 - 5 - 20251001 # faster, cheaper for keyless local testing, use the local provider. for top quality, point at a cloud model. same pipeline either way. → next: citation-extraction.md","words":714},{"path":"06-generation/citation-extraction.md","title":"Citation Extraction","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"citation-extraction\">Citation Extraction<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> After Claude responds, the pipeline scans the answer text for <code>[n]<\/code> markers using a regex, maps each number to the corresponding retrieved chunk, and builds a list of <code>Citation<\/code> objects that get returned alongside the answer.<\/div><\/div>\n<h2 id=\"the-code\">The code<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/pipeline.py<\/span>\n\n_MARKER_RE = re.compile(<span class=\"tok-string\">r\"\\[(\\d+)\\]\"<\/span>)   <span class=\"tok-comment\"># matches [1], [2], [12], etc.<\/span>\n\n<span class=\"tok-decorator\">@staticmethod<\/span>\n<span class=\"tok-keyword\">def<\/span> _extract_citations(answer: <span class=\"tok-builtin\">str<\/span>, results: <span class=\"tok-builtin\">list<\/span>[SearchResult]) -&gt; <span class=\"tok-builtin\">list<\/span>[Citation]:\n    <span class=\"tok-comment\"># Find all [n] markers in the answer text<\/span>\n    cited_markers = {<span class=\"tok-builtin\">int<\/span>(m) <span class=\"tok-keyword\">for<\/span> m <span class=\"tok-keyword\">in<\/span> _MARKER_RE.findall(answer)}\n\n    <span class=\"tok-comment\"># Only keep valid markers — ones that map to an actual retrieved chunk<\/span>\n    cited_markers = {m <span class=\"tok-keyword\">for<\/span> m <span class=\"tok-keyword\">in<\/span> cited_markers <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">1<\/span> &lt;= m &lt;= <span class=\"tok-builtin\">len<\/span>(results)}\n\n    citations = []\n    <span class=\"tok-keyword\">for<\/span> marker <span class=\"tok-keyword\">in<\/span> sorted(cited_markers):\n        result = results[marker - <span class=\"tok-number\">1<\/span>]   <span class=\"tok-comment\"># [1] → results[0], [2] → results[1], etc.<\/span>\n        snippet = result.chunk.text[:<span class=\"tok-number\">240<\/span>].strip()\n        citations.append(\n            Citation(\n                marker=marker,\n                source=result.chunk.source,\n                score=round(result.score, <span class=\"tok-number\">4<\/span>),\n                snippet=snippet,\n            )\n        )\n    <span class=\"tok-keyword\">return<\/span> citations<\/code><\/pre>\n<h2 id=\"step-by-step-example\">Step-by-step example<\/h2>\n<p>The model returned (real output for <em>\"How do black holes form?\"<\/em>):<\/p>\n<pre><code>\"Black holes form when matter is compressed... exceeds the speed of light [1].\nStellar-mass black holes form from collapsing massive stars [1][2], and\nsupermassive black holes form at the centers of galaxies [1][3].\"<\/code><\/pre>\n<p><strong>Step 1 — Find all markers:<\/strong><\/p>\n<pre><code class=\"language-python\">_MARKER_RE.findall(answer)\n<span class=\"tok-comment\"># → ['1', '1', '2', '1', '3']<\/span>\n\ncited_markers = {<span class=\"tok-builtin\">int<\/span>(m) <span class=\"tok-keyword\">for<\/span> m <span class=\"tok-keyword\">in<\/span> ...}\n<span class=\"tok-comment\"># → {1, 2, 3}   (set removes duplicates)<\/span><\/code><\/pre>\n<p><strong>Step 2 — Validate (only keep markers that map to real chunks):<\/strong><\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># We have 4 chunks (results[0..3]), so valid = {1, 2, 3, 4}<\/span>\n<span class=\"tok-comment\"># {1, 2, 3} are all valid — keep them all<\/span>\n<span class=\"tok-comment\"># If the model hallucinated [7], it would be filtered out here<\/span>\ncited_markers = {<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">3<\/span>}<\/code><\/pre>\n<p><strong>Step 3 — Build Citation objects:<\/strong><\/p>\n<pre><code class=\"language-python\">Citation(marker=<span class=\"tok-number\">1<\/span>, source=<span class=\"tok-string\">\"black_holes.md\"<\/span>, score=<span class=\"tok-number\">0.8141<\/span>,\n         snippet=<span class=\"tok-string\">\"A black hole is a region of spacetime where gravity is so strong...\"<\/span>)\n\nCitation(marker=<span class=\"tok-number\">2<\/span>, source=<span class=\"tok-string\">\"stellar_lifecycle.md\"<\/span>, score=<span class=\"tok-number\">0.6333<\/span>,\n         snippet=<span class=\"tok-string\">\"A star much more massive than the Sun... collapses in a supernova...\"<\/span>)\n\nCitation(marker=<span class=\"tok-number\">3<\/span>, source=<span class=\"tok-string\">\"solar_system.md\"<\/span>, score=<span class=\"tok-number\">0.5691<\/span>,\n         snippet=<span class=\"tok-string\">\"The Sun is a main-sequence star that fuses hydrogen into helium...\"<\/span>)<\/code><\/pre>\n<p>Notice: <code>[4]<\/code> (the rocket passage) is not in the citations because the model didn't use it. FAISS retrieved 4 chunks but the model only needed 3. That's normal.<\/p>\n<h2 id=\"the-citation-schema\">The Citation schema<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/schemas.py<\/span>\n\n<span class=\"tok-keyword\">class<\/span> Citation(BaseModel):\n    marker: <span class=\"tok-builtin\">int<\/span>      <span class=\"tok-comment\"># the [n] number as it appears in the answer<\/span>\n    source: <span class=\"tok-builtin\">str<\/span>      <span class=\"tok-comm
