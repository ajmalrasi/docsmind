ent\"># filename the chunk came from<\/span>\n    score: <span class=\"tok-builtin\">float<\/span>     <span class=\"tok-comment\"># cosine similarity score from FAISS<\/span>\n    snippet: <span class=\"tok-builtin\">str<\/span>     <span class=\"tok-comment\"># first 240 chars of the chunk text<\/span><\/code><\/pre>\n<p>This is what gets returned to the user in the API response. A UI would display these as clickable footnotes — click <code>[1]<\/code> and see the source file and the exact text passage that supported the claim.<\/p>\n<h2 id=\"what-the-validation-step-protects-against\">What the validation step protects against<\/h2>\n<p>The model might occasionally hallucinate a citation marker — writing <code>[7]<\/code> when only 4 passages were provided. The bounds check <code>if 1 &lt;= m &lt;= len(results)<\/code> silently drops invalid markers rather than crashing or returning a bogus citation. It's a small but important guard.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"guardrail.md\" href=\"#\">guardrail.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-code","text":"The code"},{"level":2,"id":"step-by-step-example","text":"Step-by-step example"},{"level":2,"id":"the-citation-schema","text":"The Citation schema"},{"level":2,"id":"what-the-validation-step-protects-against","text":"What the validation step protects against"}],"text":"citation extraction 💡 tl;dr after claude responds, the pipeline scans the answer text for [n] markers using a regex, maps each number to the corresponding retrieved chunk, and builds a list of citation objects that get returned alongside the answer. the code # docsmind/pipeline.py _marker_re = re.compile( r\"\\[(\\d+)\\]\" ) # matches [1], [2], [12], etc. @staticmethod def _extract_citations(answer: str , results: list [searchresult]) -> list [citation]: # find all [n] markers in the answer text cited_markers = { int (m) for m in _marker_re.findall(answer)} # only keep valid markers — ones that map to an actual retrieved chunk cited_markers = {m for m in cited_markers if 1 <= m <= len (results)} citations = [] for marker in sorted(cited_markers): result = results[marker - 1 ] # [1] → results[0], [2] → results[1], etc. snippet = result.chunk.text[: 240 ].strip() citations.append( citation( marker=marker, source=result.chunk.source, score=round(result.score, 4 ), snippet=snippet, ) ) return citations step-by-step example the model returned (real output for \"how do black holes form?\" ): \"black holes form when matter is compressed... exceeds the speed of light [1]. stellar-mass black holes form from collapsing massive stars [1][2], and supermassive black holes form at the centers of galaxies [1][3].\" step 1 — find all markers: _marker_re.findall(answer) # → ['1', '1', '2', '1', '3'] cited_markers = { int (m) for m in ...} # → {1, 2, 3} (set removes duplicates) step 2 — validate (only keep markers that map to real chunks): # we have 4 chunks (results[0..3]), so valid = {1, 2, 3, 4} # {1, 2, 3} are all valid — keep them all # if the model hallucinated [7], it would be filtered out here cited_markers = { 1 , 2 , 3 } step 3 — build citation objects: citation(marker= 1 , source= \"black_holes.md\" , score= 0.8141 , snippet= \"a black hole is a region of spacetime where gravity is so strong...\" ) citation(marker= 2 , source= \"stellar_lifecycle.md\" , score= 0.6333 , snippet= \"a star much more massive than the sun... collapses in a supernova...\" ) citation(marker= 3 , source= \"solar_system.md\" , score= 0.5691 , snippet= \"the sun is a main-sequence star that fuses hydrogen into helium...\" ) notice: [4] (the rocket passage) is not in the citations because the model didn't use it. faiss retrieved 4 chunks but the model only needed 3. that's normal. the citation schema # docsmind/schemas.py class citation(basemodel): marker: int # the [n] number as it appears in the answer source: str # filename the chunk came from score: float # cosine similarity score from faiss snippet: str # first 240 chars of the chunk text this is what gets returned to the user in the api response. a ui would display these as clickable footnotes — click [1] and see the source file and the exact text passage that supported the claim. what the validation step protects against the model might occasionally hallucinate a citation marker — writing [7] when only 4 passages were provided. the bounds check if 1 <= m <= len(results) silently drops invalid markers rather than crashing or returning a bogus citation. it's a small but important guard. → next: guardrail.md","words":523},{"path":"06-generation/guardrail.md","title":"The Guardrail — INSUFFICIENT_CONTEXT","section":"6 · Generation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"the-guardrail-insufficient_context\">The Guardrail — INSUFFICIENT_CONTEXT<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When the retrieved chunks don't contain enough to answer the question, Claude should reply with the exact string <code>INSUFFICIENT_CONTEXT<\/code>. The pipeline detects this, sets <code>grounded=false<\/code>, and returns no citations. This is a soft guardrail — it works if Claude follows instructions.<\/div><\/div>\n<h2 id=\"the-check\">The check<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/pipeline.py<\/span>\n\nINSUFFICIENT = <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span>\n\ngrounded = INSUFFICIENT <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">in<\/span> answer\ncitations = <span class=\"tok-keyword\">self<\/span>._extract_citations(answer, results) <span class=\"tok-keyword\">if<\/span> grounded <span class=\"tok-keyword\">else<\/span> []\n\n<span class=\"tok-keyword\">return<\/span> QueryResponse(\n    answer=answer,\n    citations=citations,\n    grounded=grounded,\n    ...\n)<\/code><\/pre>\n<p>Two outcomes:<\/p>\n<p><strong>Grounded (normal case):<\/strong><\/p>\n<pre><code class=\"language-json\">{\n  \"answer\": \"Black holes form when matter collapses past its event horizon [1][2]...\",\n  \"citations\": [...],\n  \"grounded\": true\n}<\/code><\/pre>\n<p><strong>Not grounded (context insufficient):<\/strong><\/p>\n<pre><code class=\"language-json\">{\n  \"answer\": \"INSUFFICIENT_CONTEXT\",\n  \"citations\": [],\n  \"grounded\": false\n}<\/code><\/pre>\n<h2 id=\"when-does-this-trigger\">When does this trigger?<\/h2>\n<p><strong>Scenario 1 — Question outside the corpus:<\/strong><\/p>\n<pre><code>Question: \"How do I bake sourdough bread?\"<\/code><\/pre>\n<p>The retrieved top-4 chunks are all about black holes, stars, and rockets. None mention bread. The model sees the context, finds nothing relevant, and returns <code>INSUFFICIENT_CONTEXT<\/code>.<\/p>\n<p><strong>Scenario 2 — Low-quality retrieval hit:<\/strong> FAISS always returns top-k even if scores are low. If all scores are 0.2–0.3 (barely related), the context won't be useful. Claude should detect this and return <code>INSUFFICIENT_CONTEXT<\/code>.<\/p>\n<p><strong>Scenario 3 — Empty index:<\/strong> If <code>make ingest<\/code> was never run, FAISS returns zero results. The pipeline short-circuits before even calling Claude:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> results:\n    <span class=\"tok-keyword\">return<\/span> QueryResponse(\n        answer=INSUFFICIENT,\n        citations=[],\n        grounded=<span class=\"tok-keyword\">False<\/span>,\n        ...\n    )<\/code><\/pre>\n<h2 id=\"the-limits-of-this-guardrail\">The limits of this guardrail<\/h2>\n<p><strong>It's a soft guardrail.<\/strong> It relies on Claude following the system prompt.<\/p>\n<p>What can go wrong:<\/p>\n<ul><li>Claude paraphrases — <em>\"I don't have enough information...\"<\/em> — instead of<\/li><\/ul>\n<p>the exact string <code>INSUFFICIENT_CONTEXT<\/code>. The <code>not in<\/code> check misses it,   <code>grounded=true<\/code> is set incorrectly.<\/p>\n<ul><li>Claude answers partly from memory (ignoring \"ONLY from context\") without<\/li><\/ul>\n<p>flagging insufficient context. The pipeline can't detect this.<\/p>\n<ul><li>Claude uses a citation marker <code>[1]<\/code> but the claim isn't actually supported<\/li><\/ul>\n<p>by passage <code>[1]<\/code>. The pipeline extracts the citation as valid — no one checks   faithfulness.<\/p>\n<h2 id=\"how-phase-5-and-6-fix-this\">How Phase 5 and 6 fix this<\/h2>\n<p><strong>Phase 5 (LangGraph agent):<\/strong> Adds a structural verification step — a second model call that explicitly checks whether each claim in the answer is supported by its cited passage. If not, the agent loops back and re-generates.<\/p>\n<p><strong>Phase 6 (RAGAS evaluation):<\/strong> Runs systematic evaluation on a golden question set, measuring:<\/p>\n<ul><li><strong>Faithfulness<\/strong> — are claims actually supported by the retrieved passages?<\/li><li><strong>Answer relevance<\/strong> — does the answer address the question?<\/li><li><strong>Context recall<\/strong> — did retrieval find the right passages?<\/li><\/ul>\n<p>This moves from \"we hope Claude behaved\" to \"we measured that Claude behaved on 200 test questions with a 94% faithfulness score.\"<\/p>\n<h2 id=\"why-the-exact-string-matters\">Why the exact string matters<\/h2>\n<pre><code class=\"language-python\">INSUFFICIENT = <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span>\ngrounded = INSUFFICIENT <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">in<\/span> answer<\/code><\/pre>\n<p>The check is a substring search. If the constant changes in one place but not the other, the guardrail silently breaks. That's why the same constant <code>INSUFFICIENT<\/code> is used in both the system prompt and the check — defined once, referenced twice. If you change the fallback phrase, you only change it in one place.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../07-full-pipeline/README.md\" href=\"#\">07-full-pipeline/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-check","text":"The check"},{"level":2,"id":"when-does-this-trigger","text":"When does this trigger?"},{"level":2,"id":"the-limits-of-this-guardrail","text":"The limits of this guardrail"},{"level":2,"id":"how-phase-5-and-6-fix-this","text":"How Phase 5 and 6 fix this"},{"level":2,"id":"why-the-exact-string-matters","text":"Why the exact string matters"}],"text":"the guardrail — insufficient_context 💡 tl;dr when the retrieved chunks don't contain enough to answer the question, claude should reply with the exact string insufficient_context . the pipeline detects this, sets grounded=false , and returns no citations. this is a soft guardrail — it works if claude follows instructions. the check # docsmind/pipeline.py insufficient = \"insufficient_context\" grounded = insufficient not in answer citations = self ._extract_citations(answer, results) if grounded else [] return queryresponse( answer=answer, citations=citations, grounded=grounded, ... ) two outcomes: grounded (normal case): { \"answer\": \"black holes form when matter collapses past its event horizon [1][2]...\", \"citations\": [...], \"grounded\": true } not grounded (context insufficient): { \"answer\": \"insufficient_context\", \"citations\": [], \"grounded\": false } when does this trigger? scenario 1 — question outside the corpus: question: \"how do i bake sourdough bread?\" the retrieved top-4 chunks are all about black holes, stars, and rockets. none mention bread. the model sees the context, finds nothing relevant, and returns insufficient_context . scenario 2 — low-quality retrieval hit: faiss always returns top-k even if scores are low. if all scores are 0.2–0.3 (barely related), the context won't be useful. claude should detect this and return insufficient_context . scenario 3 — empty index: if make ingest was never run, faiss returns zero results. the pipeline short-circuits before even calling claude: if not results: return queryresponse( answer=insufficient, citations=[], grounded= false , ... ) the limits of this guardrail it's a soft guardrail. it relies on claude following the system prompt. what can go wrong: claude paraphrases — \"i don't have enough information...\" — instead of the exact string insufficient_context . the not in check misses it, grounded=true is set incorrectly. claude answers partly from memory (ignoring \"only from context\") without flagging insufficient context. the pipeline can't detect this. claude uses a citation marker [1] but the claim isn't actually supported by passage [1] . the pipeline extracts the citation as valid — no one checks faithfulness. how phase 5 and 6 fix this phase 5 (langgraph agent): adds a structural verification step — a second model call that explicitly checks whether each claim in the answer is supported by its cited passage. if not, the agent loops back and re-generates. phase 6 (ragas evaluation): runs systematic evaluation on a golden question set, measuring: faithfulness — are claims actually supported by the retrieved passages? answer relevance — does the answer address the question? context recall — did retrieval find the right passages? this moves from \"we hope claude behaved\" to \"we measured that claude behaved on 200 test questions with a 94% faithfulness score.\" why the exact string matters insufficient = \"insufficient_context\" grounded = insufficient not in answer the check is a substring search. if the constant changes in one place but not the other, the guardrail silently breaks. that's why the same constant insufficient is used in both the system prompt and the check — defined once, referenced twice. if you change the fallback phrase, you only change it in one place. → back to: readme.md → next topic: 07-full-pipeline/readme.md","words":504},{"path":"07-full-pipeline/README.md","title":"Overview","section":"7 · Full Pipeline","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"07-full-pipeline\">07 — Full Pipeline<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 132\" role=\"img\" aria-label=\"Query time: a question becomes an answer with citations\"><rect class=\"dg-box\" x=\"18\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"68\" y=\"73\" text-anchor=\"middle\">Question<\/text><text class=\"dg-sub\" x=\"68\" y=\"90\" text-anchor=\"middle\">user text<\/text><line class=\"dg-line\" x1=\"118\" y1=\"75\" x2=\"127\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"127,70 134,75 127,80\"/><rect class=\"dg-box\" x=\"134\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"184\" y=\"73\" text-anchor=\"middle\">Embed<\/text><text class=\"dg-sub\" x=\"184\" y=\"90\" text-anchor=\"middle\">same model<\/text><line class=\"dg-line\" x1=\"234\" y1=\"75\" x2=\"243\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"243,70 250,75 243,80\"/><rect class=\"dg-box\" x=\"250\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"300\" y=\"73\" text-anchor=\"middle\">Search<\/text><text class=\"dg-sub\" x=\"300\" y=\"90\" text-anchor=\"middle\">FAISS top-k<\/text><line class=\"dg-line\" x1=\"350\" y1=\"75\" x2=\"359\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"359,70 366,75 359,80\"/><rect class=\"dg-box\" x=\"366\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"416\" y=\"73\" text-anchor=\"middle\">Context<\/text><text class=\"dg-sub\" x=\"416\" y=\"90\" text-anchor=\"middle\">chunks<\/text><line class=\"dg-line\" x1=\"466\" y1=\"75\" x2=\"475\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"475,70 482,75 475,80\"/><rect class=\"dg-box dg-hot\" x=\"482\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"532\" y=\"73\" text-anchor=\"middle\">Claude<\/text><text class=\"dg-sub\" x=\"532\" y=\"90\" text-anchor=\"middle\">generate<\/text><line class=\"dg-line\" x1=\"582\" y1=\"75\" x2=\"591\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"591,70 598,75 591,80\"/><rect class=\"dg-box\" x=\"598\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"648\" y=\"73\" text-anchor=\"middle\">Answer<\/text><text class=\"dg-sub\" x=\"648\" y=\"90\" text-anchor=\"middle\">+ citations<\/text><text class=\"dg-sub\" x=\"360\" y=\"20\" text-anchor=\"middle\">Query time — runs live for every question<\/text><\/svg><figcaption>Query time: a question becomes an answer with citations<\/figcaption><\/figure>\n<p><strong>The big idea:<\/strong> Every piece we've studied connects into one flow. A document goes in at ingest time and a grounded answer with citations comes out at query time. This section ties everything together.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"4-step-flow.md\" href=\"#\">4-step-flow.md<\/a><\/td><td>The full ingest → chunk → embed → index → retrieve → generate flow<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"real-query-example.md\" href=\"#\">real-query-example.md<\/a><\/td><td>One real question traced through every component<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"phase1-end-to-end.md\" href=\"#\">phase1-end-to-end.md<\/a><\/td><td>How the code components wire together (factory, pipeline, API)<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Walk me through your RAG pipeline.<\/strong> \"Documents are loaded with LlamaIndex and split into 512-token, sentence-aware chunks with 64-token overlap. Each chunk is embedded with self-hosted bge-small into a 384-dim L2-normalized vector and stored in a FAISS flat index. At query time, the question is embedded with the same model, and FAISS returns the top-4 chunks by cosine similarity. Those chunks are formatted as numbered context passages and sent to Claude with a system prompt that forces citation by passage number and returns <code>INSUFFICIENT_CONTEXT<\/code> if the context isn't enough to answer. The pipeline extracts the citation markers from the answer and maps them back to source filenames.\"<\/p>\n<p><strong>Q: Why not just send all documents to the LLM?<\/strong> Two reasons: cost and quality. Cost: LLMs charge per token — sending 100 full documents per query is expensive. Quality: LLMs have a finite context window and degrade when it's overloaded with irrelevant text. RAG retrieves only the relevant few chunks, so the model sees focused, useful context.<\/p>\n<p><strong>Q: How do you prevent hallucination?<\/strong> Two layers. First, the system prompt explicitly tells Claude to answer only from the numbered context passages and to reply <code>INSUFFICIENT_CONTEXT<\/code> if the context isn't enough. Second, the pipeline checks the response — if <code>INSUFFICIENT_CONTEXT<\/code> appears, it returns <code>grounded=false<\/code> and no citations. Phase 6 adds RAGAS-based eval to measure hallucination rate systematically.<\/p>\n<p><strong>Q: What happens if the user asks something outside the corpus?<\/strong> FAISS still returns the top-k most similar chunks (it always returns k results). But the similarity scores will be low and the chunks won't actually be relevant. If Claude follows the system prompt, it returns <code>INSUFFICIENT_CONTEXT<\/code>. If you want a harder safety net, add a similarity threshold filter — drop results below e.g. 0.60 before passing to the LLM.<\/p>\n<p><strong>Q: RAG vs fine-tuning vs long-context LLMs?<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Approach<\/th><th>When to use<\/th><th>Weakness<\/th><\/tr><\/thead><tbody><tr><td><strong>RAG (what we built)<\/strong><\/td><td>Knowledge is in documents, changes often, needs citations<\/td><td>Retrieval quality affects answer quality<\/td><\/tr><tr><td><strong>Fine-tuning<\/strong><\/td><td>Teach the model a new skill or style, not facts<\/td><td>Expensive to retrain, knowledge bakes in and goes stale<\/td><\/tr><tr><td><strong>Long-context LLM<\/strong><\/td><td>Small enough corpus to fit in context window<\/td><td>Very expensive per query, no targeting (all context every time)<\/td><\/tr><\/tbody><\/table><\/div>\n<p>RAG is the right default for \"chat with your docs\" use cases.<\/p>\n<h2 id=\"code-key-files\">Code — key files<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>Role<\/th><\/tr><\/thead><tbody><tr><td><code class=\"srcref\" title=\"source file in the repo\">config.py<\/code><\/td><td>All settings (model, chunk size, paths)<\/td><\/tr><tr><td><code class=\"srcref\" title=\"source file in the repo\">factory.py<\/code><\/td><td>Wires all components together<\/td><\/tr><tr><td><code class=\"srcref\" title=\"source file in the repo\">pipeline.py<\/code><\/td><td>retrieve → build context → generate → cite<\/td><\/tr><tr><td><code class=\"srcref\" title=\"source file in the repo\">serving/app.py<\/code><\/td><td>FastAPI: /health, /query<\/td><\/tr><\/tbody><\/table><\/div>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../08-interview-prep/README.md\" href=\"#\">08-interview-prep/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code-key-files","text":"Code — key files"}],"text":"07 — full pipeline question user text embed same model search faiss top-k context chunks claude generate answer + citations query time — runs live for every question query time: a question becomes an answer with citations the big idea: every piece we've studied connects into one flow. a document goes in at ingest time and a grounded answer with citations comes out at query time. this section ties everything together. files in this folder file what it covers 4-step-flow.md the full ingest → chunk → embed → index → retrieve → generate flow real-query-example.md one real question traced through every component phase1-end-to-end.md how the code components wire together (factory, pipeline, api) 🎯 interview q&a q: walk me through your rag pipeline. \"documents are loaded with llamaindex and split into 512-token, sentence-aware chunks with 64-token overlap. each chunk is embedded with self-hosted bge-small into a 384-dim l2-normalized vector and stored in a faiss flat index. at query time, the question is embedded with the same model, and faiss returns the top-4 chunks by cosine similarity. those chunks are formatted as numbered context passages and sent to claude with a system prompt that forces citation by passage number and returns insufficient_context if the context isn't enough to answer. the pipeline extracts the citation markers from the answer and maps them back to source filenames.\" q: why not just send all documents to the llm? two reasons: cost and quality. cost: llms charge per token — sending 100 full documents per query is expensive. quality: llms have a finite context window and degrade when it's overloaded with irrelevant text. rag retrieves only the relevant few chunks, so the model sees focused, useful context. q: how do you prevent hallucination? two layers. first, the system prompt explicitly tells claude to answer only from the numbered context passages and to reply insufficient_context if the context isn't enough. second, the pipeline checks the response — if insufficient_context appears, it returns grounded=false and no citations. phase 6 adds ragas-based eval to measure hallucination rate systematically. q: what happens if the user asks something outside the corpus? faiss still returns the top-k most similar chunks (it always returns k results). but the similarity scores will be low and the chunks won't actually be relevant. if claude follows the system prompt, it returns insufficient_context . if you want a harder safety net, add a similarity threshold filter — drop results below e.g. 0.60 before passing to the llm. q: rag vs fine-tuning vs long-context llms? approach when to use weakness rag (what we built) knowledge is in documents, changes often, needs citations retrieval quality affects answer quality fine-tuning teach the model a new skill or style, not facts expensive to retrain, knowledge bakes in and goes stale long-context llm small enough corpus to fit in context window very expensive per query, no targeting (all context every time) rag is the right default for \"chat with your docs\" use cases. code — key files file role config.py all settings (model, chunk size, paths) factory.py wires all components together pipeline.py retrieve → build context → generate → cite serving/app.py fastapi: /health, /query → next: 08-interview-prep/readme.md","words":525},{"path":"07-full-pipeline/4-step-flow.md","title":"The 4-Step Flow","section":"7 · Full Pipeline","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"the-4-step-flow\">The 4-Step Flow<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 132\" role=\"img\" aria-label=\"The four steps every query runs through\"><rect class=\"dg-box\" x=\"18\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"68\" y=\"73\" text-anchor=\"middle\">Question<\/text><text class=\"dg-sub\" x=\"68\" y=\"90\" text-anchor=\"middle\">user text<\/text><line class=\"dg-line\" x1=\"118\" y1=\"75\" x2=\"127\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"127,70 134,75 127,80\"/><rect class=\"dg-box\" x=\"134\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"184\" y=\"73\" text-anchor=\"middle\">Embed<\/text><text class=\"dg-sub\" x=\"184\" y=\"90\" text-anchor=\"middle\">same model<\/text><line class=\"dg-line\" x1=\"234\" y1=\"75\" x2=\"243\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"243,70 250,75 243,80\"/><rect class=\"dg-box\" x=\"250\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"300\" y=\"73\" text-anchor=\"middle\">Search<\/text><text class=\"dg-sub\" x=\"300\" y=\"90\" text-anchor=\"middle\">FAISS top-k<\/text><line class=\"dg-line\" x1=\"350\" y1=\"75\" x2=\"359\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"359,70 366,75 359,80\"/><rect class=\"dg-box\" x=\"366\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"416\" y=\"73\" text-anchor=\"middle\">Context<\/text><text class=\"dg-sub\" x=\"416\" y=\"90\" text-anchor=\"middle\">chunks<\/text><line class=\"dg-line\" x1=\"466\" y1=\"75\" x2=\"475\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"475,70 482,75 475,80\"/><rect class=\"dg-box dg-hot\" x=\"482\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"532\" y=\"73\" text-anchor=\"middle\">Claude<\/text><text class=\"dg-sub\" x=\"532\" y=\"90\" text-anchor=\"middle\">generate<\/text><line class=\"dg-line\" x1=\"582\" y1=\"75\" x2=\"591\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"591,70 598,75 591,80\"/><rect class=\"dg-box\" x=\"598\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"648\" y=\"73\" text-anchor=\"middle\">Answer<\/text><text class=\"dg-sub\" x=\"648\" y=\"90\" text-anchor=\"middle\">+ citations<\/text><text class=\"dg-sub\" x=\"360\" y=\"20\" text-anchor=\"middle\">Query time — runs live for every question<\/text><\/svg><figcaption>The four steps every query runs through<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two phases: <strong>ingest<\/strong> (run once, builds the index) and <strong>query<\/strong> (runs on every request). Everything we've learned lives in these two phases.<\/div><\/div>\n<h2 id=\"phase-a-ingest-run-once\">Phase A: Ingest (run once)<\/h2>\n<pre><code>make ingest<\/code><\/pre>\n<pre><code>Step 1: LOAD\n  LlamaIndex SimpleDirectoryReader\n  → reads all files in data/sample_docs/\n  → produces: list of Document objects (raw text + filename)\n\n         ↓\n\nStep 2: CHUNK\n  LlamaIndex SentenceSplitter (chunk_size=512, chunk_overlap=64)\n  → splits each Document into overlapping pieces\n  → produces: list of Chunk objects\n              each has: id, text (~380 words), source (filename), metadata\n\n         ↓\n\nStep 3: EMBED\n  sentence-transformers bge-small-en-v1.5\n  → converts each chunk's text to a 384-float vector\n  → normalizes each vector to length 1.0 (L2 normalization)\n  → produces: numpy array of shape (N_chunks, 384)\n\n         ↓\n\nStep 4: INDEX\n  FAISS IndexFlatIP\n  → stores all N vectors in a flat array in memory\n  → saves to disk: data/index/index.faiss + data/index/meta.json\n  → produces: a searchable index ready for queries<\/code><\/pre>\n<h2 id=\"phase-b-query-every-request\">Phase B: Query (every request)<\/h2>\n<pre><code>POST /query  {\"question\": \"How do black holes form?\"}<\/code><\/pre>\n<pre><code>Step 1: EMBED QUESTION\n  same bge-small model\n  → \"How do black holes form?\" → 384-float vector, normalized\n  → MUST use same model as ingest (same vector space)\n\n         ↓\n\nStep 2: RETRIEVE\n  FAISS.search(query_vector, top_k=4)\n  → computes inner product (= cosine similarity) vs all stored vectors\n  → returns top-4 by score\n  → looks up text/source for each position\n  → produces: [SearchResult(chunk, score), ...]\n              0.8141 black_holes.md, 0.6333 stellar_lifecycle.md, ...\n\n         ↓\n\nStep 3: BUILD CONTEXT\n  RAGPipeline._build_context(results)\n  → formats chunks as numbered passages:\n      [1] (source: black_holes.md)\n      A black hole is a region of spacetime where gravity...\n\n      [2] (source: stellar_lifecycle.md)\n      A star much more massive than the Sun... supernova...\n  → produces: a single string for the LLM\n\n         ↓\n\nStep 4: GENERATE + CITE\n  the LLM (local Ollama model, or cloud Claude)\n  → receives: system prompt + context passages + question\n  → system prompt enforces: cite with [1][2][3], reply INSUFFICIENT_CONTEXT\n    if context is not enough\n  → produces: answer string with inline citations\n\n         ↓\n\nStep 5: EXTRACT CITATIONS\n  RAGPipeline._extract_citations(answer, results)\n  → finds [1], [2], [3] markers in the answer text\n  → maps each marker back to the chunk's source filename and score\n  → produces: list of Citation objects\n\n         ↓\n\nRESPONSE\n  QueryResponse {\n    answer: \"Black holes form when matter collapses past its event horizon [1].\n             Stellar-mass black holes form from collapsing massive stars [1][2].\",\n    citations: [\n      {marker: 1, source: \"black_holes.md\", score: 0.8141, snippet: \"...\"},\n      {marker: 2, source: \"stellar_lifecycle.md\", score: 0.6333, snippet: \"...\"}\n    ],\n    model: \"deepseek-coder-v2:16b-lite-instruct-q4_K_M\",\n    grounded: true,\n    latency_ms: 14637.0\n  }<\/code><\/pre>\n<h2 id=\"the-guardrail\">The guardrail<\/h2>\n<p>If the LLM returns <code>INSUFFICIENT_CONTEXT<\/code> anywhere in the answer:<\/p>\n<ul><li><code>grounded = false<\/code><\/li><li><code>citations = []<\/code><\/li><li>The raw <code>INSUFFICIENT_CONTEXT<\/code> string is returned as the answer<\/li><\/ul>\n<p>This is a soft guardrail: it relies on Claude following the system prompt. Phase 5 (LangGraph agent) adds a harder structural guardrail.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"real-query-example.md\" href=\"#\">real-query-example.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"phase-a-ingest-run-once","text":"Phase A: Ingest (run once)"},{"level":2,"id":"phase-b-query-every-request","text":"Phase B: Query (every request)"},{"level":2,"id":"the-guardrail","text":"The guardrail"}],"text":"the 4-step flow question user text embed same model search faiss top-k context chunks claude generate answer + citations query time — runs live for every question the four steps every query runs through 💡 tl;dr two phases: ingest (run once, builds the index) and query (runs on every request). everything we've learned lives in these two phases. phase a: ingest (run once) make ingest step 1: load llamaindex simpledirectoryreader → reads all files in data/sample_docs/ → produces: list of document objects (raw text + filename) ↓ step 2: chunk llamaindex sentencesplitter (chunk_size=512, chunk_overlap=64) → splits each document into overlapping pieces → produces: list of chunk objects each has: id, text (~380 words), source (filename), metadata ↓ step 3: embed sentence-transformers bge-small-en-v1.5 → converts each chunk's text to a 384-float vector → normalizes each vector to length 1.0 (l2 normalization) → produces: numpy array of shape (n_chunks, 384) ↓ step 4: index faiss indexflatip → stores all n vectors in a flat array in memory → saves to disk: data/index/index.faiss + data/index/meta.json → produces: a searchable index ready for queries phase b: query (every request) post /query {\"question\": \"how do black holes form?\"} step 1: embed question same bge-small model → \"how do black holes form?\" → 384-float vector, normalized → must use same model as ingest (same vector space) ↓ step 2: retrieve faiss.search(query_vector, top_k=4) → computes inner product (= cosine similarity) vs all stored vectors → returns top-4 by score → looks up text/source for each position → produces: [searchresult(chunk, score), ...] 0.8141 black_holes.md, 0.6333 stellar_lifecycle.md, ... ↓ step 3: build context ragpipeline._build_context(results) → formats chunks as numbered passages: [1] (source: black_holes.md) a black hole is a region of spacetime where gravity... [2] (source: stellar_lifecycle.md) a star much more massive than the sun... supernova... → produces: a single string for the llm ↓ step 4: generate + cite the llm (local ollama model, or cloud claude) → receives: system prompt + context passages + question → system prompt enforces: cite with [1][2][3], reply insufficient_context if context is not enough → produces: answer string with inline citations ↓ step 5: extract citations ragpipeline._extract_citations(answer, results) → finds [1], [2], [3] markers in the answer text → maps each marker back to the chunk's source filename and score → produces: list of citation objects ↓ response queryresponse { answer: \"black holes form when matter collapses past its event horizon [1]. stellar-mass black holes form from collapsing massive stars [1][2].\", citations: [ {marker: 1, source: \"black_holes.md\", score: 0.8141, snippet: \"...\"}, {marker: 2, source: \"stellar_lifecycle.md\", score: 0.6333, snippet: \"...\"} ], model: \"deepseek-coder-v2:16b-lite-instruct-q4_k_m\", grounded: true, latency_ms: 14637.0 } the guardrail if the llm returns insufficient_context anywhere in the answer: grounded = false citations = [] the raw insufficient_context string is returned as the answer this is a soft guardrail: it relies on claude following the system prompt. phase 5 (langgraph agent) adds a harder structural guardrail. → next: real-query-example.md","words":485},{"path":"07-full-pipeline/phase1-end-to-end.md","title":"How the Code Wires Together","section":"7 · Full Pipeline","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"phase-1-how-the-code-wires-together\">Phase 1 — How the Code Wires Together<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three Python entry points (ingest, demo, serve) and four key files (config, factory, pipeline, app). Everything flows through <code>factory.py<\/code>.<\/div><\/div>\n<h2 id=\"the-key-files\">The key files<\/h2>\n<pre><code>docsmind/\n  config.py       ← all settings in one place (env-overridable)\n  factory.py      ← wires Embedder + VectorStore + Retriever + LLM + Pipeline\n  pipeline.py     ← retrieve → build context → generate → extract citations\n  serving/app.py  ← FastAPI: /health and /query endpoints<\/code><\/pre>\n<h2 id=\"configpy-single-source-of-truth\">config.py — single source of truth<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Settings(BaseSettings):\n    cloud_llm_model: <span class=\"tok-builtin\">str<\/span> = <span class=\"tok-string\">\"claude-opus-4-8\"<\/span>   <span class=\"tok-comment\"># change via DOCSMIND_CLOUD_LLM_MODEL=<\/span>\n    embed_model: <span class=\"tok-builtin\">str<\/span> = <span class=\"tok-string\">\"BAAI/bge-small-en-v1.5\"<\/span>\n    index_type: <span class=\"tok-builtin\">str<\/span> = <span class=\"tok-string\">\"flat\"<\/span>\n    top_k: <span class=\"tok-builtin\">int<\/span> = <span class=\"tok-number\">4<\/span>\n    chunk_size: <span class=\"tok-builtin\">int<\/span> = <span class=\"tok-number\">512<\/span>\n    chunk_overlap: <span class=\"tok-builtin\">int<\/span> = <span class=\"tok-number\">64<\/span>\n    data_dir: Path = Path(<span class=\"tok-string\">\"data/sample_docs\"<\/span>)\n    index_dir: Path = Path(<span class=\"tok-string\">\"data/index\"<\/span>)<\/code><\/pre>\n<p>All components read from this. To change the model or chunk size, set an env var — no code changes needed.<\/p>\n<h2 id=\"factorypy-the-composition-root\">factory.py — the composition root<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> build_pipeline(settings: Settings) -&gt; RAGPipeline:\n    embedder = Embedder(settings.embed_model)\n    store = FaissVectorStore.load(settings.index_dir)\n    retriever = Retriever(embedder, store)\n    llm = CloudLLMClient(settings.cloud_llm_model)\n    <span class=\"tok-keyword\">return<\/span> RAGPipeline(retriever, llm, settings)<\/code><\/pre>\n<p>One function. Reads settings, builds every component, wires them together, returns a ready <code>RAGPipeline<\/code>. This is called once at server startup.<\/p>\n<h2 id=\"pipelinepy-the-core-logic\">pipeline.py — the core logic<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> RAGPipeline:\n    <span class=\"tok-keyword\">def<\/span> query(<span class=\"tok-keyword\">self<\/span>, question: <span class=\"tok-builtin\">str<\/span>, top_k: <span class=\"tok-builtin\">int<\/span> = <span class=\"tok-keyword\">None<\/span>) -&gt; QueryResponse:\n        results = <span class=\"tok-keyword\">self<\/span>._retriever.retrieve(question, top_k)\n\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> results:\n            <span class=\"tok-keyword\">return<\/span> QueryResponse(answer=INSUFFICIENT, grounded=<span class=\"tok-keyword\">False<\/span>, ...)\n\n        context = <span class=\"tok-keyword\">self<\/span>._build_context(results)   <span class=\"tok-comment\"># numbered passages [1],[2],...<\/span>\n        prompt = <span class=\"tok-string\">f\"Context passages:\\n\\n{context}\\n\\nQuestion: {question}\\n\\nAnswer:\"<\/span>\n        answer = <span class=\"tok-keyword\">self<\/span>._llm.generate(SYSTEM_PROMPT, prompt, max_tokens)\n\n        grounded = INSUFFICIENT <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">in<\/span> answer\n        citations = <span class=\"tok-keyword\">self<\/span>._extract_citations(answer, results) <span class=\"tok-keyword\">if<\/span> grounded <span class=\"tok-keyword\">else<\/span> []\n\n        <span class=\"tok-keyword\">return<\/span> QueryResponse(answer=answer, citations=citations, grounded=grounded, ...)<\/code><\/pre>\n<h2 id=\"servingapppy-the-api\">serving/app.py — the API<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-decorator\">@app<\/span>.post(<span class=\"tok-string\">\"/query\"<\/span>, response_model=QueryResponse)\n<span class=\"tok-keyword\">def<\/span> query(request: QueryRequest) -&gt; QueryResponse:\n    <span class=\"tok-keyword\">return<\/span> pipeline.query(request.question, request.top_k)<\/code><\/pre>\n<p>One line. The pipeline object is built at startup (via <code>lifespan<\/code>) and reused for every request. No rebuilding, no reloading the model per request.<\/p>\n<h2 id=\"the-three-entry-points\">The three entry points<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># 1. Build the index (ingest)<\/span>\n<span class=\"tok-command\">make<\/span> ingest\n<span class=\"tok-comment\"># → runs scripts/ingest.py<\/span>\n<span class=\"tok-comment\"># → loads docs, chunks, embeds, stores to data/index/<\/span>\n\n<span class=\"tok-comment\"># 2. Run a query in the terminal (demo)<\/span>\n<span class=\"tok-command\">make<\/span> demo\n<span class=\"tok-comment\"># → runs scripts/demo.py<\/span>\n<span class=\"tok-comment\"># → builds pipeline, runs one question, prints answer + citations<\/span>\n\n<span class=\"tok-comment\"># 3. Serve the API (production-ish)<\/span>\n<span class=\"tok-command\">make<\/span> serve\n<span class=\"tok-comment\"># → starts uvicorn on localhost:8000<\/span>\n<span class=\"tok-comment\"># → loads pipeline from disk<\/span>\n<span class=\"tok-comment\"># → handles POST /query requests<\/span><\/code><\/pre>\n<h2 id=\"dependency-graph\">Dependency graph<\/h2>\n<pre><code>Settings\n   ↓\n   ├── Embedder (bge-small)\n   ├── FaissVectorStore (loaded from disk)\n   │     ↑ built by Embedder during ingest\n   ├── Retriever (Embedder + VectorStore)\n   ├── CloudLLMClient (Anthropic SDK)\n   └── RAGPipeline (Retriever + LLMClient + Settings)\n         ↑ served by FastAPI app<\/code><\/pre>\n<p>Every component is constructed once, injected into the one that needs it (dependency injection). No global state, no singletons — easy to test in isolation.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../08-interview-prep/README.md\" href=\"#\">08-interview-prep/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-key-files","text":"The key files"},{"level":2,"id":"configpy-single-source-of-truth","text":"config.py — single source of truth"},{"level":2,"id":"factorypy-the-composition-root","text":"factory.py — the composition root"},{"level":2,"id":"pipelinepy-the-core-logic","text":"pipeline.py — the core logic"},{"level":2,"id":"servingapppy-the-api","text":"serving/app.py — the API"},{"level":2,"id":"the-three-entry-points","text":"The three entry points"},{"level":2,"id":"dependency-graph","text":"Dependency graph"}],"text":"phase 1 — how the code wires together 💡 tl;dr three python entry points (ingest, demo, serve) and four key files (config, factory, pipeline, app). everything flows through factory.py . the key files docsmind/ config.py ← all settings in one place (env-overridable) factory.py ← wires embedder + vectorstore + retriever + llm + pipeline pipeline.py ← retrieve → build context → generate → extract citations serving/app.py ← fastapi: /health and /query endpoints config.py — single source of truth class settings(basesettings): cloud_llm_model: str = \"claude-opus-4-8\" # change via docsmind_cloud_llm_model= embed_model: str = \"baai/bge-small-en-v1.5\" index_type: str = \"flat\" top_k: int = 4 chunk_size: int = 512 chunk_overlap: int = 64 data_dir: path = path( \"data/sample_docs\" ) index_dir: path = path( \"data/index\" ) all components read from this. to change the model or chunk size, set an env var — no code changes needed. factory.py — the composition root def build_pipeline(settings: settings) -> ragpipeline: embedder = embedder(settings.embed_model) store = faissvectorstore.load(settings.index_dir) retriever = retriever(embedder, store) llm = cloudllmclient(settings.cloud_llm_model) return ragpipeline(retriever, llm, settings) one function. reads settings, builds every component, wires them together, returns a ready ragpipeline . this is called once at server startup. pipeline.py — the core logic class ragpipeline: def query( self , question: str , top_k: int = none ) -> queryresponse: results = self ._retriever.retrieve(question, top_k) if not results: return queryresponse(answer=insufficient, grounded= false , ...) context = self ._build_context(results) # numbered passages [1],[2],... prompt = f\"context passages:\\n\\n{context}\\n\\nquestion: {question}\\n\\nanswer:\" answer = self ._llm.generate(system_prompt, prompt, max_tokens) grounded = insufficient not in answer citations = self ._extract_citations(answer, results) if grounded else [] return queryresponse(answer=answer, citations=citations, grounded=grounded, ...) serving/app.py — the api @app .post( \"/query\" , response_model=queryresponse) def query(request: queryrequest) -> queryresponse: return pipeline.query(request.question, request.top_k) one line. the pipeline object is built at startup (via lifespan ) and reused for every request. no rebuilding, no reloading the model per request. the three entry points # 1. build the index (ingest) make ingest # → runs scripts/ingest.py # → loads docs, chunks, embeds, stores to data/index/ # 2. run a query in the terminal (demo) make demo # → runs scripts/demo.py # → builds pipeline, runs one question, prints answer + citations # 3. serve the api (production-ish) make serve # → starts uvicorn on localhost:8000 # → loads pipeline from disk # → handles post /query requests dependency graph settings ↓ ├── embedder (bge-small) ├── faissvectorstore (loaded from disk) │ ↑ built by embedder during ingest ├── retriever (embedder + vectorstore) ├── cloudllmclient (anthropic sdk) └── ragpipeline (retriever + llmclient + settings) ↑ served by fastapi app every component is constructed once, injected into the one that needs it (dependency injection). no global state, no singletons — easy to test in isolation. → back to: readme.md → next topic: 08-interview-prep/readme.md","words":456},{"path":"07-full-pipeline/real-query-example.md","title":"Real Query Example — End to End","section":"7 · Full Pipeline","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"real-query-example-end-to-end\">Real Query Example — End to End<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> One question traced through every single step, with the <em>actual<\/em> values measured from the running system (space corpus, local model).<\/div><\/div>\n<h2 id=\"the-question\">The question<\/h2>\n<pre><code>\"How do black holes form?\"<\/code><\/pre>\n<hr>\n<h2 id=\"1-embed-the-question\">1. Embed the question<\/h2>\n<pre><code class=\"language-python\">embedder.encode([<span class=\"tok-string\">\"How do black holes form?\"<\/span>])\n<span class=\"tok-comment\"># Output (first 8 of 384 values, normalized):<\/span>\n<span class=\"tok-comment\"># [0.038, -0.021, 0.071, -0.044, 0.083, -0.015, 0.062, 0.039, ...]<\/span>\n<span class=\"tok-comment\"># length: 1.0 ✓<\/span><\/code><\/pre>\n<hr>\n<h2 id=\"2-faiss-search\">2. FAISS search<\/h2>\n<p>FAISS compares the question vector to all 5 chunk vectors. Top-4 by inner product (= cosine similarity), real measured scores:<\/p>\n<pre><code>Score   Source\n0.8141  black_holes.md        ← direct hit\n0.6333  stellar_lifecycle.md  ← genuinely related (massive stars → black holes)\n0.5691  solar_system.md       ← same domain, off-topic\n0.5240  rocket_propulsion.md  ← same domain, off-topic\n0.5140  the_iss.md            ← 5th place, not in top-4<\/code><\/pre>\n<hr>\n<h2 id=\"3-build-context\">3. Build context<\/h2>\n<pre><code>[1] (source: black_holes.md)\nA black hole is a region of spacetime where gravity is so strong that nothing —\nnot even light — can escape once it crosses the boundary. Stellar-mass black\nholes form when a massive star, typically more than about 20 times the mass of\nthe Sun, exhausts its fuel and collapses in a supernova. Supermassive black\nholes, millions to billions of times the mass of the Sun, sit at the centers of\nmost galaxies.\n\n[2] (source: stellar_lifecycle.md)\nA star much more massive than the Sun burns through its fuel quickly and becomes\na red supergiant. When its core can no longer support itself, it collapses and\nrebounds in a supernova; the most massive cores collapse completely into a\nblack hole.\n\n[3] (source: solar_system.md)\nThe Sun is a main-sequence star that fuses hydrogen into helium in its core,\nthe gravitational anchor of the entire system.\n\n[4] (source: rocket_propulsion.md)\nTo leave Earth's gravity entirely, a spacecraft must reach escape velocity,\nabout 11.2 kilometers per second.<\/code><\/pre>\n<hr>\n<h2 id=\"4-send-to-the-llm\">4. Send to the LLM<\/h2>\n<p><strong>System prompt:<\/strong><\/p>\n<pre><code>You are DocsMind, a question-answering assistant for technical and ML\ndocumentation. Answer ONLY from the numbered context passages provided.\nCite every claim with its passage number in square brackets, e.g. [1] or\n[2][3]. Do not use outside knowledge. If the context does not contain enough\ninformation to answer, reply with exactly: INSUFFICIENT_CONTEXT<\/code><\/pre>\n<p><strong>User message:<\/strong> the 4 context passages above + the question.<\/p>\n<hr>\n<h2 id=\"5-the-llms-response-real-output-local-model\">5. The LLM's response (real output, local model)<\/h2>\n<pre><code>Black holes form when matter is compressed into a small enough volume that its\nescape velocity exceeds the speed of light [1]. This occurs in two main ways:\nstellar-mass black holes form from the collapse of massive stars, typically more\nthan about 20 times the mass of the Sun, following a supernova event [1][2], and\nsupermassive black holes are believed to form at the centers of galaxies,\nincluding our Milky Way, with masses ranging in the millions to billions of times\nthat of the Sun [1][3].<\/code><\/pre>\n<p>The model synthesized passages [1], [2], and [3] into one grounded answer. It ignored [4] (the rocket passage) — irrelevant to formation.<\/p>\n<hr>\n<h2 id=\"6-extract-citations\">6. Extract citations<\/h2>\n<p>Parse <code>[1]<\/code>, <code>[2]<\/code>, <code>[3]<\/code> from the answer text:<\/p>\n<pre><code class=\"language-python\">cited_markers = {<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">3<\/span>}  <span class=\"tok-comment\"># found in the answer<\/span>\n\ncitations = [\n    Citation(marker=<span class=\"tok-number\">1<\/span>, source=<span class=\"tok-string\">\"black_holes.md\"<\/span>, score=<span class=\"tok-number\">0.8141<\/span>,\n             snippet=<span class=\"tok-string\">\"A black hole is a region of spacetime where gravity...\"<\/span>),\n    Citation(marker=<span class=\"tok-number\">2<\/span>, source=<span class=\"tok-string\">\"stellar_lifecycle.md\"<\/span>, score=<span class=\"tok-number\">0.6333<\/span>,\n             snippet=<span class=\"tok-string\">\"A star much more massive than the Sun... supernova...\"<\/span>),\n    Citation(marker=<span class=\"tok-number\">3<\/span>, source=<span class=\"tok-string\">\"solar_system.md\"<\/span>, score=<span class=\"tok-number\">0.5691<\/span>,\n             snippet=<span class=\"tok-string\">\"The Sun is a main-sequence star that fuses hydrogen...\"<\/span>),\n]<\/code><\/pre>\n<hr>\n<h2 id=\"7-final-response-json-from-api\">7. Final response (JSON from API)<\/h2>\n<pre><code class=\"language-json\">{\n  \"answer\": \"Black holes form when matter is compressed into a small enough volume...\",\n  \"citations\": [\n    {\"marker\": 1, \"source\": \"black_holes.md\", \"score\": 0.8141, \"snippet\": \"...\"},\n    {\"marker\": 2, \"source\": \"stellar_lifecycle.md\", \"score\": 0.6333, \"snippet\": \"...\"},\n    {\"marker\": 3, \"source\": \"solar_system.md\", \"score\": 0.5691, \"snippet\": \"...\"}\n  ],\n  \"model\": \"deepseek-coder-v2:16b-lite-instruct-q4_K_M\",\n  \"grounded\": true,\n  \"latency_ms\": 14637.0\n}<\/code><\/pre>\n<p>Every claim in the answer is traceable to a specific file, a specific chunk, and a specific similarity score. That's what \"grounded RAG\" means.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"phase1-end-to-end.md\" href=\"#\">phase1-end-to-end.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-question","text":"The question"},{"level":2,"id":"1-embed-the-question","text":"1. Embed the question"},{"level":2,"id":"2-faiss-search","text":"2. FAISS search"},{"level":2,"id":"3-build-context","text":"3. Build context"},{"level":2,"id":"4-send-to-the-llm","text":"4. Send to the LLM"},{"level":2,"id":"5-the-llms-response-real-output-local-model","text":"5. The LLM's response (real output, local model)"},{"level":2,"id":"6-extract-citations","text":"6. Extract citations"},{"level":2,"id":"7-final-response-json-from-api","text":"7. Final response (JSON from API)"}],"text":"real query example — end to end 💡 tl;dr one question traced through every single step, with the actual values measured from the running system (space corpus, local model). the question \"how do black holes form?\" 1. embed the question embedder.encode([ \"how do black holes form?\" ]) # output (first 8 of 384 values, normalized): # [0.038, -0.021, 0.071, -0.044, 0.083, -0.015, 0.062, 0.039, ...] # length: 1.0 ✓ 2. faiss search faiss compares the question vector to all 5 chunk vectors. top-4 by inner product (= cosine similarity), real measured scores: score source 0.8141 black_holes.md ← direct hit 0.6333 stellar_lifecycle.md ← genuinely related (massive stars → black holes) 0.5691 solar_system.md ← same domain, off-topic 0.5240 rocket_propulsion.md ← same domain, off-topic 0.5140 the_iss.md ← 5th place, not in top-4 3. build context [1] (source: black_holes.md) a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape once it crosses the boundary. stellar-mass black holes form when a massive star, typically more than about 20 times the mass of the sun, exhausts its fuel and collapses in a supernova. supermassive black holes, millions to billions of times the mass of the sun, sit at the centers of most galaxies. [2] (source: stellar_lifecycle.md) a star much more massive than the sun burns through its fuel quickly and becomes a red supergiant. when its core can no longer support itself, it collapses and rebounds in a supernova; the most massive cores collapse completely into a black hole. [3] (source: solar_system.md) the sun is a main-sequence star that fuses hydrogen into helium in its core, the gravitational anchor of the entire system. [4] (source: rocket_propulsion.md) to leave earth's gravity entirely, a spacecraft must reach escape velocity, about 11.2 kilometers per second. 4. send to the llm system prompt: you are docsmind, a question-answering assistant for technical and ml documentation. answer only from the numbered context passages provided. cite every claim with its passage number in square brackets, e.g. [1] or [2][3]. do not use outside knowledge. if the context does not contain enough information to answer, reply with exactly: insufficient_context user message: the 4 context passages above + the question. 5. the llm's response (real output, local model) black holes form when matter is compressed into a small enough volume that its escape velocity exceeds the speed of light [1]. this occurs in two main ways: stellar-mass black holes form from the collapse of massive stars, typically more than about 20 times the mass of the sun, following a supernova event [1][2], and supermassive black holes are believed to form at the centers of galaxies, including our milky way, with masses ranging in the millions to billions of times that of the sun [1][3]. the model synthesized passages [1], [2], and [3] into one grounded answer. it ignored [4] (the rocket passage) — irrelevant to formation. 6. extract citations parse [1] , [2] , [3] from the answer text: cited_markers = { 1 , 2 , 3 } # found in the answer citations = [ citation(marker= 1 , source= \"black_holes.md\" , score= 0.8141 , snippet= \"a black hole is a region of spacetime where gravity...\" ), citation(marker= 2 , source= \"stellar_lifecycle.md\" , score= 0.6333 , snippet= \"a star much more massive than the sun... supernova...\" ), citation(marker= 3 , source= \"solar_system.md\" , score= 0.5691 , snippet= \"the sun is a main-sequence star that fuses hydrogen...\" ), ] 7. final response (json from api) { \"answer\": \"black holes form when matter is compressed into a small enough volume...\", \"citations\": [ {\"marker\": 1, \"source\": \"black_holes.md\", \"score\": 0.8141, \"snippet\": \"...\"}, {\"marker\": 2, \"source\": \"stellar_lifecycle.md\", \"score\": 0.6333, \"snippet\": \"...\"}, {\"marker\": 3, \"source\": \"solar_system.md\", \"score\": 0.5691, \"snippet\": \"...\"} ], \"model\": \"deepseek-coder-v2:16b-lite-instruct-q4_k_m\", \"grounded\": true, \"latency_ms\": 14637.0 } every claim in the answer is traceable to a specific file, a specific chunk, and a specific similarity score. that's what \"grounded rag\" means. → next: phase1-end-to-end.md","words":656},{"path":"08-interview-prep/README.md","title":"Overview","section":"8 · Interview Prep","quiz":false,"accent":"#7479e6","html":"<h1 id=\"08-interview-prep\">08 — Interview Prep<\/h1>\n<p><strong>The big idea:<\/strong> Interviewers don't just ask \"what is FAISS?\" — they ask \"why FAISS over Pinecone?\" and \"when would you NOT use it?\" These are the tricky questions that separate someone who used a tool from someone who understands it. This folder collects every \"why X over Y\" question by topic.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"chunking-questions.md\" href=\"#\">chunking-questions.md<\/a><\/td><td>Chunk size, overlap, splitter type tradeoffs<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"embedding-questions.md\" href=\"#\">embedding-questions.md<\/a><\/td><td>Self-hosted vs cloud, bi-encoder vs cross-encoder, dimensions<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"retrieval-questions.md\" href=\"#\">retrieval-questions.md<\/a><\/td><td>FAISS vs Pinecone, Flat vs HNSW, exact vs approximate<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"index-questions.md\" href=\"#\">index-questions.md<\/a><\/td><td>Flat/IVF/HNSW/PQ with real benchmark numbers, Qdrant vs FAISS<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"hybrid-questions.md\" href=\"#\">hybrid-questions.md<\/a><\/td><td>BM25, RRF, cross-encoder reranking, eval results, debugging retrieval<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"generation-questions.md\" href=\"#\">generation-questions.md<\/a><\/td><td>Prompting Claude, citations, guardrail, latency, streaming<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"pipeline-questions.md\" href=\"#\">pipeline-questions.md<\/a><\/td><td>RAG vs fine-tuning, hallucination, top-k, LangChain vs SDK<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/td><td>One page — all key \"why this\" answers in 2 sentences each<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"how-to-use-this\">How to use this<\/h2>\n<ul><li>Read the topic files when you want depth on a specific area.<\/li><li>Read <code>cheat-sheet.md<\/code> the morning of an interview.<\/li><li>For any question: lead with <strong>what<\/strong> the choice is, then <strong>why<\/strong> it beats<\/li><\/ul>\n<p>the alternatives, then <strong>when<\/strong> you'd make a different choice.<\/p>\n<p>→ Start with: <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/strong> for a fast overview, then drill into topic files for depth.<\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"how-to-use-this","text":"How to use this"}],"text":"08 — interview prep the big idea: interviewers don't just ask \"what is faiss?\" — they ask \"why faiss over pinecone?\" and \"when would you not use it?\" these are the tricky questions that separate someone who used a tool from someone who understands it. this folder collects every \"why x over y\" question by topic. files in this folder file what it covers chunking-questions.md chunk size, overlap, splitter type tradeoffs embedding-questions.md self-hosted vs cloud, bi-encoder vs cross-encoder, dimensions retrieval-questions.md faiss vs pinecone, flat vs hnsw, exact vs approximate index-questions.md flat/ivf/hnsw/pq with real benchmark numbers, qdrant vs faiss hybrid-questions.md bm25, rrf, cross-encoder reranking, eval results, debugging retrieval generation-questions.md prompting claude, citations, guardrail, latency, streaming pipeline-questions.md rag vs fine-tuning, hallucination, top-k, langchain vs sdk cheat-sheet.md one page — all key \"why this\" answers in 2 sentences each how to use this read the topic files when you want depth on a specific area. read cheat-sheet.md the morning of an interview. for any question: lead with what the choice is, then why it beats the alternatives, then when you'd make a different choice. → start with: cheat-sheet.md for a fast overview, then drill into topic files for depth.","words":196},{"path":"08-interview-prep/chunking-questions.md","title":"Chunking Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"chunking-interview-questions\">Chunking — Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: Why chunk at all? Why not embed the whole document?<\/summary><div class=\"qa-body\"><p>Embedding a whole document averages all its topics into one blurry vector. A chunk about HNSW gives a sharp, focused embedding. Retrieval precision drops sharply when documents are too large because the embedding can't represent multiple unrelated ideas simultaneously.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Big chunks vs small chunks — what's the tradeoff?<\/summary><div class=\"qa-body\"><div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Small (e.g. 128 tokens)<\/th><th>Large (e.g. 1024 tokens)<\/th><\/tr><\/thead><tbody><tr><td>Embedding focus<\/td><td>Sharp — one idea<\/td><td>Blurry — averaged meaning<\/td><\/tr><tr><td>Context per hit<\/td><td>May be too little<\/td><td>Rich surrounding context<\/td><\/tr><tr><td>Missed boundaries<\/td><td>More<\/td><td>Fewer<\/td><\/tr><tr><td>Number of vectors<\/td><td>More (more storage)<\/td><td>Fewer<\/td><\/tr><\/tbody><\/table><\/div>\n<p>512 tokens is a common sweet spot for English technical prose. You tune it against an eval set, not by intuition.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why is chunk size tied to the embedding model?<\/summary><div class=\"qa-body\"><p>bge-small-en-v1.5 has a max input of <strong>512 tokens<\/strong>. If a chunk is longer, the model <em>silently truncates<\/em> — the tail is never embedded. Chunk size must never exceed the embedding model's max sequence length or you lose data without knowing it.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why overlap? What does it cost?<\/summary><div class=\"qa-body\"><p>Overlap prevents an idea at a chunk boundary from being cut in half — the same sentence appears at the end of one chunk and the start of the next, so at least one chunk contains it fully. Cost: ~10–20% duplicated storage and occasional duplicate retrieval results.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Fixed-size vs sentence-aware vs semantic chunking?<\/summary><div class=\"qa-body\"><ul><li><strong>Fixed-size:<\/strong> fastest, cuts mid-sentence.<\/li><li><strong>Sentence-aware (Phase 1):<\/strong> respects sentence boundaries, good default.<\/li><li><strong>Semantic:<\/strong> splits where topic changes, best quality, slower.<\/li><li><strong>Structural:<\/strong> splits on headers/code blocks — excellent for markdown docs.<\/li><\/ul>\n<p>You'd mention semantic or structural chunking as \"the next improvement\" if retrieval quality matters.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How would you know if your chunk size is wrong?<\/summary><div class=\"qa-body\"><p>Run an eval set: a set of (question, expected source doc) pairs. Measure recall@k — what fraction of questions retrieved the expected chunk in top-k. If recall is low, the chunk boundaries may be wrong. You don't guess; you measure.<\/p><\/div><\/details>","toc":[],"text":"chunking — interview questions q: why chunk at all? why not embed the whole document? embedding a whole document averages all its topics into one blurry vector. a chunk about hnsw gives a sharp, focused embedding. retrieval precision drops sharply when documents are too large because the embedding can't represent multiple unrelated ideas simultaneously. q: big chunks vs small chunks — what's the tradeoff? small (e.g. 128 tokens) large (e.g. 1024 tokens) embedding focus sharp — one idea blurry — averaged meaning context per hit may be too little rich surrounding context missed boundaries more fewer number of vectors more (more storage) fewer 512 tokens is a common sweet spot for english technical prose. you tune it against an eval set, not by intuition. q: why is chunk size tied to the embedding model? bge-small-en-v1.5 has a max input of 512 tokens . if a chunk is longer, the model silently truncates — the tail is never embedded. chunk size must never exceed the embedding model's max sequence length or you lose data without knowing it. q: why overlap? what does it cost? overlap prevents an idea at a chunk boundary from being cut in half — the same sentence appears at the end of one chunk and the start of the next, so at least one chunk contains it fully. cost: ~10–20% duplicated storage and occasional duplicate retrieval results. q: fixed-size vs sentence-aware vs semantic chunking? fixed-size: fastest, cuts mid-sentence. sentence-aware (phase 1): respects sentence boundaries, good default. semantic: splits where topic changes, best quality, slower. structural: splits on headers/code blocks — excellent for markdown docs. you'd mention semantic or structural chunking as \"the next improvement\" if retrieval quality matters. q: how would you know if your chunk size is wrong? run an eval set: a set of (question, expected source doc) pairs. measure recall@k — what fraction of questions retrieved the expected chunk in top-k. if recall is low, the chunk boundaries may be wrong. you don't guess; you measure.","words":332},{"path":"08-interview-prep/embedding-questions.md","title":"Embedding Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"embeddings-interview-questions\">Embeddings — Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: Why self-hosted bge-small over OpenAI embeddings?<\/summary><div class=\"qa-body\"><p>Embedding is a <strong>bulk operation<\/strong> — you encode your entire corpus at ingest. 100k chunks on a paid API costs real money and hits rate limits. Self-hosted runs locally, is free after download, and your documents never leave your infrastructure. bge-small is MIT-licensed (no lock-in) and achieves strong quality on English technical text. If you needed multilingual support or top-tier quality, you'd evaluate a larger or cloud model — it's a one-line swap in the <code>Embedder<\/code> class.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why do the query and documents have to use the same embedding model?<\/summary><div class=\"qa-body\"><p>Each model learns its own vector space. A vector from model A and a vector from model B live in completely different coordinate systems. Comparing them with cosine similarity is like measuring the distance between a GPS coordinate in WGS84 and one in a local grid — meaningless. Same model at ingest and query is non-negotiable.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Dense embeddings vs BM25 — which is better?<\/summary><div class=\"qa-body\"><p>Neither alone. Dense captures semantic meaning (\"car\" ≈ \"automobile\") but misses exact tokens, IDs, rare terms. BM25 nails exact matches but is blind to meaning. Hybrid (dense + BM25, scores fused, then reranked) beats either. That's Phase 3 of this project — the right answer is always \"hybrid.\"<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Bi-encoder vs cross-encoder?<\/summary><div class=\"qa-body\"><p><strong>Bi-encoder<\/strong> (what bge-small is): encodes query and document independently. You precompute document vectors once. Fast, scalable to millions of docs.<\/p>\n<p><strong>Cross-encoder<\/strong>: takes (query, document) together as input, much more accurate. But you must run it for every query-doc pair — can't precompute. Used as a <strong>reranker<\/strong> on the top-k results from bi-encoder retrieval. That's Phase 3.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why 384 dimensions and not 1024 or 3072?<\/summary><div class=\"qa-body\"><p>Smaller vectors = faster inner product math + less memory. 384 is enough for English technical prose with bge-small. Larger dimensions help on harder, more diverse, or multilingual content. It's a quality-vs-cost knob you tune with a retrieval eval set.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What is semantic drift?<\/summary><div class=\"qa-body\"><p>If your corpus updates frequently and you want to update your embedding model (e.g. retrain or upgrade), all existing vectors become stale — they were produced by a different model and now live in a different space. You'd have to re-embed and re-index the entire corpus. This is a real ops concern in production, especially for large corpora.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Can you fine-tune an embedding model?<\/summary><div class=\"qa-body\"><p>Yes. If your domain is very specialized (legal, medical, code), a general-purpose embedding model may not capture domain-specific meaning well. Fine-tuning on domain (query, positive_passage, negative_passage) triplets can significantly improve retrieval quality. Mentioned as a future improvement, not Phase 1 scope.<\/p><\/div><\/details>","toc":[],"text":"embeddings — interview questions q: why self-hosted bge-small over openai embeddings? embedding is a bulk operation — you encode your entire corpus at ingest. 100k chunks on a paid api costs real money and hits rate limits. self-hosted runs locally, is free after download, and your documents never leave your infrastructure. bge-small is mit-licensed (no lock-in) and achieves strong quality on english technical text. if you needed multilingual support or top-tier quality, you'd evaluate a larger or cloud model — it's a one-line swap in the embedder class. q: why do the query and documents have to use the same embedding model? each model learns its own vector space. a vector from model a and a vector from model b live in completely different coordinate systems. comparing them with cosine similarity is like measuring the distance between a gps coordinate in wgs84 and one in a local grid — meaningless. same model at ingest and query is non-negotiable. q: dense embeddings vs bm25 — which is better? neither alone. dense captures semantic meaning (\"car\" ≈ \"automobile\") but misses exact tokens, ids, rare terms. bm25 nails exact matches but is blind to meaning. hybrid (dense + bm25, scores fused, then reranked) beats either. that's phase 3 of this project — the right answer is always \"hybrid.\" q: bi-encoder vs cross-encoder? bi-encoder (what bge-small is): encodes query and document independently. you precompute document vectors once. fast, scalable to millions of docs. cross-encoder : takes (query, document) together as input, much more accurate. but you must run it for every query-doc pair — can't precompute. used as a reranker on the top-k results from bi-encoder retrieval. that's phase 3. q: why 384 dimensions and not 1024 or 3072? smaller vectors = faster inner product math + less memory. 384 is enough for english technical prose with bge-small. larger dimensions help on harder, more diverse, or multilingual content. it's a quality-vs-cost knob you tune with a retrieval eval set. q: what is semantic drift? if your corpus updates frequently and you want to update your embedding model (e.g. retrain or upgrade), all existing vectors become stale — they were produced by a different model and now live in a different space. you'd have to re-embed and re-index the entire corpus. this is a real ops concern in production, especially for large corpora. q: can you fine-tune an embedding model? yes. if your domain is very specialized (legal, medical, code), a general-purpose embedding model may not capture domain-specific meaning well. fine-tuning on domain (query, positive_passage, negative_passage) triplets can significantly improve retrieval quality. mentioned as a future improvement, not phase 1 scope.","words":436},{"path":"08-interview-prep/retrieval-questions.md","title":"Retrieval Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"retrieval-interview-questions\">Retrieval — Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: FAISS vs Pinecone / Weaviate / Qdrant?<\/summary><div class=\"qa-body\"><div class=\"table-scroll\"><table><thead><tr><th><\/th><th>FAISS<\/th><th>Pinecone<\/th><th>Qdrant<\/th><\/tr><\/thead><tbody><tr><td>Type<\/td><td>Library (in-process)<\/td><td>Managed cloud service<\/td><td>Open-source DB (self-hosted or cloud)<\/td><\/tr><tr><td>Network overhead<\/td><td>None<\/td><td>HTTP per query<\/td><td>HTTP per query (self-hosted = LAN)<\/td><\/tr><tr><td>Cost<\/td><td>Free<\/td><td>Pay per vector/query<\/td><td>Free (self-hosted)<\/td><\/tr><tr><td>Data privacy<\/td><td>Stays in your process<\/td><td>Sent to Pinecone<\/td><td>Configurable<\/td><\/tr><tr><td>Filtering<\/td><td>Basic<\/td><td>Rich metadata filtering<\/td><td>Rich metadata filtering<\/td><\/tr><tr><td>Scalability<\/td><td>Up to ~10M vectors in RAM<\/td><td>Fully managed, any scale<\/td><td>Production-ready, horizontally scalable<\/td><\/tr><tr><td>Persistence<\/td><td>Manual (write_index)<\/td><td>Automatic<\/td><td>Automatic<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Why FAISS in Phase 1:<\/strong> Simple, zero infra, perfect for a self-hosted portfolio project. <strong>Why Qdrant in Phase 2:<\/strong> adds proper persistence, filtering, and a query API without sending data to a third party. Both are behind the same <code>VectorStore<\/code> interface so the swap is a config change.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why IndexFlatIP in Phase 1 and not HNSW?<\/summary><div class=\"qa-body\"><p>Flat does an exact scan — 100% recall, O(N) time. For 50 chunks it returns in &lt; 1ms. HNSW is approximate — faster at scale but adds graph construction complexity and parameter tuning, and trades a small amount of recall. At 50 vectors exact is the right choice: simplest, most correct, no premature optimization.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Exact vs approximate search — when does the tradeoff matter?<\/summary><div class=\"qa-body\"><p>At ~100k+ vectors, exact search starts to feel slow for interactive use (&gt;50ms). ANN (approximate nearest neighbor) indexes like HNSW return results in 1–5ms at 1M vectors with ~95–99% recall. The 1–5% of missed results is acceptable for most RAG use cases. The crossover point depends on your latency budget and corpus size.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What is recall@k?<\/summary><div class=\"qa-body\"><p>If there are 10 truly relevant chunks in the corpus and you retrieve k=10 results, how many of the 10 true positives appear in your results? Recall@10 = 8/10 = 80%. Measures coverage, not just top-1 quality. ANN indexes target high recall@k (not 100%) while being much faster than exact search.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: When would a similarity threshold filter make sense?<\/summary><div class=\"qa-body\"><p>Phase 1 always returns top-k — even if the best matching chunks are barely relevant (low scores). A threshold (e.g., drop results below 0.60) prevents sending irrelevant context to the LLM. The downside: if your corpus doesn't cover a topic at all, you'd return zero chunks and can't generate any answer. The <code>INSUFFICIENT_CONTEXT<\/code> guardrail in the LLM prompt is a softer alternative.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Cosine similarity vs dot product vs Euclidean distance?<\/summary><div class=\"qa-body\"><p>After L2 normalization (all vectors length 1.0), <strong>cosine similarity equals dot product<\/strong>. So <code>IndexFlatIP<\/code> (inner product) gives you cosine similarity for free — no special cosine index needed.<\/p>\n<p>Euclidean distance is sensitive to vector magnitude (length). Before normalization, a longer chunk might have a larger raw vector and appear artificially \"closer\" to everything. Cosine only cares about direction (angle), which represents meaning. For text retrieval, direction = meaning, magnitude = irrelevant.<\/p><\/div><\/details>","toc":[],"text":"retrieval — interview questions q: faiss vs pinecone / weaviate / qdrant? faiss pinecone qdrant type library (in-process) managed cloud service open-source db (self-hosted or cloud) network overhead none http per query http per query (self-hosted = lan) cost free pay per vector/query free (self-hosted) data privacy stays in your process sent to pinecone configurable filtering basic rich metadata filtering rich metadata filtering scalability up to ~10m vectors in ram fully managed, any scale production-ready, horizontally scalable persistence manual (write_index) automatic automatic why faiss in phase 1: simple, zero infra, perfect for a self-hosted portfolio project. why qdrant in phase 2: adds proper persistence, filtering, and a query api without sending data to a third party. both are behind the same vectorstore interface so the swap is a config change. q: why indexflatip in phase 1 and not hnsw? flat does an exact scan — 100% recall, o(n) time. for 50 chunks it returns in < 1ms. hnsw is approximate — faster at scale but adds graph construction complexity and parameter tuning, and trades a small amount of recall. at 50 vectors exact is the right choice: simplest, most correct, no premature optimization. q: exact vs approximate search — when does the tradeoff matter? at ~100k+ vectors, exact search starts to feel slow for interactive use (>50ms). ann (approximate nearest neighbor) indexes like hnsw return results in 1–5ms at 1m vectors with ~95–99% recall. the 1–5% of missed results is acceptable for most rag use cases. the crossover point depends on your latency budget and corpus size. q: what is recall@k? if there are 10 truly relevant chunks in the corpus and you retrieve k=10 results, how many of the 10 true positives appear in your results? recall@10 = 8/10 = 80%. measures coverage, not just top-1 quality. ann indexes target high recall@k (not 100%) while being much faster than exact search. q: when would a similarity threshold filter make sense? phase 1 always returns top-k — even if the best matching chunks are barely relevant (low scores). a threshold (e.g., drop results below 0.60) prevents sending irrelevant context to the llm. the downside: if your corpus doesn't cover a topic at all, you'd return zero chunks and can't generate any answer. the insufficient_context guardrail in the llm prompt is a softer alternative. q: cosine similarity vs dot product vs euclidean distance? after l2 normalization (all vectors length 1.0), cosine similarity equals dot product . so indexflatip (inner product) gives you cosine similarity for free — no special cosine index needed. euclidean distance is sensitive to vector magnitude (length). before normalization, a longer chunk might have a larger raw vec
