bounds-checks: if 1 <= m <= len(results) . invalid markers are silently dropped. it's a small but important guard. pipeline walk me through your rag pipeline. load docs with llamaindex → 512-token sentence-aware chunks (64 overlap) → embed with bge-small (384 dims, normalized) → store in faiss flat index → at query: embed question → faiss returns top-4 → format as numbered passages → claude answers with citations → extract citations → return grounded response. rag vs fine-tuning? rag = knowledge in docs, updatable, citable. right for \"chat with your docs.\" fine-tuning = teach a skill or style, bakes in static knowledge. not for frequently changing facts. how do you prevent hallucination? system prompt forces citation with [n] markers and insufficient_context if context is insufficient. pipeline checks the response and sets grounded=false . phase 6 adds ragas evaluation to measure it systematically. why not send all docs to the llm? cost (tokens) and quality (\"lost in the middle\" — attention disperses over very long contexts). retrieval focuses the model on exactly what's relevant. latency bottleneck? always the llm api call (~700ms). faiss search is < 1ms. embed is ~20ms on cpu. to reduce: use a smaller model, add streaming, or reduce max_tokens. llamaindex not langchain? llamaindex is purpose-built for rag data pipelines. langchain is general-purpose (chains, agents). for ingestion, llamaindex is cleaner. langgraph (phase 5) handles orchestration where graph-based state machines are the right tool.","words":1268},{"path":"09-hybrid-retrieval/README.md","title":"Overview","section":"9 · Hybrid Retrieval","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"hybrid-retrieval-dense-bm25-reranking-phase-3\">Hybrid Retrieval — dense + BM25 + reranking (Phase 3)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Phase 1 searched one way (by meaning). Phase 3 searches two ways (meaning + exact words), combines them fairly, then double-checks the top few with a stronger model. Each piece patches a specific weakness of the others.<\/div><\/div>\n<h2 id=\"where-this-lives-in-the-pipeline\">Where this lives in the pipeline<\/h2>\n<p>Phase 3 only touches the <strong>Search<\/strong> stage. Nothing before or after changes.<\/p>\n<pre><code>Ingest → Chunk → Embed → Index → [ SEARCH ] → Generate → Cite\n                                      ▲\n        ┌─────────────────────────────┘\n        │  question\n        │     ├─ embed → dense search   (by meaning)\n        │     └─ BM25 search            (by exact words)\n        │              ↓ Reciprocal Rank Fusion   (combine the two)\n        │              ↓ cross-encoder rerank      (optional, top few)\n        │              ↓ top_k chunks → LLM<\/code><\/pre>\n<h2 id=\"the-three-pieces-in-plain-words\">The three pieces, in plain words<\/h2>\n<h3 id=\"1-bm25-search-by-exact-words\">1. BM25 — search by exact words<\/h3>\n<p>Dense search (Phase 1) finds chunks that <em>mean<\/em> the same thing, even with no shared words. Its weakness: <strong>rare exact terms get blurred.<\/strong> An embedding squashes a whole passage into one 384-number vector, so sharp details — error codes, version numbers, names like <code>Schwarzschild<\/code> — get averaged away.<\/p>\n<p><strong>BM25<\/strong> is classic keyword search. It matches the <em>actual words<\/em>, and weights <em>rare<\/em> words more (matching \"Voronoi\" counts for more than matching \"the\"). The technical name is <strong>sparse retrieval<\/strong> — \"sparse\" because it only cares about the handful of words present, unlike the <strong>dense<\/strong> vector where all 384 numbers are filled in.<\/p>\n<blockquote><p>The whole reason hybrid exists: <strong>dense and BM25 fail differently.<\/strong> Dense misses exact rare words; BM25 misses paraphrases. Run both → cover both holes.<\/p><\/blockquote>\n<p>Code: <code class=\"srcref\" title=\"source file in the repo\"><code>bm25.py<\/code><\/code><\/p>\n<h3 id=\"2-reciprocal-rank-fusion-rrf-combine-the-two-lists-fairly\">2. Reciprocal Rank Fusion (RRF) — combine the two lists fairly<\/h3>\n<p>Now you have two ranked lists, but their scores live on <strong>different scales<\/strong>: dense cosine is ~0–1, BM25 is an unbounded sum. You <strong>cannot just add them<\/strong> — BM25's big numbers would bully dense's small ones.<\/p>\n<p>RRF's trick: <strong>throw away the scores, use only the rank position.<\/strong> A chunk at rank <em>r<\/em> in a list is worth <code>1 / (k + r)<\/code>. Add up each chunk's points across both lists. A chunk both retrievers rank highly floats to the top.<\/p>\n<pre><code>score(chunk) = sum over each list of  1 / (k + rank_in_that_list)<\/code><\/pre>\n<p><code>k = 60<\/code> (from the original RRF paper) softens the gap between rank 1 and 2 so one list can't dominate. No per-corpus tuning needed — that's the appeal.<\/p>\n<blockquote><p>Everyday version: two judges score on different scales (one out of 10, one out of 100). Don't fight over the scales — ask each for their 1st, 2nd, 3rd and combine the <em>ranks<\/em>.<\/p><\/blockquote>\n<p>Code: <code class=\"srcref\" title=\"source file in the repo\"><code>fusion.py<\/code><\/code><\/p>\n<h3 id=\"3-cross-encoder-reranker-double-check-the-top-few\">3. Cross-encoder reranker — double-check the top few<\/h3>\n<p>The embedder is a <strong>bi-encoder<\/strong>: it encodes the question and each chunk <em>separately<\/em>, then compares vectors. Fast (chunks pre-computed once), but the question and chunk never actually look at each other.<\/p>\n<p>A <strong>cross-encoder<\/strong> reads the (question, chunk) pair <strong>together<\/strong> through the model and scores the match directly. Far more accurate — but <strong>slow<\/strong>, because it runs fresh per chunk at query time. So you never run it on the whole corpus, only on the ~20 candidates RRF already shortlisted.<\/p>\n<blockquote><p>Everyday version: dense + BM25 + RRF are a fast résumé screen that picks 20 candidates. The cross-encoder is the careful interview you only give to those 20.<\/p><\/blockquote>\n<p>It's <strong>off by default<\/strong> (<code>rerank_enabled=False<\/code>) — it downloads a model and wants the beast GPU. One env var turns it on.<\/p>\n<p>Code: <code class=\"srcref\" title=\"source file in the repo\"><code>reranker.py<\/code><\/code> · Full depth writeup: <a class=\"mdlink\" data-href=\"reranking-deep-dive.md\" href=\"#\">reranking-deep-dive.md<\/a><\/p>\n<h2 id=\"how-its-wired\">How it's wired<\/h2>\n<p><code>HybridRetriever<\/code> (<code class=\"srcref\" title=\"source file in the repo\"><code>retriever.py<\/code><\/code>) runs all three behind the same <code>retrieve(question, top_k)<\/code> method the dense <code>Retriever<\/code> uses — so the pipeline never knows which is plugged in. The <code>retrieval_mode<\/code> setting picks: <code>\"dense\"<\/code> (Phase 1) or <code>\"hybrid\"<\/code> (Phase 3, default). BM25 is rebuilt in memory from the stored chunks at startup (fine for a small corpus; at scale you'd persist a real inverted index).<\/p>\n<h2 id=\"did-it-actually-help\">Did it actually help?<\/h2>\n<p>See <a class=\"mdlink\" data-href=\"eval-results.md\" href=\"#\">eval-results.md<\/a> for real numbers — the honest answer is \"it depends on the corpus,\" with a concrete win where BM25 recovered an exact term dense ranked second. For the <em>concepts<\/em> behind those metrics (set vs rank families, Precision/Recall/MRR/MAP/NDCG, ground-truth labels), see <a class=\"mdlink\" data-href=\"search-evaluation.md\" href=\"#\">search-evaluation.md<\/a>.<\/p>\n<h2 id=\"the-interview-signals\">The interview signals<\/h2>\n<ul><li><strong>Why hybrid, not just embeddings?<\/strong> They fail differently — dense misses exact<\/li><\/ul>\n<p>rare tokens (error codes, names); BM25 misses paraphrases.<\/p>\n<ul><li><strong>How do you merge two different score scales?<\/strong> You don't — RRF fuses on rank<\/li><\/ul>\n<p>position, <code>1/(k+rank)<\/code>, no tuning.<\/p>\n<ul><li><strong>Why is reranking a separate stage?<\/strong> Cost. The cross-encoder reads query+doc<\/li><\/ul>\n<p>together (accurate but slow), so you only afford it on the ~20 fused candidates.<\/p>\n<p>→ Code walkthrough: <code class=\"srcref\" title=\"source file in the repo\"><code>retriever.py<\/code><\/code> · <code class=\"srcref\" title=\"source file in the repo\"><code>bm25.py<\/code><\/code> · <code class=\"srcref\" title=\"source file in the repo\"><code>fusion.py<\/code><\/code> · <code class=\"srcref\" title=\"source file in the repo\"><code>reranker.py<\/code><\/code><\/p>","toc":[{"level":2,"id":"where-this-lives-in-the-pipeline","text":"Where this lives in the pipeline"},{"level":2,"id":"the-three-pieces-in-plain-words","text":"The three pieces, in plain words"},{"level":3,"id":"1-bm25-search-by-exact-words","text":"1. BM25 — search by exact words"},{"level":3,"id":"2-reciprocal-rank-fusion-rrf-combine-the-two-lists-fairly","text":"2. Reciprocal Rank Fusion (RRF) — combine the two lists fairly"},{"level":3,"id":"3-cross-encoder-reranker-double-check-the-top-few","text":"3. Cross-encoder reranker — double-check the top few"},{"level":2,"id":"how-its-wired","text":"How it's wired"},{"level":2,"id":"did-it-actually-help","text":"Did it actually help?"},{"level":2,"id":"the-interview-signals","text":"The interview signals"}],"text":"hybrid retrieval — dense + bm25 + reranking (phase 3) 💡 tl;dr phase 1 searched one way (by meaning). phase 3 searches two ways (meaning + exact words), combines them fairly, then double-checks the top few with a stronger model. each piece patches a specific weakness of the others. where this lives in the pipeline phase 3 only touches the search stage. nothing before or after changes. ingest → chunk → embed → index → [ search ] → generate → cite ▲ ┌─────────────────────────────┘ │ question │ ├─ embed → dense search (by meaning) │ └─ bm25 search (by exact words) │ ↓ reciprocal rank fusion (combine the two) │ ↓ cross-encoder rerank (optional, top few) │ ↓ top_k chunks → llm the three pieces, in plain words 1. bm25 — search by exact words dense search (phase 1) finds chunks that mean the same thing, even with no shared words. its weakness: rare exact terms get blurred. an embedding squashes a whole passage into one 384-number vector, so sharp details — error codes, version numbers, names like schwarzschild — get averaged away. bm25 is classic keyword search. it matches the actual words , and weights rare words more (matching \"voronoi\" counts for more than matching \"the\"). the technical name is sparse retrieval — \"sparse\" because it only cares about the handful of words present, unlike the dense vector where all 384 numbers are filled in. the whole reason hybrid exists: dense and bm25 fail differently. dense misses exact rare words; bm25 misses paraphrases. run both → cover both holes. code: bm25.py 2. reciprocal rank fusion (rrf) — combine the two lists fairly now you have two ranked lists, but their scores live on different scales : dense cosine is ~0–1, bm25 is an unbounded sum. you cannot just add them — bm25's big numbers would bully dense's small ones. rrf's trick: throw away the scores, use only the rank position. a chunk at rank r in a list is worth 1 / (k + r) . add up each chunk's points across both lists. a chunk both retrievers rank highly floats to the top. score(chunk) = sum over each list of 1 / (k + rank_in_that_list) k = 60 (from the original rrf paper) softens the gap between rank 1 and 2 so one list can't dominate. no per-corpus tuning needed — that's the appeal. everyday version: two judges score on different scales (one out of 10, one out of 100). don't fight over the scales — ask each for their 1st, 2nd, 3rd and combine the ranks . code: fusion.py 3. cross-encoder reranker — double-check the top few the embedder is a bi-encoder : it encodes the question and each chunk separately , then compares vectors. fast (chunks pre-computed once), but the question and chunk never actually look at each other. a cross-encoder reads the (question, chunk) pair together through the model and scores the match directly. far more accurate — but slow , because it runs fresh per chunk at query time. so you never run it on the whole corpus, only on the ~20 candidates rrf already shortlisted. everyday version: dense + bm25 + rrf are a fast résumé screen that picks 20 candidates. the cross-encoder is the careful interview you only give to those 20. it's off by default ( rerank_enabled=false ) — it downloads a model and wants the beast gpu. one env var turns it on. code: reranker.py · full depth writeup: reranking-deep-dive.md how it's wired hybridretriever ( retriever.py ) runs all three behind the same retrieve(question, top_k) method the dense retriever uses — so the pipeline never knows which is plugged in. the retrieval_mode setting picks: \"dense\" (phase 1) or \"hybrid\" (phase 3, default). bm25 is rebuilt in memory from the stored chunks at startup (fine for a small corpus; at scale you'd persist a real inverted index). did it actually help? see eval-results.md for real numbers — the honest answer is \"it depends on the corpus,\" with a concrete win where bm25 recovered an exact term dense ranked second. for the concepts behind those metrics (set vs rank families, precision/recall/mrr/map/ndcg, ground-truth labels), see search-evaluation.md . the interview signals why hybrid, not just embeddings? they fail differently — dense misses exact rare tokens (error codes, names); bm25 misses paraphrases. how do you merge two different score scales? you don't — rrf fuses on rank position, 1/(k+rank) , no tuning. why is reranking a separate stage? cost. the cross-encoder reads query+doc together (accurate but slow), so you only afford it on the ~20 fused candidates. → code walkthrough: retriever.py · bm25.py · fusion.py · reranker.py","words":772},{"path":"09-hybrid-retrieval/reranking-deep-dive.md","title":"Reranking — The Deep Dive","section":"9 · Hybrid Retrieval","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"reranking-the-deep-dive\">Reranking — the deep dive<\/h1>\n<p><strong>Where in the pipeline:<\/strong> the very last step of the <strong>Search<\/strong> stage, after RRF fusion and right before the top chunks go to the LLM. Everything upstream (dense, BM25, fusion) exists to hand the reranker a good shortlist.<\/p>\n<pre><code>question → dense ─┐\n                  ├→ RRF → ~20 candidates → [ RERANK ] → top_k → LLM\nquestion → BM25 ──┘                              ▲\n                                          this page<\/code><\/pre>\n<p><strong>Where in the code:<\/strong> <code>CrossEncoderReranker<\/code> in <code class=\"srcref\" title=\"source file in the repo\"><code>reranker.py<\/code><\/code>, called from <code>HybridRetriever.retrieve()<\/code> in <code class=\"srcref\" title=\"source file in the repo\"><code>retriever.py<\/code><\/code> when <code>rerank_enabled=True<\/code>. Model: <code>ms-marco-MiniLM-L-6-v2<\/code>, lazy-loaded on first use so the pipeline starts fast when reranking is off.<\/p>\n<h2 id=\"the-problem-it-solves\">The problem it solves<\/h2>\n<p>At search time we currently rank chunks by comparing <strong>precomputed vectors<\/strong> — the question and each chunk were embedded <em>separately<\/em> and never saw each other. That's a <strong>bi-encoder<\/strong>, and the separation is exactly what makes it fast: chunk vectors are computed once at ingest, and a query is just one embed plus a lookup.<\/p>\n<p>But separation costs accuracy. The embedder compressed each chunk into 384 numbers <em>before knowing what would be asked<\/em>. Nuance the question cares about may simply not have survived the compression.<\/p>\n<h2 id=\"the-fix-let-them-read-each-other\">The fix: let them read each other<\/h2>\n<p>A <strong>cross-encoder<\/strong> takes the (question, chunk) pair as <strong>one input<\/strong> and runs it through the model together. Every word of the question can attend to every word of the chunk. The output isn't a vector — it's a single relevance score for <em>this pair<\/em>.<\/p>\n<p>Plain version: the bi-encoder judges two people by comparing their dating profiles. The cross-encoder puts them in a room and watches the conversation.<\/p>\n<p>The catch is cost. Nothing can be precomputed — every (question, chunk) pair is a fresh model forward pass at query time. That's why it can never replace retrieval: scoring a million chunks per query is a million forward passes. Scoring 20 shortlisted candidates is nothing.<\/p>\n<p>So the shape is a funnel, and each stage earns its place by cost:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Cost per query<\/th><th>Job<\/th><\/tr><\/thead><tbody><tr><td>dense + BM25<\/td><td>~1 embed + lookups<\/td><td>scan <em>everything<\/em>, cheaply<\/td><\/tr><tr><td>RRF<\/td><td>arithmetic<\/td><td>merge two lists fairly<\/td><\/tr><tr><td>cross-encoder<\/td><td>~20 forward passes<\/td><td>be <em>accurate<\/em> on the survivors<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"did-it-work-the-measured-answer\">Did it work? (the measured answer)<\/h2>\n<p>From <a class=\"mdlink\" data-href=\"eval-results.md\" href=\"#\">eval-results.md<\/a>, on the 15-query labeled set:<\/p>\n<ul><li>Default chunking: dense and hybrid tied at <strong>0.93 Hit@1<\/strong>; adding the<\/li><\/ul>\n<p>reranker → <strong>1.00 Hit@1, 1.00 MRR<\/strong>. It fixed the one query everything else   ranked #2.<\/p>\n<ul><li>Fine chunking (72 chunks): kept the perfect Hit@1/MRR.<\/li><li>The trade it made: Recall@5/NDCG@5 dipped, because pair-relevance sometimes<\/li><\/ul>\n<p>promotes a keyword-matching chunk from another doc over a same-doc neighbor.<\/p>\n<p>The honest summary: <strong>the reranker was the most reliable win in Phase 3<\/strong> — hybrid's gain came and went with chunk size, the reranker helped in every configuration tested.<\/p>\n<h2 id=\"what-breaks-and-how-you-debug-it\">What breaks, and how you debug it<\/h2>\n<ul><li><strong>Latency spike when enabled.<\/strong> Expected: it's per-pair model inference.<\/li><\/ul>\n<p>First lever is <code>candidate_k<\/code> (how many survivors get reranked) — 20 → 10   halves the work. Then batch the pairs, then a smaller cross-encoder.<\/p>\n<ul><li><strong>First query after startup is slow.<\/strong> Lazy model load. Warm it at boot if<\/li><\/ul>\n<p>that matters.<\/p>\n<ul><li><strong>A good chunk got demoted.<\/strong> Check the cross-encoder's raw score for that<\/li><\/ul>\n<p>(question, chunk) pair in isolation. MiniLM was trained on MS MARCO (web   Q&amp;A); domain mismatch shows up here — the fix at real scale is fine-tuning   the reranker on your own domain pairs, not swapping retrievers.<\/p>\n<ul><li><strong>It can only reorder what it's given.<\/strong> If the right chunk isn't in the<\/li><\/ul>\n<p>~20 candidates, no reranker can save you — that's a retrieval (or chunking)   bug upstream. Debug the funnel in order.<\/p>\n<h2 id=\"the-interview-signals\">The interview signals<\/h2>\n<ul><li><strong>Why a separate rerank stage instead of a better embedder?<\/strong> Different cost<\/li><\/ul>\n<p>classes. The bi-encoder's speed <em>comes from<\/em> never seeing the question;   accuracy beyond that ceiling requires reading the pair together, which is   only affordable on a shortlist.<\/p>\n<ul><li><strong>Why is it off by default in your project?<\/strong> It downloads a model and wants<\/li><\/ul>\n<p>GPU; BM25 fusion is free. Defaults should be the cheapest thing that works,   with one config flag to turn on the expensive thing.<\/p>\n<ul><li><strong>How did you know it helped?<\/strong> Same eval, same queries, one variable<\/li><\/ul>\n<p>changed: Hit@1 0.93 → 1.00. That A/B discipline is the answer, not the   number itself.<\/p>","toc":[{"level":2,"id":"the-problem-it-solves","text":"The problem it solves"},{"level":2,"id":"the-fix-let-them-read-each-other","text":"The fix: let them read each other"},{"level":2,"id":"did-it-work-the-measured-answer","text":"Did it work? (the measured answer)"},{"level":2,"id":"what-breaks-and-how-you-debug-it","text":"What breaks, and how you debug it"},{"level":2,"id":"the-interview-signals","text":"The interview signals"}],"text":"reranking — the deep dive where in the pipeline: the very last step of the search stage, after rrf fusion and right before the top chunks go to the llm. everything upstream (dense, bm25, fusion) exists to hand the reranker a good shortlist. question → dense ─┐ ├→ rrf → ~20 candidates → [ rerank ] → top_k → llm question → bm25 ──┘ ▲ this page where in the code: crossencoderreranker in reranker.py , called from hybridretriever.retrieve() in retriever.py when rerank_enabled=true . model: ms-marco-minilm-l-6-v2 , lazy-loaded on first use so the pipeline starts fast when reranking is off. the problem it solves at search time we currently rank chunks by comparing precomputed vectors — the question and each chunk were embedded separately and never saw each other. that's a bi-encoder , and the separation is exactly what makes it fast: chunk vectors are computed once at ingest, and a query is just one embed plus a lookup. but separation costs accuracy. the embedder compressed each chunk into 384 numbers before knowing what would be asked . nuance the question cares about may simply not have survived the compression. the fix: let them read each other a cross-encoder takes the (question, chunk) pair as one input and runs it through the model together. every word of the question can attend to every word of the chunk. the output isn't a vector — it's a single relevance score for this pair . plain version: the bi-encoder judges two people by comparing their dating profiles. the cross-encoder puts them in a room and watches the conversation. the catch is cost. nothing can be precomputed — every (question, chunk) pair is a fresh model forward pass at query time. that's why it can never replace retrieval: scoring a million chunks per query is a million forward passes. scoring 20 shortlisted candidates is nothing. so the shape is a funnel, and each stage earns its place by cost: stage cost per query job dense + bm25 ~1 embed + lookups scan everything , cheaply rrf arithmetic merge two lists fairly cross-encoder ~20 forward passes be accurate on the survivors did it work? (the measured answer) from eval-results.md , on the 15-query labeled set: default chunking: dense and hybrid tied at 0.93 hit@1 ; adding the reranker → 1.00 hit@1, 1.00 mrr . it fixed the one query everything else ranked #2. fine chunking (72 chunks): kept the perfect hit@1/mrr. the trade it made: recall@5/ndcg@5 dipped, because pair-relevance sometimes promotes a keyword-matching chunk from another doc over a same-doc neighbor. the honest summary: the reranker was the most reliable win in phase 3 — hybrid's gain came and went with chunk size, the reranker helped in every configuration tested. what breaks, and how you debug it latency spike when enabled. expected: it's per-pair model inference. first lever is candidate_k (how many survivors get reranked) — 20 → 10 halves the work. then batch the pairs, then a smaller cross-encoder. first query after startup is slow. lazy model load. warm it at boot if that matters. a good chunk got demoted. check the cross-encoder's raw score for that (question, chunk) pair in isolation. minilm was trained on ms marco (web q&a); domain mismatch shows up here — the fix at real scale is fine-tuning the reranker on your own domain pairs, not swapping retrievers. it can only reorder what it's given. if the right chunk isn't in the ~20 candidates, no reranker can save you — that's a retrieval (or chunking) bug upstream. debug the funnel in order. the interview signals why a separate rerank stage instead of a better embedder? different cost classes. the bi-encoder's speed comes from never seeing the question; accuracy beyond that ceiling requires reading the pair together, which is only affordable on a shortlist. why is it off by default in your project? it downloads a model and wants gpu; bm25 fusion is free. defaults should be the cheapest thing that works, with one config flag to turn on the expensive thing. how did you know it helped? same eval, same queries, one variable changed: hit@1 0.93 → 1.00. that a/b discipline is the answer, not the number itself.","words":698},{"path":"09-hybrid-retrieval/search-evaluation.md","title":"Search Evaluation","section":"9 · Hybrid Retrieval","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"search-evaluation-the-complete-picture\">Search Evaluation — the complete picture<\/h1>\n<p><strong>Scope:<\/strong> this doc is about evaluating the <strong>Search<\/strong> box <em>only<\/em> — did the right chunks come back, and were they ranked well? It stops before the LLM. Nothing here is about the answer's wording, correctness, or hallucination (that's answer/LLM evaluation, a different box — Phase 6).<\/p>\n<pre><code>Query → Embed → [ SEARCH ] → Rerank → Generate → Cite\n                    ▲\n        everything below grades ONLY this box<\/code><\/pre>\n<p>The real numbers these metrics produce on DocsMind live in <a class=\"mdlink\" data-href=\"eval-results.md\" href=\"#\">eval-results.md<\/a>; this doc is the <em>concepts<\/em> behind them.<\/p>\n<h2 id=\"step-0-you-need-labels-ground-truth\">Step 0 — you need labels (ground truth)<\/h2>\n<p>You can't grade search without knowing what \"right\" is. Every eval query needs a <strong>relevance label<\/strong>: which chunks (or docs) <em>should<\/em> come back. Two choices:<\/p>\n<ul><li><strong>Binary relevance<\/strong> — a chunk is relevant (1) or not (0). Simple. What<\/li><\/ul>\n<p>DocsMind uses.<\/p>\n<ul><li><strong>Graded relevance<\/strong> — degrees of relevance (perfect=3, related=1, off=0).<\/li><\/ul>\n<p>Richer, more work to label. Only <strong>NDCG<\/strong> uses grades naturally.<\/p>\n<p>And the granularity:<\/p>\n<ul><li><strong>Document-level<\/strong> — \"the answer is in <code>black_holes.md<\/code>.\" Cheap, reliable.<\/li><\/ul>\n<p>DocsMind uses this (source-level relevance).<\/p>\n<ul><li><strong>Passage-level<\/strong> — \"the answer is in <em>this exact chunk<\/em>.\" Stricter, more effort.<\/li><\/ul>\n<blockquote><p><strong>Interview signal:<\/strong> stating <em>which<\/em> labeling scheme you chose and <em>why<\/em> (\"document-level binary, because it's cheap and reliable; passage-level would be stricter\") shows you understand that label quality caps every metric below. A bad gold set makes every number meaningless.<\/p><\/blockquote>\n<h2 id=\"the-core-split-two-families-of-metrics\">The core split: two families of metrics<\/h2>\n<p>Every search metric answers one of two questions. Learn these two buckets and you have all of search evaluation:<\/p>\n<pre><code>Family 1 — DID WE FIND IT?       order-blind  (reorder the top-k, score unchanged)\nFamily 2 — DID WE RANK IT WELL?  order-aware  (reorder the top-k, score changes)<\/code><\/pre>\n<hr>\n<h2 id=\"family-1-set-metrics-order-doesnt-matter\">Family 1 — Set metrics (order doesn't matter)<\/h2>\n<p>These treat the top-k results as a <em>bag<\/em> and ask what's in it.<\/p>\n<h3 id=\"precisionk\">Precision@k<\/h3>\n<p>Of the k chunks I returned, how many were relevant?<\/p>\n<pre><code>Precision@k = (relevant in top k) / k<\/code><\/pre>\n<p>\"How much of what I showed was good?\" Punishes junk in the results.<\/p>\n<h3 id=\"recallk\">Recall@k<\/h3>\n<p>Of all the relevant chunks that exist, how many did I return?<\/p>\n<pre><code>Recall@k = (relevant in top k) / (total relevant)<\/code><\/pre>\n<p>\"How much of the good stuff did I gather?\"<\/p>\n<blockquote><p><strong>The ceiling catch:<\/strong> if a doc has 14 relevant chunks but k=5, the best possible Recall@5 is 5/14 ≈ 0.36. Low recall is often this cap, not failure — always read recall against its ceiling.<\/p><\/blockquote>\n<h3 id=\"f1k\">F1@k<\/h3>\n<p>Precision and recall pull against each other: return more chunks → recall up, precision down. <strong>F1<\/strong> is their balance (harmonic mean) — one number when you care about both.<\/p>\n<h3 id=\"hitk-hit-rate\">Hit@k (Hit Rate)<\/h3>\n<p>Did <em>at least one<\/em> relevant chunk make the top k? Yes/no, averaged over queries. The loosest, most forgiving set metric. DocsMind reports Hit@1 and Hit@3.<\/p>\n<hr>\n<h2 id=\"family-2-rank-aware-metrics-order-matters\">Family 2 — Rank-aware metrics (order matters)<\/h2>\n<p>These reward putting relevant chunks <strong>high<\/strong> — what you actually want in RAG, since you feed the LLM only the top few.<\/p>\n<h3 id=\"mrr-mean-reciprocal-rank\">MRR (Mean Reciprocal Rank)<\/h3>\n<p><code>1/rank<\/code> of the <em>first<\/em> relevant chunk, averaged over queries.<\/p>\n<pre><code>first relevant at rank 1 → 1.0 ;  rank 2 → 0.5 ;  rank 3 → 0.33<\/code><\/pre>\n<p>Only cares about the <strong>first<\/strong> hit. Perfect for \"I need one good chunk, fast.\"<\/p>\n<h3 id=\"map-mean-average-precision\">MAP (Mean Average Precision)<\/h3>\n<p>Builds on precision, and cares about <strong>all<\/strong> the hits:<\/p>\n<ol><li>Walk down the list. At each relevant chunk, compute Precision@(that position).<\/li><li>Average those → <strong>Average Precision<\/strong> for one query.<\/li><li>Average across queries → <strong>MAP<\/strong>.<\/li><\/ol>\n<p>MRR rewards the first hit; MAP rewards finding <em>many<\/em> relevant chunks <em>and<\/em> having them high.<\/p>\n<h3 id=\"ndcgk-normalized-discounted-cumulative-gain\">NDCG@k (Normalized Discounted Cumulative Gain)<\/h3>\n<p>The richest rank metric. Three ideas stacked:<\/p>\n<ul><li><strong>Gain<\/strong> — each result scores its relevance (1/0, or a grade).<\/li><li><strong>Discounted<\/strong> — a relevant chunk is worth less the lower it sits: <code>1/log2(rank+1)<\/code>.<\/li><\/ul>\n<p>Sum across the top k → <strong>DCG<\/strong>.<\/p>\n<ul><li><strong>Normalized<\/strong> — divide by the <em>ideal<\/em> ordering's DCG (<strong>IDCG<\/strong>) → a 0–1 score<\/li><\/ul>\n<p>where 1.0 = perfect ranking. Normalizing makes queries comparable.<\/p>\n<p>The only metric that handles <strong>graded<\/strong> relevance naturally.<\/p>\n<hr>\n<h2 id=\"the-cheat-sheet-pick-by-what-you-care-about\">The cheat-sheet — pick by what you care about<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>You care about…<\/th><th>Metric<\/th><th>Family<\/th><\/tr><\/thead><tbody><tr><td>Did I show mostly good chunks?<\/td><td>Precision@k<\/td><td>set<\/td><\/tr><tr><td>Did I gather all the good chunks?<\/td><td>Recall@k<\/td><td>set<\/td><\/tr><tr><td>Balance of the two?<\/td><td>F1@k<\/td><td>set<\/td><\/tr><tr><td>Did <em>anything<\/em> relevant show up?<\/td><td>Hit@k<\/td><td>set<\/td><\/tr><tr><td>Is the first good chunk near the top?<\/td><td>MRR<\/td><td>rank<\/td><\/tr><tr><td>Are good chunks high <em>and<\/em> did I find many?<\/td><td>MAP<\/td><td>rank<\/td><\/tr><tr><td>Best overall ranking (supports grades)?<\/td><td>NDCG@k<\/td><td>rank<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-big-lesson-metrics-encode-goals-and-they-disagree\">The big lesson: metrics encode goals, and they disagree<\/h2>\n<p>On DocsMind at <code>chunk_size=64<\/code>, rank metrics and set metrics <strong>disagreed<\/strong>: hybrid + rerank won on Hit@1 / MRR (floated the single best chunk to #1) but <em>lost<\/em> on Recall@5 / NDCG@5 (mixed in other-doc chunks, gathering fewer same-doc ones). See <a class=\"mdlink\" data-href=\"eval-results.md\" href=\"#\">eval-results.md<\/a> for the numbers.<\/p>\n<p>There's no single \"best\" — it depends what the LLM needs downstream:<\/p>\n<ul><li><strong>Pointed Q&amp;A<\/strong> (LLM reads the top 1–3 chunks) → optimize <strong>MRR / NDCG@k<\/strong>.<\/li><li><strong>Summarization / multi-hop<\/strong> (needs broad coverage) → weight <strong>Recall@k<\/strong>.<\/li><\/ul>\n<blockquote><p><strong>Interview signal — \"Which retrieval metric do you optimize?\"<\/strong> Weak answer: \"recall.\" Strong answer: <em>\"Depends on the task. Pointed Q&amp;A → MRR/NDCG, because order is everything when the LLM only reads the top few. Summarization → Recall@k for coverage. I report both so I see the tradeoff instead of hiding it.\"<\/em><\/p><\/blockquote>\n<h2 id=\"what-docsminds-eval-computes-today\">What DocsMind's eval computes today<\/h2>\n<p><code>scripts/retrieval_eval.py<\/code> currently prints <strong>Hit@1, Hit@3, MRR, Recall@k, NDCG@k<\/strong>. <strong>Precision@k<\/strong> and <strong>MAP<\/strong> are explained here but not yet coded — a natural next addition to complete the set-vs-rank picture.<\/p>\n<p>→ Results &amp; analysis: <a class=\"mdlink\" data-href=\"eval-results.md\" href=\"#\">eval-results.md<\/a> · Code: <code class=\"srcref\" title=\"source file in the repo\"><code>scripts/retrieval_eval.py<\/code><\/code><\/p>","toc":[{"level":2,"id":"step-0-you-need-labels-ground-truth","text":"Step 0 — you need labels (ground truth)"},{"level":2,"id":"the-core-split-two-families-of-metrics","text":"The core split: two families of metrics"},{"level":2,"id":"family-1-set-metrics-order-doesnt-matter","text":"Family 1 — Set metrics (order doesn't matter)"},{"level":3,"id":"precisionk","text":"Precision@k"},{"level":3,"id":"recallk","text":"Recall@k"},{"level":3,"id":"f1k","text":"F1@k"},{"level":3,"id":"hitk-hit-rate","text":"Hit@k (Hit Rate)"},{"level":2,"id":"family-2-rank-aware-metrics-order-matters","text":"Family 2 — Rank-aware metrics (order matters)"},{"level":3,"id":"mrr-mean-reciprocal-rank","text":"MRR (Mean Reciprocal Rank)"},{"level":3,"id":"map-mean-average-precision","text":"MAP (Mean Average Precision)"},{"level":3,"id":"ndcgk-normalized-discounted-cumulative-gain","text":"NDCG@k (Normalized Discounted Cumulative Gain)"},{"level":2,"id":"the-cheat-sheet-pick-by-what-you-care-about","text":"The cheat-sheet — pick by what you care about"},{"level":2,"id":"the-big-lesson-metrics-encode-goals-and-they-disagree","text":"The big lesson: metrics encode goals, and they disagree"},{"level":2,"id":"what-docsminds-eval-computes-today","text":"What DocsMind's eval computes today"}],"text":"search evaluation — the complete picture scope: this doc is about evaluating the search box only — did the right chunks come back, and were they ranked well? it stops before the llm. nothing here is about the answer's wording, correctness, or hallucination (that's answer/llm evaluation, a different box — phase 6). query → embed → [ search ] → rerank → generate → cite ▲ everything below grades only this box the real numbers these metrics produce on docsmind live in eval-results.md ; this doc is the concepts behind them. step 0 — you need labels (ground truth) you can't grade search without knowing what \"right\" is. every eval query needs a relevance label : which chunks (or docs) should come back. two choices: binary relevance — a chunk is relevant (1) or not (0). simple. what docsmind uses. graded relevance — degrees of relevance (perfect=3, related=1, off=0). richer, more work to label. only ndcg uses grades naturally. and the granularity: document-level — \"the answer is in black_holes.md .\" cheap, reliable. docsmind uses this (source-level relevance). passage-level — \"the answer is in this exact chunk .\" stricter, more effort. interview signal: stating which labeling scheme you chose and why (\"document-level binary, because it's cheap and reliable; passage-level would be stricter\") shows you understand that label quality caps every metric below. a bad gold set makes every number meaningless. the core split: two families of metrics every search metric answers one of two questions. learn these two buckets and you have all of search evaluation: family 1 — did we find it? order-blind (reorder the top-k, score unchanged) family 2 — did we rank it well? order-aware (reorder the top-k, score changes) family 1 — set metrics (order doesn't matter) these treat the top-k results as a bag and ask what's in it. precision@k of the k chunks i returned, how many were relevant? precision@k = (relevant in top k) / k \"how much of what i showed was good?\" punishes junk in the results. recall@k of all the relevant chunks that exist, how many did i return? recall@k = (relevant in top k) / (total relevant) \"how much of the good stuff did i gather?\" the ceiling catch: if a doc has 14 relevant chunks but k=5, the best possible recall@5 is 5/14 ≈ 0.36. low recall is often this cap, not failure — always read recall against its ceiling. f1@k precision and recall pull against each other: return more chunks → recall up, precision down. f1 is their balance (harmonic mean) — one number when you care about both. hit@k (hit rate) did at least one relevant chunk make the top k? yes/no, averaged over queries. the loosest, most forgiving set metric. docsmind reports hit@1 and hit@3. family 2 — rank-aware metrics (order matters) these reward putting relevant chunks high — what you actually want in rag, since you feed the llm only the top few. mrr (mean reciprocal rank) 1/rank of the first relevant chunk, averaged over queries. first relevant at rank 1 → 1.0 ; rank 2 → 0.5 ; rank 3 → 0.33 only cares about the first hit. perfect for \"i need one good chunk, fast.\" map (mean average precision) builds on precision, and cares about all the hits: walk down the list. at each relevant chunk, compute precision@(that position). average those → average precision for one query. average across queries → map . mrr rewards the first hit; map rewards finding many relevant chunks and having them high. ndcg@k (normalized discounted cumulative gain) the richest rank metric. three ideas stacked: gain — each result scores its relevance (1/0, or a grade). discounted — a relevant chunk is worth less the lower it sits: 1/log2(rank+1) . sum across the top k → dcg . normalized — divide by the ideal ordering's dcg ( idcg ) → a 0–1 score where 1.0 = perfect ranking. normalizing makes queries comparable. the only metric that handles graded relevance naturally. the cheat-sheet — pick by what you care about you care about… metric family did i show mostly good chunks? precision@k set did i gather all the good chunks? recall@k set balance of the two? f1@k set did anything relevant show up? hit@k set is the first good chunk near the top? mrr rank are good chunks high and did i find many? map rank best overall ranking (supports grades)? ndcg@k rank the big lesson: metrics encode goals, and they disagree on docsmind at chunk_size=64 , rank metrics and set metrics disagreed : hybrid + rerank won on hit@1 / mrr (floated the single best chunk to #1) but lost on recall@5 / ndcg@5 (mixed in other-doc chunks, gathering fewer same-doc ones). see eval-results.md for the numbers. there's no single \"best\" — it depends what the llm needs downstream: pointed q&a (llm reads the top 1–3 chunks) → optimize mrr / ndcg@k . summarization / multi-hop (needs broad coverage) → weight recall@k . interview signal — \"which retrieval metric do you optimize?\" weak answer: \"recall.\" strong answer: \"depends on the task. pointed q&a → mrr/ndcg, because order is everything when the llm only reads the top few. summarization → recall@k for coverage. i report both so i see the tradeoff instead of hiding it.\" what docsmind's eval computes today scripts/retrieval_eval.py currently prints hit@1, hit@3, mrr, recall@k, ndcg@k . precision@k and map are explained here but not yet coded — a natural next addition to complete the set-vs-rank picture. → results & analysis: eval-results.md · code: scripts/retrieval_eval.py","words":918},{"path":"09-hybrid-retrieval/eval-results.md","title":"Eval Results — Does Hybrid Win?","section":"9 · Hybrid Retrieval","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"retrieval-eval-does-hybrid-rerank-actually-beat-dense\">Retrieval Eval — does hybrid + rerank actually beat dense?<\/h1>\n<p><strong>Where in the pipeline:<\/strong> this measures the <strong>Search<\/strong> stage directly. It runs dense, hybrid, and hybrid+rerank over the <em>same<\/em> corpus and the <em>same<\/em> labeled queries, and reports the same metrics for each. This is the evidence for the hardest Phase 3 interview question: <em>\"how did you know your retrieval improved?\"<\/em><\/p>\n<p>Script: <code class=\"srcref\" title=\"source file in the repo\"><code>scripts/retrieval_eval.py<\/code><\/code> · Query set: <code class=\"srcref\" title=\"source file in the repo\"><code>data/eval/retrieval_queries.json<\/code><\/code><\/p>\n<h2 id=\"the-setup\">The setup<\/h2>\n<p>15 labeled queries over the 5-doc space corpus. Each query is tagged with the doc that should answer it (<strong>source-level relevance<\/strong> — did we retrieve a chunk from the right doc?). The queries are a deliberate mix:<\/p>\n<ul><li><strong>exact-term<\/strong> queries (\"What is the Schwarzschild radius?\") — should favor BM25<\/li><li><strong>paraphrase<\/strong> queries (\"Why do astronauts appear weightless?\") — should favor dense<\/li><\/ul>\n<h3 id=\"the-metrics-plain-words\">The metrics (plain words)<\/h3>\n<blockquote><p>For the full framework behind these — the set-vs-rank split, Precision@k, MAP, and how ground-truth labels work — see <a class=\"mdlink\" data-href=\"search-evaluation.md\" href=\"#\">search-evaluation.md<\/a>. This section is just enough to read the tables below.<\/p><\/blockquote>\n<p>The first three care about the <strong>single best<\/strong> chunk. The last two care about <strong>all<\/strong> chunks from the correct doc (the \"relevant set\").<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Metric<\/th><th>What it asks<\/th><th>Cares about<\/th><\/tr><\/thead><tbody><tr><td><strong>Hit@1<\/strong><\/td><td>Is the #1 result from the correct doc?<\/td><td>the top spot<\/td><\/tr><tr><td><strong>Hit@3<\/strong><\/td><td>Is the correct doc anywhere in the top 3?<\/td><td>being present<\/td><\/tr><tr><td><strong>MRR<\/strong><\/td><td><code>1/rank<\/code> of the <em>first<\/em> correct chunk, averaged. Rewards putting the right answer <em>higher<\/em>.<\/td><td>the first hit's rank<\/td><\/tr><tr><td><strong>Recall@k<\/strong><\/td><td>Of <em>all<\/em> the correct doc's chunks, what share landed in the top k?<\/td><td>gathering everything<\/td><\/tr><tr><td><strong>NDCG@k<\/strong><\/td><td>Like MRR but for many relevant items: rewards relevant chunks, discounted the lower they sit.<\/td><td>ranking the whole set well<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>One catch on Recall@k:<\/strong> if a doc produced 14 chunks but you only retrieve 5, the best possible Recall@5 is 5/14 ≈ 0.36 — you <em>can't<\/em> fit them all in 5 slots. So low recall numbers below aren't failure; read them against that ceiling.<\/p>\n<h2 id=\"results\">Results<\/h2>\n<h3 id=\"default-chunking-chunk_size512-5-chunks-one-per-doc\">Default chunking (chunk_size=512 → 5 chunks, one per doc)<\/h3>\n<pre><code>config             Hit@1   Hit@3     MRR     R@5   NDCG@5\n---------------------------------------------------------\ndense               0.93    1.00   0.967    1.00    0.975\nhybrid              0.93    1.00   0.967    1.00    0.975\nhybrid+rerank       1.00    1.00   1.000    1.00    1.000<\/code><\/pre>\n<p>With one chunk per doc, each relevant set is a single chunk, so Recall@5 is trivially 1.00. Dense already nearly maxes out and BM25 has nothing to <em>recover<\/em> — so <strong>hybrid == dense<\/strong>. The cross-encoder reranker still earns its place: it fixed the one query the others ranked #2, lifting Hit@1 to a perfect 1.00.<\/p>\n<h3 id=\"finer-chunking-chunk_size64-72-chunks-14-per-doc\">Finer chunking (chunk_size=64 → 72 chunks, ~14 per doc)<\/h3>\n<pre><code>config             Hit@1   Hit@3     MRR     R@5   NDCG@5\n---------------------------------------------------------\ndense               0.93    1.00   0.967    0.31    0.857\nhybrid              1.00    1.00   1.000    0.28    0.785\nhybrid+rerank       1.00    1.00   1.000    0.27    0.764<\/code><\/pre>\n<p>Now the metrics <strong>disagree<\/strong> — and that is the most valuable result here.<\/p>\n<ul><li><strong>Top-spot metrics say hybrid/rerank win.<\/strong> Hit@1 climbs 0.93 → 1.00, MRR<\/li><\/ul>\n<p>0.967 → 1.000. The concrete reason: the query <strong>\"What is left behind after a   supernova?\"<\/strong> — dense ranked the correct <code>stellar_lifecycle.md<\/code> chunk at <strong>#2<\/strong>;   BM25 caught the rare exact term <em>\"supernova\"<\/em> and RRF lifted it to <strong>#1<\/strong>.<\/p>\n<ul><li><strong>Coverage metrics say dense wins.<\/strong> Recall@5 drops 0.31 → 0.27 and NDCG@5 drops<\/li><\/ul>\n<p>0.857 → 0.764. Why? Dense pulls chunks from the <em>same<\/em> doc together (they're   semantically similar), so the top 5 is dominated by the correct doc. BM25 and the   reranker deliberately inject chunks from <em>other<\/em> docs that match on keywords or   pair-relevance — better single answer, but fewer same-doc chunks gathered.<\/p>\n<p>(Recall@5 looks low because each doc has ~14 chunks but only 5 fit in the top 5 — the ceiling is ~0.36, so dense's 0.31 is near-optimal coverage.)<\/p>\n<h2 id=\"the-honest-takeaways-this-is-the-senior-answer\">The honest takeaways (this is the senior answer)<\/h2>\n<ol><li><strong>The metrics measure different goals, and they can disagree.<\/strong> Hit@1/MRR ask<\/li><\/ol>\n<p><em>\"is the single best chunk on top?\"<\/em> Recall/NDCG ask <em>\"did we gather all the    relevant context?\"<\/em> Hybrid + rerank optimize the first and slightly hurt the    second. Which you want depends on the task: a pointed Q&amp;A wants Hit@1; a    summarization or multi-hop task wants recall.<\/p>\n<ol><li><strong>On a tiny, clean corpus, hybrid ≈ dense.<\/strong> There's nothing for BM25 to<\/li><\/ol>\n<p>recover when dense already nails it. The gain shows up once there are enough    competing chunks (and, at real scale, on jargon dense struggles with).<\/p>\n<ol><li><strong>Granularity matters.<\/strong> The <em>same<\/em> methods looked different at 5 vs 72 chunks.<\/li><\/ol>\n<p>Retrieval quality is a property of the <em>whole<\/em> pipeline (chunking included),    not one component.<\/p>\n<blockquote><p>The interview answer this unlocks: not <em>\"hybrid is better,\"<\/em> but <em>\"hybrid and the reranker improved Hit@1 and MRR by floating the single best chunk to the top — BM25 recovered an exact-term query dense ranked second — but they slightly lowered Recall@5 and NDCG@5 because they mix in other-doc chunks. Which tradeoff I want depends on whether the task needs the one best chunk or broad coverage.\"<\/em><\/p><\/blockquote>\n<h2 id=\"run-it-yourself\">Run it yourself<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">make<\/span> eval                              <span class=\"tok-comment\"># dense vs hybrid (fast, embedder only)<\/span>\n<span class=\"tok-command\">make<\/span> eval ARGS=<span class=\"tok-flag\">--rerank<\/span>                <span class=\"tok-comment\"># add the cross-encoder<\/span>\n<span class=\"tok-command\">make<\/span> beast-eval                        <span class=\"tok-comment\"># full run with rerank on the GPU<\/span>\n<span class=\"tok-command\">python<\/span> <span class=\"tok-flag\">-m<\/span> scripts.retrieval_eval <span class=\"tok-flag\">--rerank<\/span> <span class=\"tok-flag\">--chunk-size<\/span> <span class=\"tok-number\">64<\/span>   <span class=\"tok-comment\"># the finer-grained run<\/span><\/code><\/pre>\n<h2 id=\"whats-still-missing\">What's still missing<\/h2>\n<p>This measures <em>retrieval<\/em> (did we fetch the right chunks?). It does <strong>not<\/strong> yet measure <em>answer<\/em> quality (faithfulness, hallucination) — that's Phase 6 (RAGAS / DeepEval), which grades the LLM's output, not the retriever's.<\/p>","toc":[{"level":2,"id":"the-setup","text":"The setup"},{"level":3,"id":"the-metrics-plain-words","text":"The metrics (plain words)"},{"level":2,"id":"results","text":"Results"},{"level":3,"id":"default-chunking-chunk_size512-5-chunks-one-per-doc","text":"Default chunking (chunk_size=512 → 5 chunks, one per doc)"},{"level":3,"id":"finer-chunking-chunk_size64-72-chunks-14-per-doc","text":"Finer chunking (chunk_size=64 → 72 chunks, ~14 per doc)"},{"level":2,"id":"the-honest-takeaways-this-is-the-senior-answer","text":"The honest takeaways (this is the senior answer)"},{"level":2,"id":"run-it-yourself","text":"Run it yourself"},{"level":2,"id":"whats-still-missing","text":"What's still missing"}],"text":"retrieval eval — does hybrid + rerank actually beat dense? where in the pipeline: this measures the search stage directly. it runs dense, hybrid, and hybrid+rerank over the same corpus and the same labeled queries, and reports the same metrics for each. this is the evidence for the hardest phase 3 interview question: \"how did you know your retrieval improved?\" script: scripts/retrieval_eval.py · query set: data/eval/retrieval_queries.json the setup 15 labeled queries over the 5-doc space corpus. each query is tagged with the doc that should answer it ( source-level relevance — did we retrieve a chunk from the right doc?). the queries are a deliberate mix: exact-term queries (\"what is the schwarzschild radius?\") — should favor bm25 paraphrase queries (\"why do astronauts appear weightless?\") — should favor dense the metrics (plain words) for the full framework behind these — the set-vs-rank split, precision@k, map, and how ground-truth labels work — see search-evaluation.md . this section is just enough to read the tables below. the first three care about the single best chunk. the last two care about all chunks from the correct doc (the \"relevant set\"). metric what it asks cares about hit@1 is the #1 result from the correct doc? the top spot hit@3 is the correct doc anywhere in the top 3? being present mrr 1/rank of the first correct chunk, averaged. rewards putting the right answer higher . the first hit's rank recall@k of all the correct doc's chunks, what share landed in the top k? gathering everything ndcg@k like mrr but for many relevant items: rewards relevant chunks, discounted the lower they sit. ranking the whole set well one catch on recall@k: if a doc produced 14 chunks but you only retrieve 5, the best possible recall@5 is 5/14 ≈ 0.36 — you can't fit them all in 5 slots. so low recall numbers below aren't failure; read them against that ceiling. results default chunking (chunk_size=512 → 5 chunks, one per doc) config hit@1 hit@3 mrr r@5 ndcg@5 --------------------------------------------------------- dense 0.93 1.00 0.967 1.00 0.975 hybrid 0.93 1.00 0.967 1.00 0.975 hybrid+rerank 1.00 1.00 1.000 1.00 1.000 with one chunk per doc, each relevant set is a single chunk, so recall@5 is trivially 1.00. dense already nearly maxes out and bm25 has nothing to recover — so hybrid == dense . the cross-encoder reranker still earns its place: it fixed the one query the others ranked #2, lifting hit@1 to a perfect 1.00. finer chunking (chunk_size=64 → 72 chunks, ~14 per doc) config hit@1 hit@3 mrr r@5 ndcg@5 --------------------------------------------------------- dense 0.93 1.00 0.967 0.31 0.857 hybrid 1.00 1.00 1.000 0.28 0.785 hybrid+rerank 1.00 1.00 1.000 0.27 0.764 now the metrics disagree — and that is the most valuable result here. top-spot metrics say hybrid/rerank win. hit@1 climbs 0.93 → 1.00, mrr 0.967 → 1.000. the concrete reason: the query \"what is left behind after a supernova?\" — dense ranked the correct stellar_lifecycle.md chunk at #2 ; bm25 caught the rare exact term \"supernova\" and rrf lifted it to #1 . coverage metrics say dense wins. recall@5 drops 0.31 → 0.27 and ndcg@5 drops 0.857 → 0.764. why? dense pulls chunks from the same doc together (they're semantically similar), so the top 5 is dominated by the correct doc. bm25 and the reranker deliberately inject chunks from other docs that match on keywords or pair-relevance — better single answer, but fewer same-doc chunks gathered. (recall@5 looks low because each doc has ~14 chunks but only 5 fit in the top 5 — the ceiling is ~0.36, so dense's 0.31 is near-optimal coverage.) the honest takeaways (this is the senior answer) the metrics measure different goals, and they can disagree. hit@1/mrr ask \"is the single best chunk on top?\" recall/ndcg ask \"did we gather all the relevant context?\" hybrid + rerank optimize the first and slightly hurt the second. which you want depends on the task: a pointed q&a wants hit@1; a summarization or multi-hop task wants recall. on a tiny, clean corpus, hybrid ≈ dense. there's nothing for bm25 to recover when dense already nails it. the gain shows up once there are enough competing chunks (and, at real scale, on jargon dense struggles with). granularity matters. the same methods looked different at 5 vs 72 chunks. retrieval quality is a property of the whole pipeline (chunking included), not one component. the interview answer this unlocks: not \"hybrid is better,\" but \"hybrid and the reranker improved hit@1 and mrr by floating the single best chunk to the top — bm25 recovered an exact-term query dense ranked second — but they slightly lowered recall@5 and ndcg@5 because they mix in other-doc chunks. which tradeoff i want depends on whether the task needs the one best chunk or broad coverage.\" run it yourself make eval # dense vs hybrid (fast, embedder only) make eval args= --rerank # add the cross-encoder make beast-eval # full run with rerank on the gpu python -m scripts.retrieval_eval --rerank --chunk-size 64 # the finer-grained run what's still missing this measures retrieval (did we fetch the right chunks?). it does not yet measure answer quality (faithfulness, hallucination) — that's phase 6 (ragas / deepeval), which grades the llm's output, not the retriever's.","words":867},{"path":"10-qdrant/README.md","title":"Overview","section":"10 · Qdrant","quiz":false,"accent":"#b5651d","html":"<h1 id=\"qdrant-a-vector-store-you-talk-to-not-one-you-embed-phase-2b\">Qdrant — a vector store you talk to, not one you embed (Phase 2b)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> FAISS lives <em>inside<\/em> your program (a notebook on your desk). Qdrant is a <em>separate service<\/em> you talk to over the network (a librarian in another room). Both store vectors and find nearest neighbors. The difference is operational, not about raw speed.<\/div><\/div>\n<h2 id=\"where-this-lives-in-the-pipeline\">Where this lives in the pipeline<\/h2>\n<p>Phase 2b only swaps the <strong>Index<\/strong> box. Same <code>VectorStore<\/code> contract, so the retriever and pipeline never learn which backend is underneath.<\/p>\n<pre><code>Ingest → Chunk → Embed → [ INDEX: faiss | qdrant ] → Search → Generate\n                              ▲\n                  the only thing that changes<\/code><\/pre>\n<h2 id=\"embedded-vs-service-the-core-idea\">Embedded vs. service (the core idea)<\/h2>\n<p><strong>FAISS = embedded.<\/strong> \"Embedded\" means it runs <em>inside your own Python process<\/em>. The vectors sit in this program's memory and get written to a file. Fast to search, but only this one process can read them at a time.<\/p>\n<p><strong>Qdrant = a service.<\/strong> It's a separate program. You send it \"find the closest vectors to this one\" over HTTP, it does the work and sends results back. DocsMind runs it in one of two modes:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Mode<\/th><th>What it is<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>local-path<\/strong><\/td><td>Qdrant persists to a directory on disk, no server process<\/td><td>Default — keeps tests and <code>make demo<\/code> offline<\/td><\/tr><tr><td><strong>server (URL)<\/strong><\/td><td>A Dockerized Qdrant reachable over HTTP (e.g. on beast)<\/td><td>The \"real\" deployment shape<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Set <code>qdrant_url<\/code> to use the server; leave it empty for local-path.<\/p>\n<h2 id=\"why-move-to-a-service-at-all\">Why move to a service at all?<\/h2>\n<p><strong>Not for speed<\/strong> — that's the common wrong answer. The reasons are operational:<\/p>\n<ul><li><strong>Concurrency.<\/strong> Many copies of your API can query the <em>same<\/em> Qdrant at once.<\/li><\/ul>\n<p>With FAISS, each process needs its own copy of the index in memory.<\/p>\n<ul><li><strong>Live updates.<\/strong> Qdrant supports adding/deleting vectors on the fly. A FAISS<\/li><\/ul>\n<p>flat index is rebuilt to change.<\/p>\n<ul><li><strong>Metadata filtering.<\/strong> Qdrant can filter while it searches (\"only docs from<\/li><\/ul>\n<p>2024\"), using the payload stored next to each vector.<\/p>\n<blockquote><p>You reach for Qdrant when the index <strong>outgrows a single process<\/strong> — not when search feels slow.<\/p><\/blockquote>\n<h2 id=\"one-technical-contrast-to-keep\">One technical contrast to keep<\/h2>\n<p>Qdrant builds an <strong>HNSW<\/strong> graph for every collection by default — so its search is <strong>approximate<\/strong> out of the box. FAISS <code>flat<\/code> (the Phase 1 default) is <strong>exact<\/strong>. Just by switching backends, you traded exact answers for fast-approximate ones. (HNSW is the same graph index covered in <a class=\"mdlink\" data-href=\"../05-faiss/\" href=\"#\">05-faiss<\/a>.)<\/p>\n<h2 id=\"how-its-wired\">How it's wired<\/h2>\n<ul><li><code>QdrantVectorStore<\/code> (<code class=\"srcref\" title=\"source file in the repo\"><code>qdrant_store.py<\/code><\/code>)<\/li><\/ul>\n<p>implements the same <code>add / search / save / size / index_type / chunks<\/code> contract   as <code>FaissVectorStore<\/code>.<\/p>\n<ul><li>The <code>vector_backend<\/code> setting (<code>\"faiss\"<\/code> default / <code>\"qdrant\"<\/code>) selects it in the<\/li><\/ul>\n<p>factory. Switch with <code>DOCSMIND_VECTOR_BACKEND=qdrant<\/code> and re-ingest.<\/p>\n<ul><li>Vectors use <strong>cosine<\/strong> distance. Our embeddings are already L2-normalized, so<\/li><\/ul>\n<p>cosine and dot product agree.<\/p>\n<ul><li>Point payloads carry the full chunk (id, text, source, metadata), so search<\/li><\/ul>\n<p>results and the BM25 corpus can be rebuilt straight from Qdrant.<\/p>\n<h2 id=\"the-interview-signals\">The interview signals<\/h2>\n<ul><li><strong>Why move from FAISS to Qdrant?<\/strong> Operations, not performance: concurrent<\/li><\/ul>\n<p>access across API replicas, live upserts, metadata filtering. FAISS is one   process's memory; Qdrant is a shared service.<\/p>\n<ul><li><strong>What did it cost?<\/strong> A network hop per query, a service to run and monitor, and<\/li><\/ul>\n<p>you gave up FAISS's exact <code>flat<\/code> for Qdrant's approximate HNSW.<\/p>\n<ul><li><strong>How did you keep tests offline?<\/strong> Local-path / in-memory Qdrant — no server<\/li><\/ul>\n<p>needed, same code path.<\/p>\n<p>→ Code: <code class=\"srcref\" title=\"source file in the repo\"><code>qdrant_store.py<\/code><\/code> · Interface: <code class=\"srcref\" title=\"source file in the repo\"><code>base.py<\/code><\/code><\/p>","toc":[{"level":2,"id":"where-this-lives-in-the-pipeline","text":"Where this lives in the pipeline"},{"level":2,"id":"embedded-vs-service-the-core-idea","text":"Embedded vs. service (the core idea)"},{"level":2,"id":"why-move-to-a-service-at-all","text":"Why move to a service at all?"},{"level":2,"id":"one-technical-contrast-to-keep","text":"One technical contrast to keep"},{"level":2,"id":"how-its-wired","text":"How it's wired"},{"level":2,"id":"the-interview-signals","text":"The interview signals"}],"text":"qdrant — a vector store you talk to, not one you embed (phase 2b) 💡 tl;dr faiss lives inside your program (a notebook on your desk). qdrant is a separate service hnsw is the same graph index covered in 05-faiss .) how it's wired qdrantvectorstore ( qdrant_store.py ) implements the same add / search / save / size / index_type / chunks contract as faissvectorstore . the vector_backend setting ( \"faiss\" default / \"qdrant\" ) selects it in the factory. switch with docsmind_vector_backend=qdrant and re-ingest. vectors use cosine distance. our embeddings are already l2-normalized, so cosine and dot product agree. point payloads carry the full chunk (id, text, source, metadata), so search results and the bm25 corpus can be rebuilt straight from qdrant. the interview signals why move from faiss to qdrant? operations, not performance: concurrent access across api replicas, live upserts, metadata filtering. faiss is one process's memory; qdrant is a shared service. what did it cost? a network hop per query, a service to run and monitor, and you gave up faiss's exact flat for qdrant's approximate hnsw. how did you keep tests offline? local-path / in-memory qdrant — no server needed, same code path. → code: qdrant_store.py · interface: base.py","words":555},{"path":"11-hyde/README.md","title":"HyDE — Search With a Fake Answer","section":"11 · HyDE (Concept)","quiz":false,"accent":"","html":"<h1 id=\"hyde-search-with-a-fake-answer-concept-phase-5\">HyDE — search with a fake answer (concept, Phase 5)<\/h1>\n<p><strong>Where in the pipeline:<\/strong> the <strong>query side<\/strong> of Search — between receiving the question and embedding it. Everything downstream (index, fusion, rerank) is untouched. Not built in DocsMind yet; it's a Phase 5 (agent) technique. This page exists so the concept is mapped before the code lands.<\/p>\n<pre><code>                 today:  question ────────────→ embed → search\n                  HyDE:  question → LLM writes a\n                         hypothetical answer ──→ embed → search<\/code><\/pre>\n<h2 id=\"the-problem-it-solves\">The problem it solves<\/h2>\n<p>At query time we currently embed the <strong>question<\/strong> and hunt for nearby chunks. But questions and answers are <em>different kinds of text<\/em>. \"Why do astronauts float?\" is short, interrogative, and contains none of the vocabulary of the passage that answers it (microgravity, free fall, orbital velocity). The question's vector sits in a slightly wrong neighborhood — we're searching for a thing shaped like a question in an index full of things shaped like answers.<\/p>\n<h2 id=\"the-fix\">The fix<\/h2>\n<p><strong>HyDE — Hypothetical Document Embeddings.<\/strong> Ask an LLM to <em>write a fake answer first<\/em>, embed <strong>that<\/strong>, and search with it.<\/p>\n<p>The fake answer may be factually wrong — doesn't matter. It's the right <em>kind<\/em> of text: declarative, answer-shaped, full of the domain vocabulary that real answer chunks also use. Its vector lands in the answer neighborhood, and nearest-neighbor search does the rest. The retrieved chunks are real; the fake answer is thrown away before generation.<\/p>\n<p>Plain version: instead of describing a suspect to the sketch artist, you draw the sketch yourself — badly — and match it against the photo database. A bad sketch of the right face beats a perfect description in the wrong medium.<\/p>\n<h2 id=\"where-it-will-slot-into-the-real-code\">Where it will slot into the real code<\/h2>\n<p>One seam: <code>HybridRetriever.retrieve()<\/code> in <code class=\"srcref\" title=\"source file in the repo\"><code>retriever.py<\/code><\/code> currently embeds <code>question<\/code> directly. HyDE inserts one LLM call before that embed:<\/p>\n<pre><code class=\"language-python\">hypothetical = llm.generate(<span class=\"tok-string\">f\"Write a short passage answering: {question}\"<\/span>)\nquery_vec = embedder.embed(hypothetical)   <span class=\"tok-comment\"># instead of embed(question)<\/span><\/code><\/pre>\n<p>Note what this costs: <strong>an extra LLM call before retrieval even starts<\/strong> — added latency and tokens on every query. That's why it belongs in Phase 5's agent, which can <em>decide<\/em> when to use it, rather than being always-on.<\/p>\n<h2 id=\"trade-offs-the-interview-meat\">Trade-offs (the interview meat)<\/h2>\n<ul><li><strong>Cost:<\/strong> one LLM round-trip per query, on the critical path, before any<\/li><\/ul>\n<p>search happens. Streaming can't hide it.<\/p>\n<ul><li><strong>Risk:<\/strong> if the LLM's fake answer is off-topic (ambiguous question, or a<\/li><\/ul>\n<p>topic the model knows nothing about), you've <em>steered retrieval wrong<\/em> —   worse than the plain question. HyDE amplifies the LLM's prior, good or bad.<\/p>\n<ul><li><strong>When it shines:<\/strong> short vague questions over a corpus with strong domain<\/li><\/ul>\n<p>vocabulary; zero-shot setups with no labeled data to fine-tune retrievers.<\/p>\n<ul><li><strong>When to skip it:<\/strong> queries that already share vocabulary with the docs<\/li><\/ul>\n<p>(keyword-ish questions — BM25 covers those in hybrid), or strict latency   budgets.<\/p>\n<ul><li><strong>How you'd validate it:<\/strong> the same harness as Phase 3 — add a <code>hyde<\/code><\/li><\/ul>\n<p>config to <code>scripts/retrieval_eval.py<\/code>, run the same 15 labeled queries,   compare Hit@1/MRR against dense and hybrid. No new machinery needed; that's   the payoff of having built the eval first.<\/p>\n<h2 id=\"same-family-different-tricks-phase-5-preview\">Same family, different tricks (Phase 5 preview)<\/h2>\n<p>HyDE is one of several <strong>query transformations<\/strong> — all living at the same \"rewrite the query before search\" stage:<\/p>\n<ul><li><strong>Multi-Query:<\/strong> rephrase the question N ways, search all, fuse with RRF<\/li><\/ul>\n<p>(the same fusion already built in Phase 3).<\/p>\n<ul><li><strong>Decomposition:<\/strong> split a multi-hop question into sub-questions, retrieve<\/li><\/ul>\n<p>per sub-question.<\/p>\n<ul><li><strong>HyDE:<\/strong> transform the question into answer-shaped text (this page).<\/li><\/ul>\n<p>Same seam, same eval, different rewrite. When Phase 5 lands, each gets the full treatment.<\/p>\n<h2 id=\"the-interview-signals\">The interview signals<\/h2>\n<ul><li><strong>What is HyDE, in one line?<\/strong> Embed a hypothetical answer instead of the<\/li><\/ul>\n<p>question, because answers live near answers in embedding space.<\/p>\n<ul><li>**Why does a <em>wrong<\/em> fake answer still work?** Retrieval only needs the<\/li><\/ul>\n<p>vector to land in the right neighborhood — vocabulary and shape put it   there; factual precision doesn't matter because the fake text is discarded.<\/p>\n<ul><li><strong>When does it backfire?<\/strong> Off-topic hypothetical → confidently wrong<\/li><\/ul>\n<p>retrieval, plus an LLM call of latency on every query. You A/B it on a   labeled eval set before turning it on — never by vibes.<\/p>","toc":[{"level":2,"id":"the-problem-it-solves","text":"The problem it solves"},{"level":2,"id":"the-fix","text":"The fix"},{"level":2,"id":"where-it-will-slot-into-the-real-code","text":"Where it will slot into the real code"},{"level":2,"id":"trade-offs-the-interview-meat","text":"Trade-offs (the interview meat)"},{"level":2,"id":"same-family-different-tricks-phase-5-preview","text":"Same family, different tricks (Phase 5 preview)"},{"level":2,"id":"the-interview-signals","text":"The interview signals"}],"text":"hyde — search with a fake answer (concept, phase 5) where in the pipeline: the query side of search — between receiving the question and embedding it. everything downstream (index, fusion, rerank) is untouched. not built in docsmind yet; it's a phase 5 (agent) technique. this page exists so the concept is mapped before the code lands. today: question ────────────→ embed → search hyde: question → llm writes a hypothetical answer ──→ embed → search the problem it solves at query time we currently embed the question and hunt for nearby chunks. but questions and answers are different kinds of text . \"why /* Runtime app — no markdown engine, all content is pre-rendered in DATA. */
const PAGES = DATA.pages;
const byPath = {};
PAGES.forEach(p => byPath[p.path] = p);
let currentPath = null;

// --- live Jupyter playground link (served on the same host, port 8888) ---
const JUPYTER_PORT = 8888;
const JUPYTER_TOKEN = "koireader";   // matches run.sh / koi-jupyter service
function jupyterURL(){
  const proto = location.protocol === "file:" ? "http:" : location.protocol;
  const host = location.hostname || "localhost";
  return proto + "//" + host + ":" + JUPYTER_PORT + "/lab?token=" + JUPYTER_TOKEN;
}

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.nav.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    wrap.style.setProperty("--card", sec.accent);
    const h=document.createElement("div"); h.className="sec-h";
    h.innerHTML='<span class="sec-ic">'+(sec.icon||"")+'</span> '+sec.label;
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const a=document.createElement("a");
      a.className="item"+(/README\.md$/.test(it.path)&&it.path.indexOf("/")>=0?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(it.path);
      a.dataset.path=it.path;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  document.querySelectorAll("nav a.item").forEach(a=>a.classList.toggle("active", a.dataset.path===path));
  const pg=byPath[path];
  document.getElementById("tbTitle").textContent = pg ? pg.title : "KoiReader Prep";
}

function renderPageTools(pg){
  const host=document.getElementById("pagetools");
  let html="";
  if(pg.quiz){
    html += '<div class="quizbar">'+
      '<button class="qbtn" id="hideAll">Quiz me · hide answers</button>'+
      '<button class="qbtn" id="showAll">Show all</button>'+
      '<span class="hint">Tap a question to reveal its answer.</span></div>';
  }
  if(pg.toc && pg.toc.length>=3){
    html += '<details class="toc"><summary>On this page</summary><ul>'+
      pg.toc.map(t=>'<li><a class="lvl'+t.level+'" data-anchor="'+t.id+'" href="#">'+t.text+'</a></li>').join("")+
      '</ul></details>';
  }
  host.innerHTML=html;
  if(pg.quiz){
    const set=open=>document.querySelectorAll("#content details.qa").forEach(d=>d.open=open);
    const hb=document.getElementById("hideAll"), sb=document.getElementById("showAll");
    if(hb) hb.onclick=()=>set(false);
    if(sb) sb.onclick=()=>set(true);
  }
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

function loadPage(path){
  const pg=byPath[path];
  const content=document.getElementById("content");
  if(!pg){ content.innerHTML='<div class="loading">Page not found: '+path+'</div>'; document.getElementById("pagetools").innerHTML=""; document.getElementById("pager").innerHTML=""; return; }
  currentPath=path;
  setActive(path);
  // tint the page to its section accent (soft tint is translucent → theme-proof)
  const root=document.documentElement.style;
  if(pg.accent){ root.setProperty("--sec-accent", pg.accent); root.setProperty("--sec-accent-soft", hexToRgba(pg.accent, 0.16)); }
  else { root.removeProperty("--sec-accent"); root.removeProperty("--sec-accent-soft"); }
  content.innerHTML=pg.html;
  renderPageTools(pg);
  renderPager(path);
  window.scrollTo(0,0);
  closeSidebar();
}

function go(path){ location.hash="#"+encodeURI(path); }
function onHash(){
  let raw=decodeURI(location.hash.replace(/^#/,""));
  loadPage(raw || "README.md");
}

// internal links + TOC anchors
document.addEventListener("click", e=>{
  const anchor=e.target.closest("a[data-anchor]");
  if(anchor){ e.preventDefault(); const el=document.getElementById(anchor.dataset.anchor); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); return; }
  const a=e.target.closest("a.mdlink");
  if(!a) return;
  const href=a.getAttribute("data-href");
  if(href==="JUPYTER"){ e.preventDefault(); window.open(jupyterURL(), "_blank", "noopener"); return; }
  e.preventDefault();
  const target=resolvePath(currentPath||"README.md", href);
  if(target) go(target);
});

/* ---------------------------------- search --------------------------------- */
const searchBox=document.getElementById("search");
const panel=document.getElementById("searchpanel");
let selIndex=-1, results=[];

function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function snippet(text, q){
  const i=text.indexOf(q); if(i<0) return text.slice(0,120)+"…";
  const s=Math.max(0,i-50), e=Math.min(text.length,i+q.length+70);
  let frag=(s>0?"…":"")+text.slice(s,e)+(e<text.length?"…":"");
  return frag.replace(new RegExp(escRe(q),"ig"), m=>"<mark>"+m+"</mark>");
}
function runSearch(){
  const q=searchBox.value.trim().toLowerCase();
  if(q.length<2){ panel.classList.remove("show"); return; }
  results=PAGES.filter(p=>p.text.indexOf(q)>=0 || p.title.toLowerCase().indexOf(q)>=0).slice(0,40);
  selIndex=-1;
  if(!results.length){ panel.innerHTML='<div class="empty">No matches for “'+q+'”.</div>'; panel.classList.add("show"); return; }
  panel.innerHTML=results.map((p,k)=>
    '<a class="sr" data-k="'+k+'" data-path="'+p.path+'" href="#'+encodeURI(p.path)+'">'+
    '<div class="t">'+p.title+' <span style="color:var(--muted);font-weight:400">· '+p.section+'</span></div>'+
    '<div class="c">'+snippet(p.text,q)+'</div></a>').join("");
  panel.classList.add("show");
}
searchBox.addEventListener("input", runSearch);
searchBox.addEventListener("focus", ()=>{ if(searchBox.value.trim().length>=2) runSearch(); });
panel.addEventListener("click", e=>{ const r=e.target.closest(".sr"); if(r){ e.preventDefault(); go(r.dataset.path); closeSearch(); } });
function closeSearch(){ panel.classList.remove("show"); }
document.addEventListener("click", e=>{ if(!panel.contains(e.target) && e.target!==searchBox && !e.target.closest("#searchBtn")) closeSearch(); });
searchBox.addEventListener("keydown", e=>{
  if(!panel.classList.contains("show")) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); selIndex=Math.min(results.length-1,selIndex+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); selIndex=Math.max(0,selIndex-1); }
  else if(e.key==="Enter"){ e.preventDefault(); if(results[selIndex]){ go(results[selIndex].path); closeSearch(); searchBox.blur(); } return; }
  else if(e.key==="Escape"){ closeSearch(); searchBox.blur(); return; }
  panel.querySelectorAll(".sr").forEach((el,i)=>el.classList.toggle("sel", i===selIndex));
  const sel=panel.querySelector(".sr.sel"); if(sel) sel.scrollIntoView({block:"nearest"});
});

/* --------------------------------- theme ----------------------------------- */
function applyTheme(t){ document.documentElement.dataset.theme=t; try{localStorage.setItem("koi-theme",t);}catch(_){} }
function toggleTheme(){ applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"); }
document.querySelectorAll(".theme-toggle").forEach(b=>b.addEventListener("click",toggleTheme));
(function(){ let t; try{t=localStorage.getItem("koi-theme");}catch(_){}
  if(!t) t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"; applyTheme(t); })();

/* ----------------------------- mobile drawer ------------------------------- */
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function openSidebar(){ sidebar.classList.add("open"); scrim.classList.add("show"); }
function closeSidebar(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menu").addEventListener("click", openSidebar);
document.getElementById("searchBtn").addEventListener("click", ()=>{ openSidebar(); setTimeout(()=>searchBox.focus(),260); });
scrim.addEventListener("click", closeSidebar);
addEventListener("keydown", e=>{ if(e.key==="Escape") closeSidebar(); });

    jl.title="Opens JupyterLab on this device, port "+JUPYTER_PORT+
             " — requires the playground running (bash run.sh, or the koi-jupyter service).";

})();

onHash();
