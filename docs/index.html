tor and appear artificially \"closer\" to everything. cosine only cares about direction (angle), which represents meaning. for text retrieval, direction = meaning, magnitude = irrelevant.","words":464},{"path":"08-interview-prep/index-questions.md","title":"Index & Vector DB Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"index-types-vector-dbs-interview-questions\">Index Types &amp; Vector DBs — Interview Questions<\/h1>\n<p>These are the Phase 2 / 2b depth questions. The pattern interviewers probe: not \"did you use FAISS?\" but \"why <em>this<\/em> index, and how did you know?\"<\/p>\n<hr>\n<details class=\"qa\" open><summary>Q: Flat vs IVF vs HNSW vs PQ — when do you use each?<\/summary><div class=\"qa-body\"><p>All four live at the same pipeline stage — the <strong>Index<\/strong> box — and answer the same question (\"nearest vectors to this one\"), differently:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Index<\/th><th>Idea in one line<\/th><th>Trade<\/th><\/tr><\/thead><tbody><tr><td><strong>Flat<\/strong><\/td><td>Check every vector (exact scan)<\/td><td>100% recall, O(N) time<\/td><\/tr><tr><td><strong>IVF<\/strong><\/td><td>Cluster vectors; search only the nearest clusters<\/td><td>Speed for recall (misses across cluster borders)<\/td><\/tr><tr><td><strong>HNSW<\/strong><\/td><td>Greedy walk through a graph of neighbors<\/td><td>Speed for memory (stores the graph)<\/td><\/tr><tr><td><strong>IVFPQ<\/strong><\/td><td>IVF + compress vectors to a few bytes<\/td><td>Memory for recall (lossy compression)<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Rule of thumb: flat until it hurts (~100k vectors), HNSW when latency matters and RAM is fine, IVF when you want a tunable middle, PQ only when the vectors don't fit in memory.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: You benchmarked these. What were the actual numbers?<\/summary><div class=\"qa-body\"><p>At 50k synthetic clustered vectors (384-dim, like bge-small):<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Index<\/th><th>Latency<\/th><th>Recall@10<\/th><th>Memory<\/th><\/tr><\/thead><tbody><tr><td>flat<\/td><td>0.78 ms<\/td><td>100%<\/td><td>1.0x<\/td><\/tr><tr><td>ivf<\/td><td>0.10 ms<\/td><td>90%<\/td><td>~1.0x<\/td><\/tr><tr><td>hnsw<\/td><td>0.40 ms<\/td><td>86%<\/td><td>1.18x<\/td><\/tr><tr><td>ivfpq<\/td><td>0.09 ms<\/td><td>33%<\/td><td><strong>0.04x<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\n<p>And flat scales linearly: 0.78 ms at 50k → 7.2 ms at 500k. That O(N) line is <em>why<\/em> ANN indexes exist — you can see exactly where flat stops being viable.<\/p>\n<p>The IVFPQ row is the teaching moment: 25x less memory, but recall collapsed to 33% because 384 floats got squashed into a few bytes. Compression is not free.<\/p>\n<p>Script: <code class=\"srcref\" title=\"source file in the repo\"><code>scripts/benchmark.py<\/code><\/code> · full writeup: <a class=\"mdlink\" data-href=\"../05-faiss/benchmark-results.md\" href=\"#\">benchmark-results.md<\/a><\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why synthetic <em>clustered<\/em> vectors and not random ones?<\/summary><div class=\"qa-body\"><p>Real embeddings cluster — chunks about black holes sit near each other. Uniform random vectors spread evenly, which makes IVF look artificially good (clean cluster borders) and hides the recall loss you'd see in production. Benchmarking on data shaped like your real data is the difference between a number you can defend and a number that evaporates in production.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: So which index does your real pipeline use — and why?<\/summary><div class=\"qa-body\"><p><strong>Flat.<\/strong> The corpus is a few dozen chunks; exact search returns in well under a millisecond. Choosing HNSW there would be premature optimization — extra build time, extra parameters to tune, a recall trade, for zero felt benefit.<\/p>\n<p>The senior signal is the <em>decision procedure<\/em>, not the index: measure where flat's O(N) line crosses your latency budget, and switch only past that point.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What do nprobe and ef actually do?<\/summary><div class=\"qa-body\"><p>They are the <strong>recall-vs-speed dial<\/strong> on each ANN index, turned at query time:<\/p>\n<ul><li><strong>IVF <code>nprobe<\/code><\/strong> — how many clusters to look inside. More clusters = fewer<\/li><\/ul>\n<p>misses at borders, more work.<\/p>\n<ul><li><strong>HNSW <code>ef_search<\/code><\/strong> — how wide the graph walk keeps its candidate list.<\/li><\/ul>\n<p>Wider = better recall, slower.<\/p>\n<p>Same shape both times: spend more compute per query, recover more recall. In DocsMind these live in config (<code>ivf_nprobe<\/code>, <code>hnsw_ef_search<\/code>) so the dial is turnable without re-ingesting.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why does IVF/IVFPQ \"train on add\" — and what can go wrong?<\/summary><div class=\"qa-body\"><p>IVF must first learn where the clusters <em>are<\/em> (k-means over your vectors) before it can assign anything to them. So the store trains on the first <code>add()<\/code>. Two failure modes worth naming: training on too few vectors gives garbage centroids (FAISS will warn), and if your data distribution shifts later, the old centroids quietly degrade recall — you re-train to fix it.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: FAISS vs Qdrant — why did you add a second backend?<\/summary><div class=\"qa-body\"><p>Not for speed — for <strong>operations<\/strong>. FAISS is a library inside one process: each API replica needs its own copy of the index in memory, and a flat index is rebuilt to change. Qdrant is a service: many replicas query the same store, vectors upsert live, and it filters on metadata while searching.<\/p>\n<p>The hidden cost of the switch: Qdrant builds HNSW by default, so you traded FAISS-flat's <em>exact<\/em> search for <em>approximate<\/em> — just by changing backends.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How did you make the backends swappable?<\/summary><div class=\"qa-body\"><p>One <code>VectorStore<\/code> interface (<code>add / search / save / size / chunks<\/code>), two implementations, selected by a <code>vector_backend<\/code> config setting. The retriever and pipeline never learn which is underneath. This is the same seam pattern used everywhere in DocsMind (embedder, LLM client) — every external dependency sits behind an interface so a swap is a config change, not a refactor.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Compare FAISS, Pinecone, Weaviate, Milvus, pgvector.<\/summary><div class=\"qa-body\"><p>Group them by <em>operational shape<\/em>, not by feature list:<\/p>\n<ul><li><strong>Library, in-process:<\/strong> FAISS. Fastest, free, no filtering, no server. You<\/li><\/ul>\n<p>own persistence and scaling.<\/p>\n<ul><li><strong>Self-hostable service:<\/strong> Qdrant, Weaviate, Milvus. HTTP API, metadata<\/li><\/ul>\n<p>filtering, live updates, horizontal scale. You run them.<\/p>\n<ul><li><strong>Managed cloud:<\/strong> Pinecone. Zero ops, pay per use, data leaves your VPC.<\/li><li><strong>Bolt-on to a DB you already run:<\/strong> pgvector. Right when the vectors are<\/li><\/ul>\n<p>small-scale and Postgres is already there — one fewer system to operate.<\/p>\n<p>The interview answer: \"I'd pick by who operates it and where the data may live, then benchmark recall/latency on my own vectors — which I did.\"<\/p><\/div><\/details>","toc":[],"text":"index types & vector dbs — interview questions these are the phase 2 / 2b depth questions. the pattern interviewers probe: not \"did you use faiss?\" but \"why this index, and how did you know?\" q: flat vs ivf vs hnsw vs pq — when do you use each? all four live at the same pipeline stage — the index box — and answer the same question (\"nearest vectors to this one\"), differently: index idea in one line trade flat check every vector (exact scan) 100% recall, o(n) time ivf cluster vectors; search only the nearest clusters speed for recall (misses across cluster borders) hnsw greedy walk through a graph of neighbors speed for memory (stores the graph) ivfpq ivf + compress vectors to a few bytes memory for recall (lossy compression) rule of thumb: flat until it hurts (~100k vectors), hnsw when latency matters and ram is fine, ivf when you want a tunable middle, pq only when the vectors don't fit in memory. q: you benchmarked these. what were the actual numbers? at 50k synthetic clustered vectors (384-dim, like bge-small): index latency recall@10 memory flat 0.78 ms 100% 1.0x ivf 0.10 ms 90% ~1.0x hnsw 0.40 ms 86% 1.18x ivfpq 0.09 ms 33% 0.04x and flat scales linearly: 0.78 ms at 50k → 7.2 ms at 500k. that o(n) line is why ann indexes exist — you can see exactly where flat stops being viable. the ivfpq row is the teaching moment: 25x less memory, but recall collapsed to 33% because 384 floats got squashed into a few bytes. compression is not free. script: scripts/benchmark.py · full writeup: benchmark-results.md q: why synthetic clustered vectors and not random ones? real embeddings cluster — chunks about black holes sit near each other. uniform random vectors spread evenly, which makes ivf look artificially good (clean cluster borders) and hides the recall loss you'd see in production. benchmarking on data shaped like your real data is the difference between a number you can defend and a number that evaporates in production. q: so which index does your real pipeline use — and why? flat. the corpus is a few dozen chunks; exact search returns in well under a millisecond. choosing hnsw there would be premature optimization — extra build time, extra parameters to tune, a recall trade, for zero felt benefit. the senior signal is the decision procedure , not the index: measure where flat's o(n) line crosses your latency budget, and switch only past that point. q: what do nprobe and ef actually do? they are the recall-vs-speed dial on each ann index, turned at query time: ivf nprobe — how many clusters to look inside. more clusters = fewer misses at borders, more work. hnsw ef_search — how wide the graph walk keeps its candidate list. wider = better recall, slower. same shape both times: spend more compute per query, recover more recall. in docsmind these live in config ( ivf_nprobe , hnsw_ef_search ) so the dial is turnable without re-ingesting. q: why does ivf/ivfpq \"train on add\" — and what can go wrong? ivf must first learn where the clusters are (k-means over your vectors) before it can assign anything to them. so the store trains on the first add() . two failure modes worth naming: training on too few vectors gives garbage centroids (faiss will warn), and if your data distribution shifts later, the old centroids quietly degrade recall — you re-train to fix it. q: faiss vs qdrant — why did you add a second backend? not for speed — for operations . faiss is a library inside one process: each api replica needs its own copy of the index in memory, and a flat index is rebuilt to change. qdrant is a service: many replicas query the same store, vectors upsert live, and it filters on metadata while searching. the hidden cost of the switch: qdrant builds hnsw by default, so you traded faiss-flat's exact search for approximate — just by changing backends. q: how did you make the backends swappable? one vectorstore interface ( add / search / save / size / chunks ), two implementations, selected by a vector_backend config setting. the retriever and pipeline never learn which is underneath. this is the same seam pattern used everywhere in docsmind (embedder, llm client) — every external dependency sits behind an interface so a swap is a config change, not a refactor. q: compare faiss, pinecone, weaviate, milvus, pgvector. group them by operational shape , not by feature list: library, in-process: faiss. fastest, free, no filtering, no server. you own persistence and scaling. self-hostable service: qdrant, weaviate, milvus. http api, metadata filtering, live updates, horizontal scale. you run them. managed cloud: pinecone. zero ops, pay per use, data leaves your vpc. bolt-on to a db you already run: pgvector. right when the vectors are small-scale and postgres is already there — one fewer system to operate. the interview answer: \"i'd pick by who operates it and where the data may live, then benchmark recall/latency on my own vectors — which i did.\"","words":847},{"path":"08-interview-prep/hybrid-questions.md","title":"Hybrid & Reranking Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"hybrid-retrieval-reranking-interview-questions\">Hybrid Retrieval &amp; Reranking — Interview Questions<\/h1>\n<p>Phase 3 depth questions. The theme: every answer should end in a number you measured, because \"how did you know it worked?\" is always the follow-up.<\/p>\n<hr>\n<details class=\"qa\" open><summary>Q: Why hybrid retrieval? Isn't dense search enough?<\/summary><div class=\"qa-body\"><p>Dense and BM25 <strong>fail differently<\/strong>. Dense finds paraphrases but blurs rare exact terms (error codes, names — a 384-number vector averages them away). BM25 nails exact terms but is blind to paraphrase. Running both covers both holes.<\/p>\n<p>The measured proof from DocsMind: on the query <em>\"What is left behind after a supernova?\"<\/em>, dense ranked the right chunk <strong>#2<\/strong>; BM25 caught the exact word \"supernova\" and fusion lifted it to <strong>#1<\/strong>. Hit@1 went 0.93 → 1.00.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Two retrievers give two ranked lists with incompatible scores. How do you combine them?<\/summary><div class=\"qa-body\"><p>You don't reconcile the scores — you throw them away. <strong>Reciprocal Rank Fusion<\/strong>: each chunk earns <code>1/(k + rank)<\/code> per list, summed. Only rank position matters, so BM25's unbounded scores can't bully cosine's 0–1 scores.<\/p>\n<p>Why not min-max normalize and add? You'd be tuning weights per corpus forever. RRF's whole appeal is that it needs no tuning — <code>k=60<\/code> from the original paper works everywhere because it just softens the rank-1-vs-rank-2 gap.<\/p>\n<p>Code: <code class=\"srcref\" title=\"source file in the repo\"><code>fusion.py<\/code><\/code> — it's ~20 lines.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Bi-encoder vs cross-encoder — and why do you need both?<\/summary><div class=\"qa-body\"><ul><li><strong>Bi-encoder<\/strong> (bge-small): encodes question and chunk <em>separately<\/em>, compares<\/li><\/ul>\n<p>vectors. Fast, because chunk vectors are precomputed once at ingest.<\/p>\n<ul><li><strong>Cross-encoder<\/strong> (ms-marco-MiniLM): reads the (question, chunk) *pair<\/li><\/ul>\n<p>together* and scores the match. Far more accurate — the question and chunk   actually attend to each other — but runs fresh per pair at query time.<\/p>\n<p>So the architecture is a funnel: bi-encoder + BM25 shortlist ~20 candidates cheaply, cross-encoder re-scores only those 20. You could never cross-encode the whole corpus; you'd never want to ship the shortlist unchecked.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What did reranking actually buy you?<\/summary><div class=\"qa-body\"><p>The most reliable win in the whole eval. At default chunking, dense and hybrid tied at 0.93 Hit@1; the reranker fixed the one miss → <strong>1.00 Hit@1, 1.00 MRR<\/strong>. And it kept that perfect score at fine chunking too.<\/p>\n<p>The honest caveat that makes the answer senior: hybrid's gain depended on chunk size and corpus (at 512-token chunks, hybrid == dense — BM25 had nothing to recover). The reranker helped <strong>regardless of configuration<\/strong>. If I could keep only one Phase 3 piece, it's the reranker.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Your metrics disagreed. Explain.<\/summary><div class=\"qa-body\"><p>At fine chunking (72 chunks), hybrid+rerank <em>raised<\/em> Hit@1/MRR (0.93 → 1.00) but <em>lowered<\/em> Recall@5 and NDCG@5 (0.857 → 0.764). Both are correct:<\/p>\n<ul><li>Hit@1/MRR ask \"is the single best chunk on top?\" — hybrid optimizes this.<\/li><li>Recall/NDCG ask \"did we gather all relevant context?\" — dense wins this,<\/li><\/ul>\n<p>because same-doc chunks are semantically similar and cluster together in   its top-k, while BM25/reranker inject keyword-matching chunks from other docs.<\/p>\n<p>Which to optimize depends on the task: pointed Q&amp;A wants Hit@1; summarization or multi-hop wants recall. Knowing <em>which metric your product needs<\/em> is the actual skill being tested.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How was the eval built?<\/summary><div class=\"qa-body\"><p>15 labeled queries over the corpus, each tagged with the source doc that answers it — a deliberate mix of exact-term queries (should favor BM25) and paraphrase queries (should favor dense). Metrics: Hit@1, Hit@3, MRR, Recall@5, NDCG@5, computed identically for dense / hybrid / hybrid+rerank so the comparison is apples-to-apples. One command re-runs it (<code>make eval<\/code>).<\/p>\n<p>Small, but it's a real harness: labeled ground truth, fixed query set, comparable configs. Scaling it up is more labels, not a new design.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: When would hybrid NOT help?<\/summary><div class=\"qa-body\"><ul><li>Small clean corpus at coarse chunking — dense already nails it (measured:<\/li><\/ul>\n<p>identical 0.93 at 512-token chunks).<\/p>\n<ul><li>Pure paraphrase workloads with no rare exact terms — BM25 adds noise.<\/li><li>And BM25 costs infrastructure at scale: DocsMind rebuilds it in memory from<\/li><\/ul>\n<p>stored chunks at startup, fine for a small corpus; a big one needs a real   inverted index (or a backend like Qdrant/OpenSearch that maintains one).<\/p>\n<p>Saying when your own technique <em>doesn't<\/em> pay is the strongest credibility signal available in this topic.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: A user reports a bad answer. How do you debug retrieval?<\/summary><div class=\"qa-body\"><p>Walk the funnel backwards, stage by stage:<\/p>\n<ol><li><strong>Was the right chunk retrieved at all?<\/strong> Look at the top-k. If absent →<\/li><\/ol>\n<p>chunking or embedding problem (chunk too big? term blurred? try the query    in BM25 alone vs dense alone to see which side missed).<\/p>\n<ol><li><strong>Retrieved but ranked too low?<\/strong> → fusion/rerank problem; check where each<\/li><\/ol>\n<p>retriever ranked it before RRF.<\/p>\n<ol><li><strong>Retrieved and ranked #1 but the answer is still wrong?<\/strong> → generation<\/li><\/ol>\n<p>problem, not retrieval; that's the Phase 6 (faithfulness) territory.<\/p>\n<p>The point of the funnel design is exactly this: each stage can be inspected and blamed independently.<\/p><\/div><\/details>","toc":[],"text":"hybrid retrieval & reranking — interview questions phase 3 depth questions. the theme: every answer should end in a number you measured, because \"how did you know it worked?\" is always the follow-up. q: why hybrid retrieval? isn't dense search enough? dense and bm25 fail differently . dense finds paraphrases but blurs rare exact terms (error codes, names — a 384-number vector averages them away). bm25 nails exact terms but is blind to paraphrase. running both covers both holes. the measured proof from docsmind: on the query \"what is left behind after a supernova?\" , dense ranked the right chunk #2 ; bm25 caught the exact word \"supernova\" and fusion lifted it to #1 . hit@1 went 0.93 → 1.00. q: two retrievers give two ranked lists with incompatible scores. how do you combine them? you don't reconcile the scores — you throw them away. reciprocal rank fusion : each chunk earns 1/(k + rank) per list, summed. only rank position matters, so bm25's unbounded scores can't bully cosine's 0–1 scores. why not min-max normalize and add? you'd be tuning weights per corpus forever. rrf's whole appeal is that it needs no tuning — k=60 from the original paper works everywhere because it just softens the rank-1-vs-rank-2 gap. code: fusion.py — it's ~20 lines. q: bi-encoder vs cross-encoder — and why do you need both? bi-encoder (bge-small): encodes question and chunk separately , compares vectors. fast, because chunk vectors are precomputed once at ingest. cross-encoder (ms-marco-minilm): reads the (question, chunk) *pair together* and scores the match. far more accurate — the question and chunk actually attend to each other — but runs fresh per pair at query time. so the architecture is a funnel: bi-encoder + bm25 shortlist ~20 candidates cheaply, cross-encoder re-scores only those 20. you could never cross-encode the whole corpus; you'd never want to ship the shortlist unchecked. q: what did reranking actually buy you? the most reliable win in the whole eval. at default chunking, dense and hybrid tied at 0.93 hit@1; the reranker fixed the one miss → 1.00 hit@1, 1.00 mrr . and it kept that perfect score at fine chunking too. the honest caveat that makes the answer senior: hybrid's gain depended on chunk size and corpus (at 512-token chunks, hybrid == dense — bm25 had nothing to recover). the reranker helped regardless of configuration . if i could keep only one phase 3 piece, it's the reranker. q: your metrics disagreed. explain. at fine chunking (72 chunks), hybrid+rerank raised hit@1/mrr (0.93 → 1.00) but lowered recall@5 and ndcg@5 (0.857 → 0.764). both are correct: hit@1/mrr ask \"is the single best chunk on top?\" — hybrid optimizes this. recall/ndcg ask \"did we gather all relevant context?\" — dense wins this, because same-doc chunks are semantically similar and cluster together in its top-k, while bm25/reranker inject keyword-matching chunks from other docs. which to optimize depends on the task: pointed q&a wants hit@1; summarization or multi-hop wants recall. knowing which metric your product needs is the actual skill being tested. q: how was the eval built? 15 labeled queries over the corpus, each tagged with the source doc that answers it — a deliberate mix of exact-term queries (should favor bm25) and paraphrase queries (should favor dense). metrics: hit@1, hit@3, mrr, recall@5, ndcg@5, computed identically for dense / hybrid / hybrid+rerank so the comparison is apples-to-apples. one command re-runs it ( make eval ). small, but it's a real harness: labeled ground truth, fixed query set, comparable configs. scaling it up is more labels, not a new design. q: when would hybrid not help? small clean corpus at coarse chunking — dense already nails it (measured: identical 0.93 at 512-token chunks). pure paraphrase workloads with no rare exact terms — bm25 adds noise. and bm25 costs infrastructure at scale: docsmind rebuilds it in memory from stored chunks at startup, fine for a small corpus; a big one needs a real inverted index (or a backend like qdrant/opensearch that maintains one). saying when your own technique doesn't pay is the strongest credibility signal available in this topic. q: a user reports a bad answer. how do you debug retrieval? walk the funnel backwards, stage by stage: was the right chunk retrieved at all? look at the top-k. if absent → chunking or embedding problem (chunk too big? term blurred? try the query in bm25 alone vs dense alone to see which side missed). retrieved but ranked too low? → fusion/rerank problem; check where each retriever ranked it before rrf. retrieved and ranked #1 but the answer is still wrong? → generation problem, not retrieval; that's the phase 6 (faithfulness) territory. the point of the funnel design is exactly this: each stage can be inspected and blamed independently.","words":791},{"path":"08-interview-prep/generation-questions.md","title":"Generation Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"generation-interview-questions\">Generation — Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: Why format chunks as numbered passages [1][2][3]?<\/summary><div class=\"qa-body\"><p>The numbers are the citation mechanism. Claude is instructed to cite every claim with <code>[n]<\/code>. After generation, the pipeline scans the response with a regex (<code>\\[(\\d+)\\]<\/code>), extracts the markers, and maps each one back to the retrieved chunk — giving you source filename, similarity score, and a text snippet. Without numbers, you'd get an answer but no traceability.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why put the rules in the system prompt instead of the user message?<\/summary><div class=\"qa-body\"><p>Claude assigns higher weight to the system message for behavioral constraints — it's treated as a persistent role definition for the conversation. Instructions like \"answer only from context\" and \"cite with [n]\" belong there, not buried in the user message alongside the context and question. The user message stays clean: just context + question.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What is INSUFFICIENT_CONTEXT and why use an exact string?<\/summary><div class=\"qa-body\"><p>It's a sentinel value — a specific string the pipeline watches for in Claude's response to detect when the retrieved context wasn't enough to answer.<\/p>\n<pre><code class=\"language-python\">INSUFFICIENT = <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span>\ngrounded = INSUFFICIENT <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">in<\/span> answer<\/code><\/pre>\n<p>It must be an exact string because the check is a substring search. If Claude paraphrases (\"I don't have enough information...\"), the check misses it and incorrectly marks the answer as grounded. Using the same constant <code>INSUFFICIENT<\/code> in both the system prompt and the check ensures they can never drift apart.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What are the limits of this guardrail?<\/summary><div class=\"qa-body\"><p>It's a soft guardrail — it works if Claude follows the system prompt. Three ways it can fail:<\/p>\n<ol><li>Claude paraphrases instead of the exact string → check misses it<\/li><li>Claude answers from training memory (ignores \"ONLY from context\") without<\/li><\/ol>\n<p>flagging it → undetected hallucination<\/p>\n<ol><li>Claude cites <code>[1]<\/code> but passage <code>[1]<\/code> doesn't actually support the claim<\/li><\/ol>\n<p>→ citation extracted but not verified<\/p>\n<p>Phase 5 (LangGraph) adds a structural check — a second model call that verifies each claim against its cited passage. Phase 6 (RAGAS) measures faithfulness systematically on a golden eval set.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why direct Anthropic SDK and not LangChain?<\/summary><div class=\"qa-body\"><p>Direct SDK gives full control over every API parameter — system message, max_tokens, streaming, prompt caching. No hidden retry logic or routing. Simpler to debug. LangChain's <code>ChatAnthropic<\/code> is a convenience layer that's useful when you need its ecosystem (chains, tool calling, callbacks) but adds opacity for a simple generate() call. The <code>LLMClient<\/code> abstract interface means the pipeline doesn't care what's underneath — Phase 4 swaps in a local vLLM client without touching the pipeline.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What happens if Claude cites [7] when only 4 passages were provided?<\/summary><div class=\"qa-body\"><p>The citation extractor bounds-checks every marker:<\/p>\n<pre><code class=\"language-python\">cited_markers = {m <span class=\"tok-keyword\">for<\/span> m <span class=\"tok-keyword\">in<\/span> cited_markers <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">1<\/span> &lt;= m &lt;= <span class=\"tok-builtin\">len<\/span>(results)}<\/code><\/pre>\n<p><code>[7]<\/code> is out of range and silently dropped. The answer still gets returned, just without a citation for that marker. It's a guard against the model hallucinating passage numbers.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How does latency break down and what's the bottleneck?<\/summary><div class=\"qa-body\"><pre><code>Embed question:   ~20ms  (bge-small CPU)\nFAISS search:     ~1ms\nBuild context:    &lt;1ms\nClaude API:       ~700ms  ← bottleneck — always\nCitation parse:   &lt;1ms\nTotal:            ~720ms<\/code><\/pre>\n<p>The LLM API call dominates. To reduce: use claude-haiku-4-5 (3–5× faster than Opus, much cheaper), reduce max_tokens, or add streaming so the user sees partial output while generation continues.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How does streaming change the architecture?<\/summary><div class=\"qa-body\"><p>With streaming, the Anthropic SDK returns tokens as they're generated. The FastAPI endpoint uses <code>StreamingResponse<\/code> to forward them to the client. The tradeoff: you can't do citation extraction until the full response is received, so you'd either (a) stream the answer first and send citations after, or (b) wait for the full response (no streaming) but you get citations inline. Phase 1 takes option (b) — wait for full response, then extract citations.<\/p><\/div><\/details>","toc":[],"text":"generation — interview questions q: why format chunks as numbered passages [1][2][3]? the numbers are the citation mechanism. claude is instructed to cite every claim with [n] . after generation, the pipeline scans the response with a regex ( \\[(\\d+)\\] ), extracts the markers, and maps each one back to the retrieved chunk — giving you source filename, similarity score, and a text snippet. without numbers, you'd get an answer but no traceability. q: why put the rules in the system prompt instead of the user message? claude assigns higher weight to the system message for behavioral constraints — it's treated as a persistent role definition for the conversation. instructions like \"answer only from context\" and \"cite with [n]\" belong there, not buried in the user message alongside the context and question. the user message stays clean: just context + question. q: what is insufficient_context and why use an exact string? it's a sentinel value — a specific string the pipeline watches for in claude's response to detect when the retrieved context wasn't enough to answer. insufficient = \"insufficient_context\" grounded = insufficient not in answer it must be an exact string because the check is a substring search. if claude paraphrases (\"i don't have enough information...\"), the check misses it and incorrectly marks the answer as grounded. using the same constant insufficient in both the system prompt and the check ensures they can never drift apart. q: what are the limits of this guardrail? it's a soft guardrail — it works if claude follows the system prompt. three ways it can fail: claude paraphrases instead of the exact string → check misses it claude answers from training memory (ignores \"only from context\") without flagging it → undetected hallucination claude cites [1] but passage [1] doesn't actually support the claim → citation extracted but not verified phase 5 (langgraph) adds a structural check — a second model call that verifies each claim against its cited passage. phase 6 (ragas) measures faithfulness systematically on a golden eval set. q: why direct anthropic sdk and not langchain? direct sdk gives full control over every api parameter — system message, max_tokens, streaming, prompt caching. no hidden retry logic or routing. simpler to debug. langchain's chatanthropic is a convenience layer that's useful when you need its ecosystem (chains, tool calling, callbacks) but adds opacity for a simple generate() call. the llmclient abstract interface means the pipeline doesn't care what's underneath — phase 4 swaps in a local vllm client without touching the pipeline. q: what happens if claude cites [7] when only 4 passages were provided? the citation extractor bounds-checks every marker: cited_markers = {m for m in cited_markers if 1 <= m <= len (results)} [7] is out of range and silently dropped. the answer still gets returned, just without a citation for that marker. it's a guard against the model hallucinating passage numbers. q: how does latency break down and what's the bottleneck? embed question: ~20ms (bge-small cpu) faiss search: ~1ms build context: <1ms claude api: ~700ms ← bottleneck — always citation parse: <1ms total: ~720ms the llm api call dominates. to reduce: use claude-haiku-4-5 (3–5× faster than opus, much cheaper), reduce max_tokens, or add streaming so the user sees partial output while generation continues. q: how does streaming change the architecture? with streaming, the anthropic sdk returns tokens as they're generated. the fastapi endpoint uses streamingresponse to forward them to the client. the tradeoff: you can't do citation extraction until the full response is received, so you'd either (a) stream the answer first and send citations after, or (b) wait for the full response (no streaming) but you get citations inline. phase 1 takes option (b) — wait for full response, then extract citations.","words":622},{"path":"08-interview-prep/pipeline-questions.md","title":"Pipeline Questions","section":"8 · Interview Prep","quiz":true,"accent":"#7479e6","html":"<h1 id=\"pipeline-interview-questions\">Pipeline — Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: Walk me through your RAG pipeline.<\/summary><div class=\"qa-body\"><p>\"Documents are loaded with LlamaIndex and split into 512-token sentence-aware chunks with 64-token overlap. Each chunk is embedded by self-hosted bge-small into a 384-dim L2-normalized vector stored in a FAISS flat index. At query time, the question is embedded with the same model, FAISS returns the top-4 chunks by cosine similarity, and those are formatted as numbered context passages sent to Claude. A system prompt forces the model to cite by passage number and return <code>INSUFFICIENT_CONTEXT<\/code> if the context isn't sufficient. The pipeline extracts citation markers from the response and maps them back to source filenames.\"<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: RAG vs fine-tuning vs long-context LLMs?<\/summary><div class=\"qa-body\"><div class=\"table-scroll\"><table><thead><tr><th>Approach<\/th><th>When it's right<\/th><th>Key weakness<\/th><\/tr><\/thead><tbody><tr><td><strong>RAG (what we built)<\/strong><\/td><td>Knowledge in documents, changes often, needs citations, corpus too big for context window<\/td><td>Retrieval quality gates answer quality<\/td><\/tr><tr><td><strong>Fine-tuning<\/strong><\/td><td>Teach the model a skill or style, not updateable facts<\/td><td>Expensive to retrain, baked-in knowledge goes stale<\/td><\/tr><tr><td><strong>Long-context LLM<\/strong><\/td><td>Tiny corpus that fits in a context window, one-off use<\/td><td>Very expensive per query, no targeting — full corpus every time<\/td><\/tr><\/tbody><\/table><\/div>\n<p>RAG is the right default for \"answer questions from a document corpus\" use cases. Fine-tuning is for \"change how the model writes or reasons.\"<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How do you prevent hallucination?<\/summary><div class=\"qa-body\"><p>Two layers in Phase 1:<\/p>\n<ol><li><strong>Prompt-level:<\/strong> system prompt tells Claude to answer only from numbered<\/li><\/ol>\n<p>context passages and return <code>INSUFFICIENT_CONTEXT<\/code> if context is insufficient.<\/p>\n<ol><li><strong>Pipeline-level:<\/strong> if <code>INSUFFICIENT_CONTEXT<\/code> appears in the response,<\/li><\/ol>\n<p><code>grounded=false<\/code> is returned and no citations are extracted.<\/p>\n<p>These are soft guardrails — they rely on the model following instructions. Phase 6 adds RAGAS-based evaluation to measure hallucination rate systematically. A harder structural guardrail is part of Phase 5 (LangGraph).<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why not just send all documents to the LLM?<\/summary><div class=\"qa-body\"><p>Two reasons: <strong>cost<\/strong> and <strong>quality<\/strong>.<\/p>\n<ul><li>Cost: LLMs charge per input token. Sending 100 docs on every query is<\/li><\/ul>\n<p>prohibitively expensive at scale.<\/p>\n<ul><li>Quality: LLMs degrade with overloaded context (\"lost in the middle\" problem —<\/li><\/ul>\n<p>attention disperses on very long contexts). Retrieving 4 focused chunks gives   the model exactly what it needs.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What happens if the user asks something not in the corpus?<\/summary><div class=\"qa-body\"><p>FAISS still returns top-k (it always returns something). Similarity scores will be low. If Claude follows the system prompt it returns <code>INSUFFICIENT_CONTEXT<\/code>. To add a harder safety net: add a similarity score threshold — if all top-k results are below e.g. 0.60, skip the LLM call entirely and return \"I don't have information about that.\"<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How does latency break down?<\/summary><div class=\"qa-body\"><pre><code>Embed question:   ~20ms  (bge-small on CPU; ~2ms on GPU)\nFAISS search:     ~1ms   (50 vectors, flat index)\nClaude API call:  ~700ms (network + generation — dominates total latency)\nCitation parsing: ~1ms\n\nTotal: ~720ms (CPU), ~700ms (GPU) — bottleneck is always the LLM API call<\/code><\/pre>\n<p>To reduce latency: use a smaller/faster model (claude-haiku-4-5 instead of claude-opus-4-8), reduce max_tokens, or add streaming so the user sees partial responses.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why FastAPI and not Flask?<\/summary><div class=\"qa-body\"><p>FastAPI gives you async support, automatic request/response validation via Pydantic (the schemas are already defined in <code>schemas.py<\/code>), and automatic OpenAPI docs at <code>/docs<\/code>. Flask would require manual validation and doesn't support async natively. For a project that already uses Pydantic everywhere, FastAPI is the natural choice.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why LlamaIndex for ingestion and not LangChain?<\/summary><div class=\"qa-body\"><p>LlamaIndex is purpose-built for the RAG data layer (load, chunk, embed, index). Its abstractions are specifically designed for document ingestion pipelines. LangChain is more general — chains, agents, tool use — and its data layer is secondary. For the ingestion pipeline specifically, LlamaIndex is a cleaner fit. LangGraph (LangChain's graph-based agent framework) is used in Phase 5 for orchestration, where it excels over LangChain's older agent loop.<\/p><\/div><\/details>","toc":[],"text":"pipeline — interview questions q: walk me through your rag pipeline. \"documents are loaded with llamaindex and split into 512-token sentence-aware chunks with 64-token overlap. each chunk is embedded by self-hosted bge-small into a 384-dim l2-normalized vector stored in a faiss flat index. at query time, the question is embedded with the same model, faiss returns the top-4 chunks by cosine similarity, and those are formatted as numbered context passages sent to claude. a system prompt forces the model to cite by passage number and return insufficient_context if the context isn't sufficient. the pipeline extracts citation markers from the response and maps them back to source filenames.\" q: rag vs fine-tuning vs long-context llms? approach when it's right key weakness rag (what we built) knowledge in documents, changes often, needs citations, corpus too big for context window retrieval quality gates answer quality fine-tuning teach the model a skill or style, not updateable facts expensive to retrain, baked-in knowledge goes stale long-context llm tiny corpus that fits in a context window, one-off use very expensive per query, no targeting — full corpus every time rag is the right default for \"answer questions from a document corpus\" use cases. fine-tuning is for \"change how the model writes or reasons.\" q: how do you prevent hallucination? two layers in phase 1: prompt-level: system prompt tells claude to answer only from numbered context passages and return insufficient_context if context is insufficient. pipeline-level: if insufficient_context appears in the response, grounded=false is returned and no citations are extracted. these are soft guardrails — they rely on the model following instructions. phase 6 adds ragas-based evaluation to measure hallucination rate systematically. a harder structural guardrail is part of phase 5 (langgraph). q: why not just send all documents to the llm? two reasons: cost and quality . cost: llms charge per input token. sending 100 docs on every query is prohibitively expensive at scale. quality: llms degrade with overloaded context (\"lost in the middle\" problem — attention disperses on very long contexts). retrieving 4 focused chunks gives the model exactly what it needs. q: what happens if the user asks something not in the corpus? faiss still returns top-k (it always returns something). similarity scores will be low. if claude follows the system prompt it returns insufficient_context . to add a harder safety net: add a similarity score threshold — if all top-k results are below e.g. 0.60, skip the llm call entirely and return \"i don't have information about that.\" q: how does latency break down? embed question: ~20ms (bge-small on cpu; ~2ms on gpu) faiss search: ~1ms (50 vectors, flat index) claude api call: ~700ms (network + generation — dominates total latency) citation parsing: ~1ms total: ~720ms (cpu), ~700ms (gpu) — bottleneck is always the llm api call to reduce latency: use a smaller/faster model (claude-haiku-4-5 instead of claude-opus-4-8), reduce max_tokens, or add streaming so the user sees partial responses. q: why fastapi and not flask? fastapi gives you async support, automatic request/response validation via pydantic (the schemas are already defined in schemas.py ), and automatic openapi docs at /docs . flask would require manual validation and doesn't support async natively. for a project that already uses pydantic everywhere, fastapi is the natural choice. q: why llamaindex for ingestion and not langchain? llamaindex is purpose-built for the rag data layer (load, chunk, embed, index). its abstractions are specifically designed for document ingestion pipelines. langchain is more general — chains, agents, tool use — and its data layer is secondary. for the ingestion pipeline specifically, llamaindex is a cleaner fit. langgraph (langchain's graph-based agent framework) is used in phase 5 for orchestration, where it excels over langchain's older agent loop.","words":614},{"path":"08-interview-prep/cheat-sheet.md","title":"Cheat Sheet — One Page","section":"8 · Interview Prep","quiz":false,"accent":"#7479e6","html":"<h1 id=\"cheat-sheet-one-page-every-key-answer\">Cheat Sheet — One Page, Every Key Answer<\/h1>\n<p>Read this the morning of an interview. For depth, go to the topic files.<\/p>\n<hr>\n<h2 id=\"chunking\">Chunking<\/h2>\n<p><strong>Why chunk?<\/strong> Embedding a whole doc averages all its topics into a blurry vector. Small focused chunks give sharp, precise embeddings and focused retrieval.<\/p>\n<p><strong>Big vs small chunks?<\/strong> Small = sharper retrieval, less context. Large = fuzzier retrieval, more context. 512 tokens is a common sweet spot. Tune it with an eval set.<\/p>\n<p><strong>Why 512 specifically?<\/strong> Matches bge-small's 512-token max input. Bigger chunks get silently truncated. Never set chunk size above your embedding model's max sequence length.<\/p>\n<p><strong>Why overlap?<\/strong> Prevents ideas at chunk boundaries from being split. A sentence at the end of chunk N appears again at the start of chunk N+1, so it's always fully inside at least one chunk. Costs ~12% duplication.<\/p>\n<hr>\n<h2 id=\"embeddings\">Embeddings<\/h2>\n<p><strong>Why self-hosted bge-small over OpenAI?<\/strong> Embedding is a bulk job — you encode the whole corpus at ingest. Paid per-token APIs cost money and send your data externally. Self-hosted is free, private, and no vendor lock-in. The Embedder class makes it a one-line swap.<\/p>\n<p><strong>Why same model for documents and queries?<\/strong> Each model has its own vector space. Cross-model comparison is meaningless.<\/p>\n<p><strong>Dense vs BM25?<\/strong> Neither alone — hybrid wins. Dense captures meaning, BM25 captures exact terms. Hybrid + reranking (Phase 3) beats either.<\/p>\n<p><strong>Bi-encoder vs cross-encoder?<\/strong> Bi-encoder = fast, scalable, precomputable (used for retrieval). Cross-encoder = accurate but must run per query-doc pair (used as reranker).<\/p>\n<hr>\n<h2 id=\"normalization\">Normalization<\/h2>\n<p><strong>Why L2 normalize?<\/strong> Makes all vectors length 1.0 so only direction (meaning) affects similarity, not length (word count). Also makes dot product = cosine similarity, so IndexFlatIP gives you cosine similarity for free.<\/p>\n<p><strong>Cosine vs Euclidean?<\/strong> Cosine cares about direction (meaning), not magnitude (length). Euclidean is affected by magnitude. For text retrieval, cosine is always the right choice.<\/p>\n<hr>\n<h2 id=\"faiss-retrieval\">FAISS &amp; Retrieval<\/h2>\n<p><strong>FAISS vs Pinecone?<\/strong> FAISS = in-process library, free, no data egress, no filtering. Pinecone = managed cloud service, rich filtering, any scale, but costs money and sends data externally. Qdrant = open-source managed DB (Phase 2) — best of both.<\/p>\n<p><strong>IndexFlatIP vs HNSW?<\/strong> Flat = exact, 100% recall, O(N) time. Right for &lt; 100k vectors. HNSW = approximate, ~98% recall, O(log N) time. Right for millions of vectors. Phase 1 uses Flat because 50 chunks doesn't need approximation.<\/p>\n<p><strong>Recall@k?<\/strong> Fraction of truly relevant chunks that appear in your top-k results. ANN indexes trade ~1–5% recall for huge speed gains. Usually acceptable for RAG.<\/p>\n<hr>\n<h2 id=\"index-types-phase-2-real-benchmark-numbers\">Index Types (Phase 2 — real benchmark numbers)<\/h2>\n<p><strong>Flat vs IVF vs HNSW vs IVFPQ?<\/strong> At 50k vectors: flat 0.78ms/100% recall; IVF 0.10ms/90%; HNSW 0.40ms/86% (1.18x memory); IVFPQ 0.09ms/33% recall but <strong>25x less memory<\/strong>. Flat scales O(N): 0.78ms@50k → 7.2ms@500k — that line is why ANN indexes exist.<\/p>\n<p><strong>Which does your pipeline use?<\/strong> Flat. Corpus is tiny; exact search in &lt;1ms. Switching to HNSW would be premature optimization. The skill is knowing where flat crosses your latency budget — I measured it.<\/p>\n<p><strong>What are nprobe / ef_search?<\/strong> The recall-vs-speed dial on IVF / HNSW, turned at query time: spend more compute per query, recover more recall.<\/p>\n<p><strong>Why benchmark on clustered synthetic vectors?<\/strong> Real embeddings cluster. Uniform random vectors flatter IVF and hide production recall loss. Benchmark on data shaped like your data.<\/p>\n<hr>\n<h2 id=\"qdrant-vs-faiss-phase-2b\">Qdrant vs FAISS (Phase 2b)<\/h2>\n<p><strong>Why add Qdrant?<\/strong> Operations, not speed: many API replicas share one store, live upserts, metadata filtering while searching. FAISS = one process's memory.<\/p>\n<p><strong>What did the switch cost?<\/strong> A network hop per query, a service to run, and exact flat search became approximate (Qdrant builds HNSW by default).<\/p>\n<p><strong>How is it swappable?<\/strong> Both behind one <code>VectorStore<\/code> interface, chosen by a <code>vector_backend<\/code> config setting. Pipeline never knows which is underneath.<\/p>\n<hr>\n<h2 id=\"hybrid-reranking-phase-3-real-eval-numbers\">Hybrid &amp; Reranking (Phase 3 — real eval numbers)<\/h2>\n<p><strong>Why hybrid?<\/strong> Dense and BM25 fail differently: dense blurs rare exact terms, BM25 misses paraphrase. Measured win: \"supernova\" query — dense ranked it #2, BM25 caught the exact term, RRF lifted it to #1. Hit@1 0.93 → 1.00 at fine chunking.<\/p>\n<p><strong>How do you fuse two score scales?<\/strong> You don't — RRF uses only rank position: <code>1/(k+rank)<\/code> summed across lists, k=60. No normalization, no per-corpus tuning.<\/p>\n<p><strong>Bi-encoder vs cross-encoder?<\/strong> Bi-encoder embeds question and chunk separately — fast, precomputable. Cross-encoder reads the pair together — accurate but per-pair cost, so it only reranks the ~20 fused candidates. A funnel: cheap scan → careful check.<\/p>\n<p><strong>What did reranking buy?<\/strong> The most reliable win: fixed the one miss in every configuration tested (Hit@1 0.93 → 1.00). Hybrid's gain depended on chunk size; the reranker's didn't.<\/p>\n<p><strong>Your metrics disagreed — explain.<\/strong> Hybrid+rerank raised Hit@1/MRR but lowered Recall@5/NDCG@5: better single best chunk, less same-doc coverage. Pointed Q&amp;A wants Hit@1; summarization wants recall. Pick the metric that matches the task.<\/p>\n<p><strong>How did you validate retrieval?<\/strong> 15 labeled queries (exact-term + paraphrase mix), same metrics across dense / hybrid / hybrid+rerank, one command (<code>make eval<\/code>). Change one variable, re-run, compare.<\/p>\n<hr>\n<h2 id=\"generation\">Generation<\/h2>\n<p><strong>Why number the context passages [1][2][3]?<\/strong> The numbers are what make citations traceable. Claude is instructed to cite every claim with [n]. The pipeline then extracts those markers with a regex and maps each back to the source filename and similarity score. Without numbers, you get an answer but can't trace any claim to a file.<\/p>\n<p><strong>Why put rules in the system prompt and not the user message?<\/strong> Claude treats the system message as a persistent behavioral contract, giving it higher precedence than instructions embedded in the user message. \"Answer only from context\" belongs in the system message.<\/p>\n<p><strong>What is INSUFFICIENT_CONTEXT?<\/strong> An exact string the pipeline uses as a sentinel. If Claude can't answer from the retrieved chunks, it returns this string. The pipeline checks <code>\"INSUFFICIENT_CONTEXT\" not in answer<\/code> and sets <code>grounded=false<\/code>. The exact string is defined once as a constant and used in both the prompt and the check.<\/p>\n<p><strong>Why direct Anthropic SDK and not LangChain's wrapper?<\/strong> Direct SDK = full control over every API parameter, no hidden retry logic or routing, easier to add caching or streaming. The <code>LLMClient<\/code> interface means swapping to vLLM (Phase 4) is a one-class change with no pipeline edits.<\/p>\n<p><strong>What if Claude hallucinate-cites [7] when only 4 passages exist?<\/strong> The citation extractor bounds-checks: <code>if 1 &lt;= m &lt;= len(results)<\/code>. Invalid markers are silently dropped. It's a small but important guard.<\/p>\n<hr>\n<h2 id=\"pipeline\">Pipeline<\/h2>\n<p><strong>Walk me through your RAG pipeline.<\/strong> Load docs with LlamaIndex → 512-token sentence-aware chunks (64 overlap) → embed with bge-small (384 dims, normalized) → store in FAISS flat index → at query: embed question → FAISS returns top-4 → format as numbered passages → Claude answers with citations → extract citations → return grounded response.<\/p>\n<p><strong>RAG vs fine-tuning?<\/strong> RAG = knowledge in docs, updatable, citable. Right for \"chat with your docs.\" Fine-tuning = teach a skill or style, bakes in static knowledge. Not for frequently changing facts.<\/p>\n<p><strong>How do you prevent hallucination?<\/strong> System prompt forces citation with [n] markers and <code>INSUFFICIENT_CONTEXT<\/code> if context is insufficient. Pipeline checks the response and sets <code>grounded=false<\/code>. Phase 6 adds RAGAS evaluation to measure it systematically.<\/p>\n<p><strong>Why not send all docs to the LLM?<\/strong> Cost (tokens) and quality (\"lost in the middle\" — attention disperses over very long contexts). Retrieval focuses the model on exactly what's relevant.<\/p>\n<p><strong>Latency bottleneck?<\/strong> Always the LLM API call (~700ms). FAISS search is &lt; 1ms. Embed is ~20ms on CPU. To reduce: use a smaller model, add streaming, or reduce max_tokens.<\/p>\n<p><strong>LlamaIndex not LangChain?<\/strong> LlamaIndex is purpose-built for RAG data pipelines. LangChain is general-purpose (chains, agents). For ingestion, LlamaIndex is cleaner. LangGraph (Phase 5) handles orchestration where graph-based state machines are the right tool.<\/p>","toc":[{"level":2,"id":"chunking","text":"Chunking"},{"level":2,"id":"embeddings","text":"Embeddings"},{"level":2,"id":"normalization","text":"Normalization"},{"level":2,"id":"faiss-retrieval","text":"FAISS &amp; Retrieval"},{"level":2,"id":"index-types-phase-2-real-benchmark-numbers","text":"Index Types (Phase 2 — real benchmark numbers)"},{"level":2,"id":"qdrant-vs-faiss-phase-2b","text":"Qdrant vs FAISS (Phase 2b)"},{"level":2,"id":"hybrid-reranking-phase-3-real-eval-numbers","text":"Hybrid &amp; Reranking (Phase 3 — real eval numbers)"},{"level":2,"id":"generation","text":"Generation"},{"level":2,"id":"pipeline","text":"Pipeline"}],"text":"cheat sheet — one page, every key answer read this the morning of an interview. for depth, go to the topic files. chunking why chunk? embedding a whole doc averages all its topics into a blurry vector. small focused chunks give sharp, precise embeddings and focused retrieval. big vs small chunks? small = sharper retrieval, less context. large = fuzzier retrieval, more context. 512 tokens is a common sweet spot. tune it with an eval set. why 512 specifically? matches bge-small
