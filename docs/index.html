<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d97757">
<title>DocsMind — RAG from Scratch</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --tok-comment:#9b9482; --tok-string:#5f8a3f; --tok-keyword:#c45f3c; --tok-builtin:#15807f;
    --tok-number:#a9762a; --tok-decorator:#8b6dff; --tok-command:#15807f; --tok-flag:#a9762a; --tok-variable:#8b6dff;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --tok-comment:#8f8a78; --tok-string:#a7c46e; --tok-keyword:#e7926b; --tok-builtin:#5cc4c4;
    --tok-number:#d6a45a; --tok-decorator:#a78bff; --tok-command:#5cc4c4; --tok-flag:#d6a45a; --tok-variable:#a78bff;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden;scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.7 ui-serif,Georgia,"Iowan Old Style","Palatino Linotype",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>DocsMind</h1>
      <div class="sub">RAG from Scratch — a learning path</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search all pages…" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="iconbtn theme-toggle" title="Toggle light / dark">◐</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="iconbtn" id="menu" aria-label="Open menu">☰</button>
      <span class="tb-title" id="tbTitle">DocsMind</span>
      <button class="iconbtn" id="searchBtn" aria-label="Search">🔍</button>
      <button class="iconbtn theme-toggle" aria-label="Toggle theme">◐</button>
    </div>
    <div class="content-wrap">
      <div id="pagetools"></div>
      <article id="content"></article>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>
<div class="scrim" id="scrim"></div>
<div class="searchpanel" id="searchpanel"></div>

g\">A vector store you talk to (Phase 2b)<\/span><\/a><a class=\"seccard mdlink\" data-href=\"11-hyde/README.md\" href=\"#\" style=\"--card:undefined\"><span class=\"sc-ic\">•<\/span><span class=\"sc-lbl\">11 · HyDE (Concept)<\/span><span class=\"sc-tag\"><\/span><\/a><\/div>\n<p>Everything you need to understand Phase 1 of DocsMind, in the order it was taught. Read <strong>top to bottom the first time<\/strong>. Come back to any file as a reference anytime.<\/p>\n<pre><code>documents → chunk → embed → normalize → store in FAISS\n                                              ↓\nquestion  → embed ──────────────────→ search FAISS → top-k chunks → Claude → answer + citations<\/code><\/pre>\n<h2 id=\"topics-in-order\">Topics (in order)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Folder<\/th><th>What you learn<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td><a class=\"mdlink\" data-href=\"01-chunks-and-overlap/\" href=\"#\">01-chunks-and-overlap/<\/a><\/td><td>Why we split documents, what a chunk is, what overlap does<\/td><\/tr><tr><td>2<\/td><td><a class=\"mdlink\" data-href=\"02-embeddings/\" href=\"#\">02-embeddings/<\/a><\/td><td>How text becomes numbers that capture meaning<\/td><\/tr><tr><td>3<\/td><td><a class=\"mdlink\" data-href=\"03-normalization/\" href=\"#\">03-normalization/<\/a><\/td><td>The vector math that makes search fair and fast<\/td><\/tr><tr><td>4<\/td><td><a class=\"mdlink\" data-href=\"04-vector-similarity/\" href=\"#\">04-vector-similarity/<\/a><\/td><td>How we measure \"closeness\" between two vectors<\/td><\/tr><tr><td>5<\/td><td><a class=\"mdlink\" data-href=\"05-faiss/\" href=\"#\">05-faiss/<\/a><\/td><td>The engine that stores vectors and finds the closest ones<\/td><\/tr><tr><td>6<\/td><td><a class=\"mdlink\" data-href=\"06-generation/\" href=\"#\">06-generation/<\/a><\/td><td>Building context, prompting Claude, citations, guardrail<\/td><\/tr><tr><td>7<\/td><td><a class=\"mdlink\" data-href=\"07-full-pipeline/\" href=\"#\">07-full-pipeline/<\/a><\/td><td>Every piece wired together, a real query end to end<\/td><\/tr><tr><td>8<\/td><td><a class=\"mdlink\" data-href=\"08-interview-prep/\" href=\"#\">08-interview-prep/<\/a><\/td><td>Every \"why X over Y\" question an interviewer will ask<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"how-to-use-this\">How to use this<\/h2>\n<ul><li><strong>First time:<\/strong> follow the numbers, 1 → 7.<\/li><li><strong>Stuck on a concept:<\/strong> each folder has a <code>README.md<\/code> that links to every file inside.<\/li><li><strong>Interview prep:<\/strong> go straight to <code>08-interview-prep/<\/code> — it has crisp answers for every tradeoff question.<\/li><li><strong>See the real code:<\/strong> every file links to the actual source file it's explaining.<\/li><\/ul>\n<p>→ Start here: <strong><a class=\"mdlink\" data-href=\"01-chunks-and-overlap/README.md\" href=\"#\">01-chunks-and-overlap/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"jump-in","text":"Jump in"},{"level":2,"id":"topics-in-order","text":"Topics (in order)"},{"level":2,"id":"how-to-use-this","text":"How to use this"}],"text":"docsmind · rag from scratch retrieval-augmented generation, explained how a question finds the right passages and turns them into a cited answer — chunking, embeddings, normalization, similarity, faiss, and generation, one chapter at a time. docsmind — learning path documents raw text chunk ~512 tokens embed bge-small normalize l2 → len 1 faiss store vectors index time — done once, ahead of any question index time: documents become searchable vectors jump in ✂️ 1 · chunks & overlap why we split documents, and what overlap buys 🔢 2 · embeddings turning text into meaning-carrying numbers 📐 3 · normalization the vector math that makes search fair 🎯 4 · vector similarity measuring closeness between two vectors 🗄️ 5 · faiss storing vectors and finding the nearest fast 💬 6 · generation context, prompting, citations, the guardrail 🔗 7 · full pipeline every piece wired together, end to end 🎤 8 · interview prep every \"why x over y\", quiz-ready ⚖️ 9 · hybrid retrieval dense + bm25 + reranking (phase 3) 🧩 10 · qdrant a vector store you talk to (phase 2b) • 11 · hyde (concept) everything you need to understand phase 1 of docsmind, in the order it was taught. read top to bottom the first time . come back to any file as a reference anytime. documents → chunk → embed → normalize → store in faiss ↓ question → embed ──────────────────→ search faiss → top-k chunks → claude → answer + citations topics (in order) # folder what you learn 1 01-chunks-and-overlap/ why we split documents, what a chunk is, what overlap does 2 02-embeddings/ how text becomes numbers that capture meaning 3 03-normalization/ the vector math that makes search fair and fast 4 04-vector-similarity/ how we measure \"closeness\" between two vectors 5 05-faiss/ the engine that stores vectors and finds the closest ones 6 06-generation/ building context, prompting claude, citations, guardrail 7 07-full-pipeline/ every piece wired together, a real query end to end 8 08-interview-prep/ every \"why x over y\" question an interviewer will ask how to use this first time: follow the numbers, 1 → 7. stuck on a concept: each folder has a readme.md that links to every file inside. interview prep: go straight to 08-interview-prep/ — it has crisp answers for every tradeoff question. see the real code: every file links to the actual source file it's explaining. → start here: 01-chunks-and-overlap/readme.md","words":401},{"path":"RUN-ON-PI.md","title":"Run on a Raspberry Pi","section":"Start here","quiz":false,"accent":"#d4663f","html":"<h1 id=\"run-on-a-raspberry-pi-or-any-device\">Run on a Raspberry Pi (or any device)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This site is a single self-contained <code>index.html<\/code> — all the content is baked in at build time. No database, no internet, no runtime dependencies. It even works by double-clicking the file. Serve the folder with any tiny web server to open it from your phone or another machine on the network.<\/div><\/div>\n<h2 id=\"the-one-file-that-matters\">The one file that matters<\/h2>\n<p><code>index.html<\/code> holds everything — every chapter, the search index, the diagrams. Copy that one file anywhere and it works offline. The other files (<code>_site.css<\/code>, <code>_app.js<\/code>, <code>_diagrams.js<\/code>, <code>build.js<\/code>, and the <code>.md<\/code> sources) are only needed if you want to <strong>edit the content and rebuild<\/strong>.<\/p>\n<h2 id=\"option-1-python-already-on-every-pi-30-seconds\">Option 1 — Python (already on every Pi), 30 seconds<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> /path/to/docs_mind/docs\n<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span> http.server <span class=\"tok-number\">9001<\/span><\/code><\/pre>\n<p>Then open <strong>http://localhost:9001<\/strong> on the Pi, or <strong>http://&lt;pi-ip&gt;:9001<\/strong> from your laptop or phone on the same network (find the IP with <code>hostname -I<\/code>).<\/p>\n<h2 id=\"option-2-always-on-with-systemd-survives-reboot\">Option 2 — Always-on with systemd (survives reboot)<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">sudo<\/span> tee /etc/systemd/system/docsmind-site.service &gt;/dev/null &lt;&lt;<span class=\"tok-string\">'EOF'<\/span>\n[Unit]\nDescription=DocsMind learning site\nAfter=network.target\n\n[Service]\nWorkingDirectory=/home/ajmalrasi/docs_mind/docs\nExecStart=/usr/bin/<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span> http.server <span class=\"tok-number\">9001<\/span>\nRestart=always\nUser=ajmalrasi\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n<span class=\"tok-command\">sudo<\/span> <span class=\"tok-command\">systemctl<\/span> daemon-reload\n<span class=\"tok-command\">sudo<\/span> <span class=\"tok-command\">systemctl<\/span> enable <span class=\"tok-flag\">--now<\/span> docsmind-site<\/code><\/pre>\n<p>Now it starts on boot and restarts if it crashes. Check it: <code>systemctl status docsmind-site<\/code>. Logs: <code>journalctl -u docsmind-site -f<\/code>.<\/p>\n<blockquote><p>Adjust <code>WorkingDirectory<\/code> and <code>User<\/code> to where you copied the folder. Pick a port that doesn't clash with anything else already running on the Pi (the KoiReader prep site uses 9000, so this one uses 9001).<\/p><\/blockquote>\n<h2 id=\"copying-to-the-pi\">Copying to the Pi<\/h2>\n<p>From your computer:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">scp<\/span> <span class=\"tok-flag\">-r<\/span> docs_mind/docs pi@&lt;pi-ip&gt;:/home/ajmalrasi/docsmind-site<\/code><\/pre>\n<p>Or just copy the single <code>index.html<\/code> onto a USB stick — the whole site is a few hundred KB of plain text.<\/p>\n<h2 id=\"editing-the-content\">Editing the content<\/h2>\n<p>The <code>.md<\/code> files are the source of truth. Edit them, then rebuild:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> docs_mind/docs\n<span class=\"tok-command\">node<\/span> build.js          <span class=\"tok-comment\"># regenerates index.html<\/span><\/code><\/pre>\n<p>If you don't have Node on the Pi, edit the <code>.md<\/code> files on your laptop, run <code>node build.js<\/code> there, and copy the new <code>index.html<\/code> over.<\/p>\n<h2 id=\"features-baked-in\">Features baked in<\/h2>\n<ul><li><strong>Search:<\/strong> type in the box for instant full-text search across all pages<\/li><\/ul>\n<p>(↑/↓ to move, Enter to open).<\/p>\n<ul><li><strong>Dark / light:<\/strong> toggle with the ◐ button; the preference is remembered.<\/li><li><strong>Quiz mode:<\/strong> on any <em>Interview Prep<\/em> question page, hit \"Quiz me · hide<\/li><\/ul>\n<p>answers\" to collapse every answer, then click a question to reveal it.<\/p>\n<ul><li><strong>Outline:<\/strong> long pages show an \"On this page\" jump list.<\/li><li><strong>Diagrams:<\/strong> the pipeline and cosine-similarity diagrams are inline SVG — they<\/li><\/ul>\n<p>adapt to light/dark automatically.<\/p>\n<ul><li><strong>Fully offline:<\/strong> no CDN, no external fonts or scripts. Works on an air-gapped<\/li><\/ul>\n<p>device, idles at near-zero CPU/RAM — fine on a Pi Zero.<\/p>\n<p>→ Back to the <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">Overview<\/a>.<\/p>","toc":[{"level":2,"id":"the-one-file-that-matters","text":"The one file that matters"},{"level":2,"id":"option-1-python-already-on-every-pi-30-seconds","text":"Option 1 — Python (already on every Pi), 30 seconds"},{"level":2,"id":"option-2-always-on-with-systemd-survives-reboot","text":"Option 2 — Always-on with systemd (survives reboot)"},{"level":2,"id":"copying-to-the-pi","text":"Copying to the Pi"},{"level":2,"id":"editing-the-content","text":"Editing the content"},{"level":2,"id":"features-baked-in","text":"Features baked in"}],"text":"run on a raspberry pi (or any device) 💡 tl;dr this site is a single self-contained index.html — all the content is baked in at build time. no database, no internet, no runtime dependencies. it even works by double-clicking the file. serve the folder with any tiny web server to open it from your phone or another machine on the network. the one file that matters index.html holds everything — every chapter, the search index, the diagrams. copy that one file anywhere and it works offline. the other files ( _site.css , _app.js , _diagrams.js , build.js , and the .md sources) are only needed if you want to edit the content and rebuild . option 1 — python (already on every pi), 30 seconds cd /path/to/docs_mind/docs python3 -m http.server 9001 then open http://localhost:9001 on the pi, or http://<pi-ip>:9001 from your laptop or phone on the same network (find the ip with hostname -i ). option 2 — always-on with systemd (survives reboot) sudo tee /etc/systemd/system/docsmind-site.service >/dev/null << 'eof' [unit] description=docsmind learning site after=network.target [service] workingdirectory=/home/ajmalrasi/docs_mind/docs execstart=/usr/bin/ python3 -m http.server 9001 restart=always user=ajmalrasi [install] wantedby=multi-user.target eof sudo systemctl daemon-reload sudo systemctl enable --now docsmind-site now it starts on boot and restarts if it crashes. check it: systemctl status docsmind-site . logs: journalctl -u docsmind-site -f . adjust workingdirectory and user to where you copied the folder. pick a port that doesn't clash with anything else already running on the pi (the koireader prep site uses 9000, so this one uses 9001). copying to the pi from your computer: scp -r docs_mind/docs pi@<pi-ip>:/home/ajmalrasi/docsmind-site or just copy the single index.html onto a usb stick — the whole site is a few hundred kb of plain text. editing the content the .md files are the source of truth. edit them, then rebuild: cd docs_mind/docs node build.js # regenerates index.html if you don't have node on the pi, edit the .md files on your laptop, run node build.js there, and copy the new index.html over. features baked in search: type in the box for instant full-text search across all pages (↑/↓ to move, enter to open). dark / light: toggle with the ◐ button; the preference is remembered. quiz mode: on any interview prep question page, hit \"quiz me · hide answers\" to collapse every answer, then click a question to reveal it. outline: long pages show an \"on this page\" jump list. diagrams: the pipeline and cosine-similarity diagrams are inline svg — they adapt to light/dark automatically. fully offline: no cdn, no external fonts or scripts. works on an air-gapped device, idles at near-zero cpu/ram — fine on a pi zero. → back to the overview .","words":444},{"path":"01-chunks-and-overlap/README.md","title":"Overview","section":"1 · Chunks & Overlap","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"01-chunks-overlap\">01 — Chunks &amp; Overlap<\/h1>\n<p><strong>The big idea:<\/strong> Documents are too long and too broad to search as a whole. We split them into small focused pieces called <em>chunks<\/em>. We overlap neighboring chunks slightly so ideas at the boundary don't get lost.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"what-is-a-chunk.md\" href=\"#\">what-is-a-chunk.md<\/a><\/td><td>What a chunk is, what it contains, why small<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"why-overlap.md\" href=\"#\">why-overlap.md<\/a><\/td><td>The boundary problem and how overlap solves it<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"real-examples.md\" href=\"#\">real-examples.md<\/a><\/td><td>Actual text from your docs shown being chunked<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Why chunk at all?<\/strong> Because embedding a whole document into one vector averages out all its topics into a blurry signal. A chunk about event horizons gives a sharp, focused vector. That's what makes retrieval precise.<\/p>\n<p><strong>Q: Big chunks vs small chunks?<\/strong> Small → sharper retrieval, less context per hit. Large → fuzzier retrieval (embedding averages more ideas), more context per hit. 512 tokens is a common sweet spot for technical prose. You tune it by measuring retrieval quality on an eval set, not by guessing.<\/p>\n<p><strong>Q: Why 512 specifically in Phase 1?<\/strong> Two reasons: (1) it balances precision vs context for technical docs, and (2) it matches the hard limit of <code>bge-small-en-v1.5<\/code> — feed it more than 512 tokens and it <strong>silently truncates<\/strong> the tail. Chunk size should never exceed the embedding model's max input length.<\/p>\n<p><strong>Q: Fixed-size vs sentence-aware vs semantic chunking?<\/strong><\/p>\n<ul><li><strong>Fixed-size:<\/strong> cuts every N tokens, fast, can cut mid-sentence.<\/li><li><strong>Sentence-aware (Phase 1):<\/strong> breaks on sentence boundaries, readable, good default.<\/li><li><strong>Semantic:<\/strong> splits where the topic changes, smartest but slower.<\/li><li><strong>Structural:<\/strong> splits on markdown headers / code blocks — great for technical docs.<\/li><\/ul>\n<p><strong>Q: What does overlap cost?<\/strong> Duplicated storage and sometimes the same content retrieved twice. Typical overlap is 10–20% of chunk size. Phase 1 uses 64/512 ≈ 12.5%.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/ingestion/chunker.py<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../02-embeddings/README.md\" href=\"#\">02-embeddings/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"01 — chunks & overlap the big idea: documents are too long and too broad to search as a whole. we split them into small focused pieces called chunks . we overlap neighboring chunks slightly so ideas at the boundary don't get lost. files in this folder file what it covers what-is-a-chunk.md what a chunk is, what it contains, why small why-overlap.md the boundary problem and how overlap solves it real-examples.md actual text from your docs shown being chunked 🎯 interview q&a q: why chunk at all? because embedding a whole document into one vector averages out all its topics into a blurry signal. a chunk about event horizons gives a sharp, focused vector. that's what makes retrieval precise. q: big chunks vs small chunks? small → sharper retrieval, less context per hit. large → fuzzier retrieval (embedding averages more ideas), more context per hit. 512 tokens is a common sweet spot for technical prose. you tune it by measuring retrieval quality on an eval set, not by guessing. q: why 512 specifically in phase 1? two reasons: (1) it balances precision vs context for technical docs, and (2) it matches the hard limit of bge-small-en-v1.5 — feed it more than 512 tokens and it silently truncates the tail. chunk size should never exceed the embedding model's max input length. q: fixed-size vs sentence-aware vs semantic chunking? fixed-size: cuts every n tokens, fast, can cut mid-sentence. sentence-aware (phase 1): breaks on sentence boundaries, readable, good default. semantic: splits where the topic changes, smartest but slower. structural: splits on markdown headers / code blocks — great for technical docs. q: what does overlap cost? duplicated storage and sometimes the same content retrieved twice. typical overlap is 10–20% of chunk size. phase 1 uses 64/512 ≈ 12.5%. code docsmind/ingestion/chunker.py → next: 02-embeddings/readme.md","words":300},{"path":"01-chunks-and-overlap/what-is-a-chunk.md","title":"What Is a Chunk?","section":"1 · Chunks & Overlap","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"what-is-a-chunk\">What Is a Chunk?<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A chunk is a small slice of a document — a few hundred words — kept together with the name of the file it came from.<\/div><\/div>\n<h2 id=\"why-not-use-the-whole-document\">Why not use the whole document?<\/h2>\n<p>Imagine one file covering black holes, the solar system, and rockets all at once. If you embed the whole thing into one vector, that vector has to represent all three topics at the same time. It becomes a blurry average. When someone asks about event horizons, the retrieval pulls back the whole doc — most of it irrelevant.<\/p>\n<p>Chunks fix this: each chunk is about <strong>one focused idea<\/strong>. Its embedding is a sharp, specific signal, not a blurry average.<\/p>\n<h2 id=\"what-a-chunk-looks-like-in-code\">What a chunk looks like in code<\/h2>\n<pre><code class=\"language-python\">Chunk {\n    id:       <span class=\"tok-string\">\"node_a1b2c3\"<\/span>,\n    text:     <span class=\"tok-string\">\"The event horizon is the boundary of a black hole, not a physical surface...\"<\/span>,\n    source:   <span class=\"tok-string\">\"black_holes.md\"<\/span>,\n    metadata: { <span class=\"tok-string\">\"file_path\"<\/span>: <span class=\"tok-string\">\"data/sample_docs/black_holes.md\"<\/span> }\n}<\/code><\/pre>\n<ul><li><code>text<\/code> — the actual slice of document text (~380 words / 512 tokens)<\/li><li><code>source<\/code> — which file it came from. This is what powers <strong>citations<\/strong> later.<\/li><\/ul>\n<p>When the model answers <em>\"nothing can escape the event horizon [1]\"<\/em>, the <code>[1]<\/code>   maps back to this <code>source<\/code> field.<\/p>\n<ul><li><code>id<\/code> — unique identifier generated by LlamaIndex<\/li><\/ul>\n<h2 id=\"how-chunks-are-created\">How chunks are created<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/ingestion/chunker.py<\/span>\nsplitter = SentenceSplitter(chunk_size=<span class=\"tok-number\">512<\/span>, chunk_overlap=<span class=\"tok-number\">64<\/span>)\nnodes = splitter.get_nodes_from_documents(documents)<\/code><\/pre>\n<ul><li><code>chunk_size=512<\/code> → up to 512 <strong>tokens<\/strong> per chunk (~380 words)<\/li><li><code>chunk_overlap=64<\/code> → see <a class=\"mdlink\" data-href=\"why-overlap.md\" href=\"#\">why-overlap.md<\/a><\/li><li><strong>Sentence-aware:<\/strong> it tries to break at sentence boundaries so text stays readable<\/li><\/ul>\n<h2 id=\"after-chunking\">After chunking<\/h2>\n<p>The sample corpus has 5 space docs (black holes, the solar system, rockets, the ISS, stellar life cycles), each short enough to produce one chunk — so you end up with 5 chunks. With longer documents you'd get many chunks per file. Each chunk will be:<\/p>\n<ol><li>Embedded → turned into 384 numbers<\/li><li>Stored in FAISS → made searchable<\/li><li>Retrieved → matched to a question<\/li><li>Sent to the LLM → used as grounding context<\/li><\/ol>\n<p>The <code>source<\/code> field travels with the chunk through all these steps so citations always trace back to the right file.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"why-overlap.md\" href=\"#\">why-overlap.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-not-use-the-whole-document","text":"Why not use the whole document?"},{"level":2,"id":"what-a-chunk-looks-like-in-code","text":"What a chunk looks like in code"},{"level":2,"id":"how-chunks-are-created","text":"How chunks are created"},{"level":2,"id":"after-chunking","text":"After chunking"}],"text":"what is a chunk? 💡 tl;dr a chunk is a small slice of a document — a few hundred words — kept together with the name of the file it came from. why not use the whole document? imagine one file covering black holes, the solar system, and rockets all at once. if you embed the whole thing into one vector, that vector has to represent all three topics at the same time. it becomes a blurry average. when someone asks about event horizons, the retrieval pulls back the whole doc — most of it irrelevant. chunks fix this: each chunk is about one focused idea . its embedding is a sharp, specific signal, not a blurry average. what a chunk looks like in code chunk { id: \"node_a1b2c3\" , text: \"the event horizon is the boundary of a black hole, not a physical surface...\" , source: \"black_holes.md\" , metadata: { \"file_path\" : \"data/sample_docs/black_holes.md\" } } text — the actual slice of document text (~380 words / 512 tokens) source — which file it came from. this is what powers citations later. when the model answers \"nothing can escape the event horizon [1]\" , the [1] maps back to this source field. id — unique identifier generated by llamaindex how chunks are created # docsmind/ingestion/chunker.py splitter = sentencesplitter(chunk_size= 512 , chunk_overlap= 64 ) nodes = splitter.get_nodes_from_documents(documents) chunk_size=512 → up to 512 tokens per chunk (~380 words) chunk_overlap=64 → see why-overlap.md sentence-aware: it tries to break at sentence boundaries so text stays readable after chunking the sample corpus has 5 space docs (black holes, the solar system, rockets, the iss, stellar life cycles), each short enough to produce one chunk — so you end up with 5 chunks. with longer documents you'd get many chunks per file. each chunk will be: embedded → turned into 384 numbers stored in faiss → made searchable retrieved → matched to a question sent to the llm → used as grounding context the source field travels with the chunk through all these steps so citations always trace back to the right file. → next: why-overlap.md","words":350},{"path":"01-chunks-and-overlap/why-overlap.md","title":"Why Overlap?","section":"1 · Chunks & Overlap","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"why-overlap\">Why Overlap?<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Overlap repeats the last few words of one chunk at the start of the next, so an idea that sits right on a boundary doesn't get cut in half.<\/div><\/div>\n<h2 id=\"the-boundary-problem\">The boundary problem<\/h2>\n<p>Say a long black-hole document has this passage:<\/p>\n<pre><code>...Supermassive black holes, millions to billions of times the mass of the\nSun, sit at the centers of most galaxies.\n\n## Accretion disks\nMatter spiraling toward a black hole forms a superheated accretion disk...<\/code><\/pre>\n<p>Without overlap, the splitter might end Chunk 1 right at <em>\"...centers of most galaxies.\"<\/em> and start Chunk 2 at <em>\"## Accretion disks\"<\/em>.<\/p>\n<p>Now someone asks: <em>\"What is the black hole at the center of the Milky Way called?\"<\/em><\/p>\n<p>If the answer sentence (\"the one at the heart of the Milky Way is called Sagittarius A*\") sits exactly on that boundary, it can get split — half in one chunk, half in the next. Neither chunk's embedding is sharp on it, and the retriever might miss it.<\/p>\n<h2 id=\"how-overlap-fixes-it\">How overlap fixes it<\/h2>\n<p>With <code>chunk_overlap=64<\/code>, Chunk 2 <strong>starts<\/strong> by repeating the last 64 tokens of Chunk 1:<\/p>\n<pre><code>Chunk 1: [...supermassive black holes... centers of most galaxies.]\n                                                  ↑\n                                  Last 64 tokens repeated ↓\nChunk 2: [...centers of most galaxies; Sagittarius A*. Accretion disks form...]<\/code><\/pre>\n<p>Now the boundary idea lives <strong>fully inside Chunk 2<\/strong> as well. If someone asks about it, at least one chunk carries the complete context.<\/p>\n<h2 id=\"visual\">Visual<\/h2>\n<pre><code>Chunk 1:  [=============================== 512 tokens ===============================]\nChunk 2:                       [== 64 overlap ==][========== 512 tokens ============]\nChunk 3:                                                  [== 64 overlap ==][========<\/code><\/pre>\n<h2 id=\"the-cost\">The cost<\/h2>\n<p>The overlapped text is stored <strong>twice<\/strong> (end of Chunk 1, start of Chunk 2). This means:<\/p>\n<ul><li>Slightly more vectors in FAISS (a few extra chunks)<\/li><li>Occasionally the same content retrieved twice in results<\/li><\/ul>\n<p>Neither is a problem at the scale of Phase 1 (a handful of chunks). At massive scale you'd want deduplication in post-processing.<\/p>\n<h2 id=\"phase-1-settings\">Phase 1 settings<\/h2>\n<pre><code class=\"language-python\">chunk_size=<span class=\"tok-number\">512<\/span>    <span class=\"tok-comment\"># ~380 words per chunk<\/span>\nchunk_overlap=<span class=\"tok-number\">64<\/span>  <span class=\"tok-comment\"># ~48 words repeated → 12.5% overlap<\/span><\/code><\/pre>\n<p>12.5% is a typical value. If you're getting boundary misses, increase it. If you're seeing too much duplication in results, decrease it — or add a deduplication step after retrieval.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"real-examples.md\" href=\"#\">real-examples.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-boundary-problem","text":"The boundary problem"},{"level":2,"id":"how-overlap-fixes-it","text":"How overlap fixes it"},{"level":2,"id":"visual","text":"Visual"},{"level":2,"id":"the-cost","text":"The cost"},{"level":2,"id":"phase-1-settings","text":"Phase 1 settings"}],"text":"why overlap? 💡 tl;dr overlap repeats the last few words of one chunk at the start of the next, so an idea that sits right on a boundary doesn't get cut in half. the boundary problem say a long black-hole document has this passage: ...supermassive black holes, millions to billions of times the mass of the sun, sit at the centers of most galaxies. ## accretion disks matter spiraling toward a black hole forms a superheated accretion disk... without overlap, the splitter might end chunk 1 right at \"...centers of most galaxies.\" and start chunk 2 at \"## accretion disks\" . now someone asks: \"what is the black hole at the center of the milky way called?\" if the answer sentence (\"the one at the heart of the milky way is called sagittarius a*\") sits exactly on that boundary, it can get split — half in one chunk, half in the next. neither chunk's embedding is sharp on it, and the retriever might miss it. how overlap fixes it with chunk_overlap=64 , chunk 2 starts by repeating the last 64 tokens of chunk 1: chunk 1: [...supermassive black holes... centers of most galaxies.] ↑ last 64 tokens repeated ↓ chunk 2: [...centers of most galaxies; sagittarius a*. accretion disks form...] now the boundary idea lives fully inside chunk 2 as well. if someone asks about it, at least one chunk carries the complete context. visual chunk 1: [=============================== 512 tokens ===============================] chunk 2: [== 64 overlap ==][========== 512 tokens ============] chunk 3: [== 64 overlap ==][======== the cost the overlapped text is stored twice (end of chunk 1, start of chunk 2). this means: slightly more vectors in faiss (a few extra chunks) occasionally the same content retrieved twice in results neither is a problem at the scale of phase 1 (a handful of chunks). at massive scale you'd want deduplication in post-processing. phase 1 settings chunk_size= 512 # ~380 words per chunk chunk_overlap= 64 # ~48 words repeated → 12.5% overlap 12.5% is a typical value. if you're getting boundary misses, increase it. if you're seeing too much duplication in results, decrease it — or add a deduplication step after retrieval. → next: real-examples.md","words":365},{"path":"01-chunks-and-overlap/real-examples.md","title":"Real Examples","section":"1 · Chunks & Overlap","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"real-examples-chunking-your-docs\">Real Examples — Chunking Your Docs<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Here's what the chunker actually does to <code class=\"srcref\" title=\"file in the repo\">black_holes.md<\/code> with <code>chunk_size=512, chunk_overlap=64<\/code>.<\/div><\/div>\n<h2 id=\"the-original-document-abridged\">The original document (abridged)<\/h2>\n<pre><code># Black Holes\n\nA black hole is a region of spacetime where gravity is so strong that nothing —\nnot even light — can escape once it crosses the boundary...\n\n## The event horizon\nThe event horizon is the boundary of a black hole, not a physical surface. It is\nthe point of no return: anything that crosses it, including light, can never get\nback out...\n\n## The singularity\nAt the very center lies the singularity, a point where matter is crushed to\ninfinite density and the known laws of physics break down...\n\n## How black holes form\nStellar-mass black holes form when a massive star — typically more than about 20\ntimes the mass of the Sun — exhausts its fuel and collapses under its own gravity\nin a supernova...\n\n## Accretion disks and Hawking radiation\nMatter spiraling toward a black hole forms a superheated accretion disk...<\/code><\/pre>\n<p>This doc is short (~300 words), so the splitter produces <strong>1 chunk<\/strong>. A longer document would produce several. To show the boundary behavior, imagine it were long enough to split into 2 — the example below shows where overlap appears.<\/p>\n<hr>\n<h2 id=\"chunk-1\">Chunk 1<\/h2>\n<pre><code>Chunk {\n    id:     \"node_001\",\n    source: \"black_holes.md\",\n    text:   \"# Black Holes\n\n             A black hole is a region of spacetime where gravity is so strong\n             that nothing — not even light — can escape once it crosses the\n             boundary.\n\n             ## The event horizon\n             The event horizon is the boundary of a black hole, not a physical\n             surface. It is the point of no return: anything that crosses it,\n             including light, can never get back out...\n\n             ## The singularity\n             At the very center lies the singularity, a point where matter is\n             crushed to infinite density and the known laws of physics break\n             down.\"\n}<\/code><\/pre>\n<p><em>This chunk ends at the singularity section.<\/em><\/p>\n<hr>\n<h2 id=\"chunk-2-with-overlap\">Chunk 2 (with overlap)<\/h2>\n<pre><code>Chunk {\n    id:     \"node_002\",\n    source: \"black_holes.md\",\n    text:   \"At the very center lies the singularity, a point where matter is   ← overlap!\n             crushed to infinite density and the known laws of physics break\n             down.\n\n             ## How black holes form\n             Stellar-mass black holes form when a massive star — typically more\n             than about 20 times the mass of the Sun — exhausts its fuel and\n             collapses under its own gravity in a supernova...\n\n             ## Accretion disks and Hawking radiation\n             Matter spiraling toward a black hole forms a superheated accretion\n             disk that emits intense X-rays before crossing the horizon.\"\n}<\/code><\/pre>\n<p><em>The first sentence of Chunk 2 is the last sentence of Chunk 1 — that's the overlap.<\/em><\/p>\n<hr>\n<h2 id=\"what-happens-at-query-time\">What happens at query time<\/h2>\n<p>Question: <em>\"What is at the center of a black hole?\"<\/em><\/p>\n<ol><li>The question gets embedded → a vector<\/li><li>FAISS compares it to all chunk vectors<\/li><li><strong>A chunk containing the singularity description<\/strong> scores high<\/li><li>The model reads it and answers: *\"The singularity, a point of infinite<\/li><\/ol>\n<p>density [1]\"*<\/p>\n<ol><li><code>[1]<\/code> maps back to <code>source: black_holes.md<\/code> → citation shown to user<\/li><\/ol>\n<p>The <code>source<\/code> field is the thread that ties the answer back to the exact file.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../02-embeddings/README.md\" href=\"#\">02-embeddings/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-original-document-abridged","text":"The original document (abridged)"},{"level":2,"id":"chunk-1","text":"Chunk 1"},{"level":2,"id":"chunk-2-with-overlap","text":"Chunk 2 (with overlap)"},{"level":2,"id":"what-happens-at-query-time","text":"What happens at query time"}],"text":"real examples — chunking your docs 💡 tl;dr here's what the chunker actually does to black_holes.md with chunk_size=512, chunk_overlap=64 . the original document (abridged) # black holes a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape once it crosses the boundary... ## the event horizon the event horizon is the boundary of a black hole, not a physical surface. it is the point of no return: anything that crosses it, including light, can never get back out... ## the singularity at the very center lies the singularity, a point where matter is crushed to infinite density and the known laws of physics break down... ## how black holes form stellar-mass black holes form when a massive star — typically more than about 20 times the mass of the sun — exhausts its fuel and collapses under its own gravity in a supernova... ## accretion disks and hawking radiation matter spiraling toward a black hole forms a superheated accretion disk... this doc is short (~300 words), so the splitter produces 1 chunk . a longer document would produce several. to show the boundary behavior, imagine it were long enough to split into 2 — the example below shows where overlap appears. chunk 1 chunk { id: \"node_001\", source: \"black_holes.md\", text: \"# black holes a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape once it crosses the boundary. ## the event horizon the event horizon is the boundary of a black hole, not a physical surface. it is the point of no return: anything that crosses it, including light, can never get back out... ## the singularity at the very center lies the singularity, a point where matter is crushed to infinite density and the known laws of physics break down.\" } this chunk ends at the singularity section. chunk 2 (with overlap) chunk { id: \"node_002\", source: \"black_holes.md\", text: \"at the very center lies the singularity, a point where matter is ← overlap! crushed to infinite density and the known laws of physics break down. ## how black holes form stellar-mass black holes form when a massive star — typically more than about 20 times the mass of the sun — exhausts its fuel and collapses under its own gravity in a supernova... ## accretion disks and hawking radiation matter spiraling toward a black hole forms a superheated accretion disk that emits intense x-rays before crossing the horizon.\" } the first sentence of chunk 2 is the last sentence of chunk 1 — that's the overlap. what happens at query time question: \"what is at the center of a black hole?\" the question gets embedded → a vector faiss compares it to all chunk vectors a chunk containing the singularity description scores high the model reads it and answers: *\"the singularity, a point of infinite density [1]\"* [1] maps back to source: black_holes.md → citation shown to user the source field is the thread that ties the answer back to the exact file. → back to: readme.md → next topic: 02-embeddings/readme.md","words":526},{"path":"02-embeddings/README.md","title":"Overview","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"02-embeddings\">02 — Embeddings<\/h1>\n<p><strong>The big idea:<\/strong> A computer can't compare English sentences directly. We convert each chunk into a list of 384 numbers — called an <em>embedding<\/em> or <em>vector<\/em> — that captures the chunk's meaning. Chunks with similar meaning get similar numbers. That's what makes \"search by meaning\" possible.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"problem-text-is-not-numbers.md\" href=\"#\">problem-text-is-not-numbers.md<\/a><\/td><td>Why computers can't search raw text<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"what-is-an-embedding.md\" href=\"#\">what-is-an-embedding.md<\/a><\/td><td>What 384 numbers actually represent<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"similar-text-similar-vectors.md\" href=\"#\">similar-text-similar-vectors.md<\/a><\/td><td>The core magic — why similar meaning = similar vector<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"bge-small-model.md\" href=\"#\">bge-small-model.md<\/a><\/td><td>Why we use bge-small, self-hosted vs cloud<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"real-examples.md\" href=\"#\">real-examples.md<\/a><\/td><td>Concrete numbers, before and after encoding<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Why self-hosted bge-small over OpenAI / Cohere embeddings?<\/strong> Embedding is a <em>bulk<\/em> operation — you embed your entire corpus at ingest time. 100,000 chunks = 100,000 model calls. On a paid per-token API that costs real money and hits rate limits. Self-hosted runs locally, is free after download, and your documents never leave your infrastructure. bge-small is good enough for English technical docs. The <code>Embedder<\/code> class is a single swap point, so switching to a bigger or cloud model later is a one-line config change.<\/p>\n<p><strong>Q: Dense embeddings vs keyword search (BM25) — which is better?<\/strong> Neither alone. Dense embeddings capture semantic meaning (\"car\" ≈ \"automobile\") but can miss exact terms, IDs, or rare tokens. BM25 nails exact matches but is blind to meaning. Hybrid (dense + BM25, then rerank) usually beats either. That's exactly Phase 3 of DocsMind — mention it as the natural next improvement.<\/p>\n<p><strong>Q: Why do query and documents have to use the same model?<\/strong> Each model learns its own vector space. A vector from model A and a vector from model B live in completely different spaces — comparing them for similarity is meaningless. Same model at ingest and query time is non-negotiable.<\/p>\n<p><strong>Q: Why 384 dimensions and not more?<\/strong> Smaller vectors = faster search + less memory. bge-small's 384-dim quality is strong for English technical prose. Larger models (bge-large at 1024 dims, OpenAI at 3072 dims) help on harder, more diverse, or multilingual content — but every query now does math on 3072 numbers instead of 384. It's a quality-vs-cost knob you tune with an eval set.<\/p>\n<p><strong>Q: Bi-encoder vs cross-encoder?<\/strong> bge-small is a bi-encoder: encodes query and documents independently, so you precompute document vectors once. Fast and scalable. A cross-encoder reads query + document <em>together<\/em> — much more accurate but must run for every query-document pair, so you can't use it on a full corpus. It's used as a <em>reranker<\/em> on the top-k results (Phase 3).<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/index/embeddings.py<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../03-normalization/README.md\" href=\"#\">03-normalization/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"02 — embeddings the big idea: a computer can't compare english sentences directly. we convert each chunk into a list of 384 numbers — called an embedding or vector — that captures the chunk's meaning. chunks with similar meaning get similar numbers. that's what makes \"search by meaning\" possible. files in this folder file what it covers problem-text-is-not-numbers.md why computers can't search raw text what-is-an-embedding.md what 384 numbers actually represent similar-text-similar-vectors.md the core magic — why similar meaning = similar vector bge-small-model.md why we use bge-small, self-hosted vs cloud real-examples.md concrete numbers, before and after encoding 🎯 interview q&a q: why self-hosted bge-small over openai / cohere embeddings? embedding is a bulk operation — you embed your entire corpus at ingest time. 100,000 chunks = 100,000 model calls. on a paid per-token api that costs real money and hits rate limits. self-hosted runs locally, is free after download, and your documents never leave your infrastructure. bge-small is good enough for english technical docs. the embedder class is a single swap point, so switching to a bigger or cloud model later is a one-line config change. q: dense embeddings vs keyword search (bm25) — which is better? neither alone. dense embeddings capture semantic meaning (\"car\" ≈ \"automobile\") but can miss exact terms, ids, or rare tokens. bm25 nails exact matches but is blind to meaning. hybrid (dense + bm25, then rerank) usually beats either. that's exactly phase 3 of docsmind — mention it as the natural next improvement. q: why do query and documents have to use the same model? each model learns its own vector space. a vector from model a and a vector from model b live in completely different spaces — comparing them for similarity is meaningless. same model at ingest and query time is non-negotiable. q: why 384 dimensions and not more? smaller vectors = faster search + less memory. bge-small's 384-dim quality is strong for english technical prose. larger models (bge-large at 1024 dims, openai at 3072 dims) help on harder, more diverse, or multilingual content — but every query now does math on 3072 numbers instead of 384. it's a quality-vs-cost knob you tune with an eval set. q: bi-encoder vs cross-encoder? bge-small is a bi-encoder: encodes query and documents independently, so you precompute document vectors once. fast and scalable. a cross-encoder reads query + document together — much more accurate but must run for every query-document pair, so you can't use it on a full corpus. it's used as a reranker on the top-k results (phase 3). code docsmind/index/embeddings.py → next: 03-normalization/readme.md","words":428},{"path":"02-embeddings/problem-text-is-not-numbers.md","title":"The Problem: Text Is Not Numbers","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"the-problem-text-is-not-numbers\">The Problem: Text Is Not Numbers<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Computers do math, not language. To search by meaning, we need to turn text into numbers first.<\/div><\/div>\n<h2 id=\"what-computers-can-do-with-numbers\">What computers can do with numbers<\/h2>\n<p>Given two numbers, a computer can tell you:<\/p>\n<ul><li>Which is bigger<\/li><li>How far apart they are<\/li><li>How similar they are<\/li><\/ul>\n<p>Given two sentences in English, a computer can't do any of that without first converting them.<\/p>\n<h2 id=\"keyword-search-the-old-way\">Keyword search — the old way<\/h2>\n<p>The simplest approach: does the word \"black hole\" appear in this document?<\/p>\n<pre><code>Question: \"What stops light from escaping a black hole?\"\nDocument: \"Nothing can escape a black hole's gravity...\"  → match ✅\nDocument: \"Beyond the event horizon, not even light gets out...\"  → no match ❌<\/code><\/pre>\n<p>The second document is <em>about<\/em> exactly this, but doesn't use the words \"black hole\" or \"escape.\" Keyword search misses it entirely. This is the fundamental limit of exact-match approaches like BM25.<\/p>\n<h2 id=\"what-we-need-instead\">What we need instead<\/h2>\n<p>We need a way to represent meaning so that:<\/p>\n<pre><code>\"What stops light from escaping a black hole?\"\n         ≈\n\"Beyond the event horizon, not even light gets out...\"<\/code><\/pre>\n<p>...are recognized as related, even though they share almost no words.<\/p>\n<p>The solution is <strong>embeddings<\/strong> — turning each piece of text into a list of numbers that represents its meaning in a way that similar meanings get similar numbers.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"what-is-an-embedding.md\" href=\"#\">what-is-an-embedding.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-computers-can-do-with-numbers","text":"What computers can do with numbers"},{"level":2,"id":"keyword-search-the-old-way","text":"Keyword search — the old way"},{"level":2,"id":"what-we-need-instead","text":"What we need instead"}],"text":"the problem: text is not numbers 💡 tl;dr computers do math, not language. to search by meaning, we need to turn text into numbers first. what computers can do with numbers given two numbers, a computer can tell you: which is bigger how far apart they are how similar they are given two sentences in english, a computer can't do any of that without first converting them. keyword search — the old way the simplest approach: does the word \"black hole\" appear in this document? question: \"what stops light from escaping a black hole?\" document: \"nothing can escape a black hole's gravity...\" → match ✅ document: \"beyond the event horizon, not even light gets out...\" → no match ❌ the second document is about exactly this, but doesn't use the words \"black hole\" or \"escape.\" keyword search misses it entirely. this is the fundamental limit of exact-match approaches like bm25. what we need instead we need a way to represent meaning so that: \"what stops light from escaping a black hole?\" ≈ \"beyond the event horizon, not even light gets out...\" ...are recognized as related, even though they share almost no words. the solution is embeddings — turning each piece of text into a list of numbers that represents its meaning in a way that similar meanings get similar numbers. → next: what-is-an-embedding.md","words":223},{"path":"02-embeddings/what-is-an-embedding.md","title":"What Is an Embedding?","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"what-is-an-embedding\">What Is an Embedding?<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An embedding is a list of 384 numbers that represents the <em>meaning<\/em> of a piece of text. Produced by a neural network trained to put similar meanings close together in that 384-dimensional space.<\/div><\/div>\n<h2 id=\"the-transformation\">The transformation<\/h2>\n<pre><code>Text:      \"The event horizon is the boundary of a black hole\"\n              ↓  (bge-small-en-v1.5 model)\nEmbedding: [0.12, -0.45, 0.78, 0.32, -0.21, 0.05, ..., 0.18]\n            └─────────────────────────────────────────────────┘\n                           384 numbers total<\/code><\/pre>\n<p>That list of 384 numbers is called a <strong>vector<\/strong>. The text and the vector represent the same thing — one is for humans to read, the other is for the computer to do math on.<\/p>\n<h2 id=\"what-do-the-384-numbers-mean\">What do the 384 numbers mean?<\/h2>\n<p>Each position is a learned feature — some hidden pattern the model discovered during training on millions of text pairs. You don't get to name them. Together, the 384 numbers place the text at one specific <em>point<\/em> in a 384-dimensional space.<\/p>\n<p>A rough intuition (positions don't actually mean this, but it helps):<\/p>\n<pre><code>Position 0: \"Is this about astronomy?\"     → 0.12 (somewhat yes)\nPosition 1: \"Is this about motion/speed?\"  → -0.45 (not particularly)\nPosition 2: \"Is this about gravity?\"       → 0.78 (strongly yes)\nPosition 3: \"Is this about light?\"         → 0.32 (a bit)\n...\nPosition 383: (some other learned pattern) → 0.18<\/code><\/pre>\n<h2 id=\"why-384-dimensions\">Why 384 dimensions?<\/h2>\n<p><code>bge-small-en-v1.5<\/code> was designed with 384 dimensions — small enough to be fast and light on memory, large enough to capture the nuance needed for English technical text. Larger models (bge-large = 1024 dims, OpenAI = 3072 dims) have more capacity but cost more to compute and store. 384 is a practical sweet spot for this use case.<\/p>\n<h2 id=\"the-same-model-for-everything\">The same model for everything<\/h2>\n<p>At ingest time:  chunk text → embedding (stored in FAISS) At query time:   question   → embedding (used to search FAISS)<\/p>\n<p>Both must use the <strong>exact same model<\/strong>. If you used different models, the vectors would live in different spaces and comparing them would be meaningless — like comparing GPS coordinates in two different coordinate systems.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"similar-text-similar-vectors.md\" href=\"#\">similar-text-similar-vectors.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-transformation","text":"The transformation"},{"level":2,"id":"what-do-the-384-numbers-mean","text":"What do the 384 numbers mean?"},{"level":2,"id":"why-384-dimensions","text":"Why 384 dimensions?"},{"level":2,"id":"the-same-model-for-everything","text":"The same model for everything"}],"text":"what is an embedding? 💡 tl;dr an embedding is a list of 384 numbers that represents the meaning of a piece of text. produced by a neural network trained to put similar meanings close together in that 384-dimensional space. the transformation text: \"the event horizon is the boundary of a black hole\" ↓ (bge-small-en-v1.5 model) embedding: [0.12, -0.45, 0.78, 0.32, -0.21, 0.05, ..., 0.18] └─────────────────────────────────────────────────┘ 384 numbers total that list of 384 numbers is called a vector . the text and the vector represent the same thing — one is for humans to read, the other is for the computer to do math on. what do the 384 numbers mean? each position is a learned feature — some hidden pattern the model discovered during training on millions of text pairs. you don't get to name them. together, the 384 numbers place the text at one specific point in a 384-dimensional space. a rough intuition (positions don't actually mean this, but it helps): position 0: \"is this about astronomy?\" → 0.12 (somewhat yes) position 1: \"is this about motion/speed?\" → -0.45 (not particularly) position 2: \"is this about gravity?\" → 0.78 (strongly yes) position 3: \"is this about light?\" → 0.32 (a bit) ... position 383: (some other learned pattern) → 0.18 why 384 dimensions? bge-small-en-v1.5 was designed with 384 dimensions — small enough to be fast and light on memory, large enough to capture the nuance needed for english technical text. larger models (bge-large = 1024 dims, openai = 3072 dims) have more capacity but cost more to compute and store. 384 is a practical sweet spot for this use case. the same model for everything at ingest time: chunk text → embedding (stored in faiss) at query time: question → embedding (used to search faiss) both must use the exact same model . if you used different models, the vectors would live in different spaces and comparing them would be meaningless — like comparing gps coordinates in two different coordinate systems. → next: similar-text-similar-vectors.md","words":335},{"path":"02-embeddings/similar-text-similar-vectors.md","title":"Similar Text → Similar Vectors","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"similar-text-similar-vectors\">Similar Text → Similar Vectors<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The core magic of embeddings. A model trained on millions of text pairs learns to produce vectors that are close together for similar meanings and far apart for different meanings.<\/div><\/div>\n<h2 id=\"the-pattern\">The pattern<\/h2>\n<pre><code>\"A black hole traps light at its event horizon\"  → [0.12, -0.45, 0.78, 0.32, ...]\n\"Nothing escapes once it crosses the horizon\"    → [0.11, -0.44, 0.79, 0.31, ...]  ← very close\n\"The asteroid belt lies between Mars and Jupiter\" → [-0.89, 0.34, -0.12, 0.67, ...]  ← far away<\/code><\/pre>\n<p>The first two sentences mean similar things → their numbers are nearly identical. The asteroid-belt sentence is a different topic → its numbers are very different.<\/p>\n<h2 id=\"why-this-is-powerful-for-search\">Why this is powerful for search<\/h2>\n<p>When a user asks: <em>\"How do black holes form?\"<\/em><\/p>\n<ol><li>Embed the question → get a vector, e.g. <code>[0.08, -0.41, 0.75, 0.35, ...]<\/code><\/li><li>Compare it to all chunk vectors in FAISS<\/li><li>The chunks <em>about<\/em> black holes will have similar vectors → high similarity score<\/li><li>The chunk about the space station will have very different vectors → low score<\/li><li>Return the top-k by similarity → the most relevant chunks for the question<\/li><\/ol>\n<p>This works even if the chunks use different words than the question. That's the difference from keyword search.<\/p>\n<h2 id=\"how-close-and-far-are-measured\">How \"close\" and \"far\" are measured<\/h2>\n<p>We use <strong>cosine similarity<\/strong> — the angle between two vectors. This is explained in detail in <a class=\"mdlink\" data-href=\"../04-vector-similarity/\" href=\"#\">04-vector-similarity<\/a>.<\/p>\n<p>For now: similarity score 0.0 to 1.0:<\/p>\n<ul><li><strong>0.85–1.0<\/strong> → very similar (same topic, same idea)<\/li><li><strong>0.5–0.85<\/strong> → related (same domain, different aspect)<\/li><li><strong>0.0–0.5<\/strong> → different (different topics)<\/li><\/ul>\n<p>(These are the real ranges you'll see in this corpus — e.g. \"How do black holes form?\" scores 0.81 against <code>black_holes.md<\/code> and 0.63 against <code>stellar_lifecycle.md<\/code>, since massive stars collapse into black holes.)<\/p>\n<h2 id=\"how-the-model-learned-this\">How the model learned this<\/h2>\n<p><code>bge-small-en-v1.5<\/code> was trained on millions of (text, related text) pairs. The training objective: make the vectors of related pairs closer, unrelated pairs farther. After training on enough data, the model generalizes — it can place <em>any<\/em> new text in the right neighborhood of meaning, even text it's never seen.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"bge-small-model.md\" href=\"#\">bge-small-model.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pattern","text":"The pattern"},{"level":2,"id":"why-this-is-powerful-for-search","text":"Why this is powerful for search"},{"level":2,"id":"how-close-and-far-are-measured","text":"How \"close\" and \"far\" are measured"},{"level":2,"id":"how-the-model-learned-this","text":"How the model learned this"}],"text":"similar text → similar vectors 💡 tl;dr the core magic of embeddings. a model trained on millions of text pairs learns to produce vectors that are close together for similar meanings and far apart for different meanings. the pattern \"a black hole traps light at its event horizon\" → [0.12, -0.45, 0.78, 0.32, ...] \"nothing escapes once it crosses the horizon\" → [0.11, -0.44, 0.79, 0.31, ...] ← very close \"the asteroid belt lies between mars and jupiter\" → [-0.89, 0.34, -0.12, 0.67, ...] ← far away the first two sentences mean similar things → their numbers are nearly identical. the asteroid-belt sentence is a different topic → its numbers are very different. why this is powerful for search when a user asks: \"how do black holes form?\" embed the question → get a vector, e.g. [0.08, -0.41, 0.75, 0.35, ...] compare it to all chunk vectors in faiss the chunks about black holes will have similar vectors → high similarity score the chunk about the space station will have very different vectors → low score return the top-k by similarity → the most relevant chunks for the question this works even if the chunks use different words than the question. that's the difference from keyword search. how \"close\" and \"far\" are measured we use cosine similarity — the angle between two vectors. this is explained in detail in 04-vector-similarity . for now: similarity score 0.0 to 1.0: 0.85–1.0 → very similar (same topic, same idea) 0.5–0.85 → related (same domain, different aspect) 0.0–0.5 → different (different topics) (these are the real ranges you'll see in this corpus — e.g. \"how do black holes form?\" scores 0.81 against black_holes.md and 0.63 against stellar_lifecycle.md , since massive stars collapse into black holes.) how the model learned this bge-small-en-v1.5 was trained on millions of (text, related text) pairs. the training objective: make the vectors of related pairs closer, unrelated pairs farther. after training on enough data, the model generalizes — it can place any new text in the right neighborhood of meaning, even text it's never seen. → next: bge-small-model.md","words":348},{"path":"02-embeddings/bge-small-model.md","title":"The bge-small Model","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"the-bge-small-model-why-this-one\">The bge-small Model — Why This One?<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <code>bge-small-en-v1.5<\/code> is a self-hosted, open-source English embedding model that's fast, free, private, and good enough for technical docs. The key decision was self-hosted over a cloud API — driven by cost, privacy, and no vendor lock-in.<\/div><\/div>\n<h2 id=\"what-bge-small-is\">What bge-small is<\/h2>\n<ul><li><strong>bge<\/strong> = BAAI General Embeddings, published by Beijing Academy of AI<\/li><li><strong>small<\/strong> = the smallest variant in the family (384 dims vs large at 1024 dims)<\/li><li><strong>en<\/strong> = English<\/li><li><strong>v1.5<\/strong> = version; the v1.5 family improved significantly over v1<\/li><li><strong>License:<\/strong> MIT — free to use commercially, no restrictions<\/li><li><strong>Max input:<\/strong> 512 tokens (chunk_size in Phase 1 is set to match this)<\/li><\/ul>\n<h2 id=\"why-self-hosted-over-a-cloud-api\">Why self-hosted over a cloud API<\/h2>\n<p>Embedding is a <strong>bulk operation<\/strong>. At ingest time, you encode your entire corpus. If you have 100,000 chunks:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Self-hosted bge-small<\/th><th>Cloud API (OpenAI etc.)<\/th><\/tr><\/thead><tbody><tr><td>Cost<\/td><td>Free after download<\/td><td>Pay per token, ~$0.13/1M tokens → adds up<\/td><\/tr><tr><td>Privacy<\/td><td>Data stays on your machine<\/td><td>All your docs sent to a third party<\/td><\/tr><tr><td>Rate limits<\/td><td>None<\/td><td>Provider throttles you at scale<\/td><\/tr><tr><td>Network<\/td><td>No round-trips<\/td><td>Latency on every request<\/td><\/tr><tr><td>Vendor lock-in<\/td><td>None (swap models freely)<\/td><td>Tied to provider + their versioning<\/td><
