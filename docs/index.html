\/tr><tr><td>Quality<\/td><td>Strong for English tech docs<\/td><td>Often higher, especially multilingual<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The <code>Embedder<\/code> class (<code class=\"srcref\" title=\"source file in the repo\">embeddings.py<\/code>) is a single abstraction point — swapping to a different model is a one-line config change (<code>embed_model<\/code> in <code>.env<\/code>), not a rewrite.<\/p>\n<h2 id=\"when-youd-choose-a-cloud-model-instead\">When you'd choose a cloud model instead<\/h2>\n<ul><li>You need <strong>multilingual<\/strong> support (bge-small is English-only)<\/li><li>Your content is very diverse and needs the highest possible retrieval quality<\/li><li>You're prototyping and don't want to manage local model weights<\/li><li>You can accept the cost and data-egress tradeoff<\/li><\/ul>\n<h2 id=\"the-model-in-code\">The model in code<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/embeddings.py<\/span>\n<span class=\"tok-keyword\">from<\/span> sentence_transformers <span class=\"tok-keyword\">import<\/span> SentenceTransformer\n\nmodel = SentenceTransformer(<span class=\"tok-string\">\"BAAI/bge-small-en-v1.5\"<\/span>)\n\nembeddings = model.encode(\n    texts,\n    normalize_embeddings=<span class=\"tok-keyword\">True<\/span>,   <span class=\"tok-comment\"># L2 normalization — see 03-normalization<\/span>\n    convert_to_numpy=<span class=\"tok-keyword\">True<\/span>,\n    show_progress_bar=<span class=\"tok-keyword\">False<\/span>,\n)\n<span class=\"tok-comment\"># shape: (N, 384) — N texts, each → 384 floats<\/span><\/code><\/pre>\n<p>The model is loaded <strong>lazily<\/strong> (<code>@cached_property<\/code>) — it's not pulled into memory until the first <code>encode()<\/code> call. After that it's cached for the lifetime of the process.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"real-examples.md\" href=\"#\">real-examples.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-bge-small-is","text":"What bge-small is"},{"level":2,"id":"why-self-hosted-over-a-cloud-api","text":"Why self-hosted over a cloud API"},{"level":2,"id":"when-youd-choose-a-cloud-model-instead","text":"When you'd choose a cloud model instead"},{"level":2,"id":"the-model-in-code","text":"The model in code"}],"text":"the bge-small model — why this one? 💡 tl;dr bge-small-en-v1.5 is a self-hosted, open-source english embedding model that's fast, free, private, and good enough for technical docs. the key decision was self-hosted over a cloud api — driven by cost, privacy, and no vendor lock-in. what bge-small is bge = baai general embeddings, published by beijing academy of ai small = the smallest variant in the family (384 dims vs large at 1024 dims) en = english v1.5 = version; the v1.5 family improved significantly over v1 license: mit — free to use commercially, no restrictions max input: 512 tokens (chunk_size in phase 1 is set to match this) why self-hosted over a cloud api embedding is a bulk operation . at ingest time, you encode your entire corpus. if you have 100,000 chunks: self-hosted bge-small cloud api (openai etc.) cost free after download pay per token, ~$0.13/1m tokens → adds up privacy data stays on your machine all your docs sent to a third party rate limits none provider throttles you at scale network no round-trips latency on every request vendor lock-in none (swap models freely) tied to provider + their versioning quality strong for english tech docs often higher, especially multilingual the embedder class ( embeddings.py ) is a single abstraction point — swapping to a different model is a one-line config change ( embed_model in .env ), not a rewrite. when you'd choose a cloud model instead you need multilingual support (bge-small is english-only) your content is very diverse and needs the highest possible retrieval quality you're prototyping and don't want to manage local model weights you can accept the cost and data-egress tradeoff the model in code # docsmind/index/embeddings.py from sentence_transformers import sentencetransformer model = sentencetransformer( \"baai/bge-small-en-v1.5\" ) embeddings = model.encode( texts, normalize_embeddings= true , # l2 normalization — see 03-normalization convert_to_numpy= true , show_progress_bar= false , ) # shape: (n, 384) — n texts, each → 384 floats the model is loaded lazily ( @cached_property ) — it's not pulled into memory until the first encode() call. after that it's cached for the lifetime of the process. → next: real-examples.md","words":355},{"path":"02-embeddings/real-examples.md","title":"Real Examples","section":"2 · Embeddings","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"real-examples-embeddings-in-action\">Real Examples — Embeddings in Action<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Concrete numbers showing what embeddings look like, and how similar vs dissimilar texts produce different vectors.<\/div><\/div>\n<h2 id=\"two-similar-chunks\">Two similar chunks<\/h2>\n<p>From <code class=\"srcref\" title=\"file in the repo\">black_holes.md<\/code>:<\/p>\n<pre><code class=\"language-python\">text_a = <span class=\"tok-string\">\"The event horizon is the boundary of a black hole; nothing escapes it.\"<\/span>\ntext_b = <span class=\"tok-string\">\"Once light crosses the horizon of a black hole, it can never get back out.\"<\/span>\n\nembedding_a = model.encode(text_a)\nembedding_b = model.encode(text_b)<\/code><\/pre>\n<p><strong>First 10 values of each<\/strong> (384 total):<\/p>\n<pre><code>embedding_a: [ 0.043,  0.018, -0.031,  0.072, -0.056,  0.084, -0.021,  0.063,  0.039, -0.044, ...]\nembedding_b: [ 0.041,  0.021, -0.029,  0.069, -0.058,  0.081, -0.020,  0.067,  0.037, -0.041, ...]<\/code><\/pre>\n<p>Notice: the numbers are close. Same topic → similar vector.<\/p>\n<p><strong>Cosine similarity between them:<\/strong> ~0.90 (very high)<\/p>\n<hr>\n<h2 id=\"one-very-different-chunk\">One very different chunk<\/h2>\n<p>From <code class=\"srcref\" title=\"file in the repo\">the_iss.md<\/code>:<\/p>\n<pre><code class=\"language-python\">text_c = <span class=\"tok-string\">\"The ISS orbits Earth roughly every 90 minutes in low Earth orbit.\"<\/span>\n\nembedding_c = model.encode(text_c)<\/code><\/pre>\n<p><strong>First 10 values:<\/strong><\/p>\n<pre><code>embedding_c: [-0.031,  0.089,  0.047, -0.052,  0.078, -0.044,  0.061, -0.037,  0.055,  0.083, ...]<\/code><\/pre>\n<p>Notice: the pattern is completely different from <code>embedding_a<\/code>. Both are about space — but one is about black-hole gravity and the other about an orbiting station, so the meanings (and the vectors) diverge.<\/p>\n<p><strong>Cosine similarity between a and c:<\/strong> ~0.40 (low — same domain, different topic)<\/p>\n<hr>\n<h2 id=\"what-this-means-for-retrieval\">What this means for retrieval<\/h2>\n<p>Query: <em>\"What is the boundary of a black hole?\"<\/em><\/p>\n<pre><code>Embedded query: [ 0.040,  0.019, -0.030, ...]  (similar to text_a and text_b)\n\nSimilarity scores:\n  text_a (event horizon)   → 0.91  ← retrieved ✅\n  text_b (light crosses)   → 0.88  ← retrieved ✅\n  text_c (ISS orbit)       → 0.38  ← ranked far below ✅<\/code><\/pre>\n<p>FAISS ranks the two black-hole chunks at the top. The ISS chunk sits far below. The retrieval is right — the question was about black holes, not the space station.<\/p>\n<hr>\n<h2 id=\"note-on-the-numbers-above\">Note on the numbers above<\/h2>\n<p>The exact values depend on the model version and normalization. The point isn't the specific numbers — it's the <strong>pattern<\/strong>: similar texts produce similar vectors, different texts produce different vectors. Cosine similarity (see <a class=\"mdlink\" data-href=\"../04-vector-similarity/\" href=\"#\">04-vector-similarity<\/a>) measures how similar the vectors are.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../03-normalization/README.md\" href=\"#\">03-normalization/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"two-similar-chunks","text":"Two similar chunks"},{"level":2,"id":"one-very-different-chunk","text":"One very different chunk"},{"level":2,"id":"what-this-means-for-retrieval","text":"What this means for retrieval"},{"level":2,"id":"note-on-the-numbers-above","text":"Note on the numbers above"}],"text":"real examples — embeddings in action 💡 tl;dr concrete numbers showing what embeddings look like, and how similar vs dissimilar texts produce different vectors. two similar chunks from black_holes.md : text_a = \"the event horizon is the boundary of a black hole; nothing escapes it.\" text_b = \"once light crosses the horizon of a black hole, it can never get back out.\" embedding_a = model.encode(text_a) embedding_b = model.encode(text_b) first 10 values of each (384 total): embedding_a: [ 0.043, 0.018, -0.031, 0.072, -0.056, 0.084, -0.021, 0.063, 0.039, -0.044, ...] embedding_b: [ 0.041, 0.021, -0.029, 0.069, -0.058, 0.081, -0.020, 0.067, 0.037, -0.041, ...] notice: the numbers are close. same topic → similar vector. cosine similarity between them: ~0.90 (very high) one very different chunk from the_iss.md : text_c = \"the iss orbits earth roughly every 90 minutes in low earth orbit.\" embedding_c = model.encode(text_c) first 10 values: embedding_c: [-0.031, 0.089, 0.047, -0.052, 0.078, -0.044, 0.061, -0.037, 0.055, 0.083, ...] notice: the pattern is completely different from embedding_a . both are about space — but one is about black-hole gravity and the other about an orbiting station, so the meanings (and the vectors) diverge. cosine similarity between a and c: ~0.40 (low — same domain, different topic) what this means for retrieval query: \"what is the boundary of a black hole?\" embedded query: [ 0.040, 0.019, -0.030, ...] (similar to text_a and text_b) similarity scores: text_a (event horizon) → 0.91 ← retrieved ✅ text_b (light crosses) → 0.88 ← retrieved ✅ text_c (iss orbit) → 0.38 ← ranked far below ✅ faiss ranks the two black-hole chunks at the top. the iss chunk sits far below. the retrieval is right — the question was about black holes, not the space station. note on the numbers above the exact values depend on the model version and normalization. the point isn't the specific numbers — it's the pattern : similar texts produce similar vectors, different texts produce different vectors. cosine similarity (see 04-vector-similarity ) measures how similar the vectors are. → back to: readme.md → next topic: 03-normalization/readme.md","words":343},{"path":"03-normalization/README.md","title":"Overview","section":"3 · Normalization","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"03-normalization\">03 — Normalization<\/h1>\n<p><strong>The big idea:<\/strong> Before storing or comparing vectors, we scale each one so its length is exactly 1.0. This is called <em>L2 normalization<\/em>. It makes cosine similarity equal to a simple dot product — which is what FAISS's <code>IndexFlatIP<\/code> computes. Faster math, fairer comparison.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"l2-normalization-math.md\" href=\"#\">l2-normalization-math.md<\/a><\/td><td>Step-by-step: [1.0, 2.0, 3.0] → [0.27, 0.53, 0.80]<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"why-length-1.md\" href=\"#\">why-length-1.md<\/a><\/td><td>Why same-length vectors make comparison fair<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"code-example.md\" href=\"#\">code-example.md<\/a><\/td><td>How Phase 1 does it in one line<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Why L2 normalize?<\/strong> So that vector <em>length<\/em> doesn't affect similarity — only <em>direction<\/em> (meaning) does. Two chunks about black holes should be close whether one is 50 words and the other is 500. After normalization, all vectors have the same length (1.0), so the only thing left to compare is the angle between them, which represents meaning.<\/p>\n<p><strong>Q: Cosine similarity vs Euclidean distance — which is better for text?<\/strong> Cosine similarity is better for text. Euclidean distance is sensitive to vector <em>length<\/em> (a longer doc could produce a bigger vector and appear \"farther\" from a short but identical-meaning doc). Cosine only cares about <em>direction<\/em> — the angle between vectors — which is what semantic similarity actually is. For text retrieval, direction = meaning, length = irrelevant.<\/p>\n<p><strong>Q: What's the trick with IndexFlatIP?<\/strong> When vectors are L2-normalized (all have length 1.0), the inner product (dot product) of two vectors equals their cosine similarity. FAISS's <code>IndexFlatIP<\/code> computes inner products. So: normalize first → use IndexFlatIP → you get cosine similarity, implemented as fast inner-product math. No special cosine index needed.<\/p>\n<p><strong>Q: What happens if you forget to normalize?<\/strong> Retrieval becomes biased toward longer chunks (more tokens → bigger raw embedding magnitude → appears closer to everything). You'd get inconsistent results that vary with chunk size, not meaning.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/index/embeddings.py<\/code> — <code>normalize_embeddings=True<\/code> <code class=\"srcref\" title=\"source file in the repo\">docsmind/index/faiss_store.py<\/code> — <code>IndexFlatIP<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../04-vector-similarity/README.md\" href=\"#\">04-vector-similarity/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"03 — normalization the big idea: before storing or comparing vectors, we scale each one so its length is exactly 1.0. this is called l2 normalization . it makes cosine similarity equal to a simple dot product — which is what faiss's indexflatip computes. faster math, fairer comparison. files in this folder file what it covers l2-normalization-math.md step-by-step: [1.0, 2.0, 3.0] → [0.27, 0.53, 0.80] why-length-1.md why same-length vectors make comparison fair code-example.md how phase 1 does it in one line 🎯 interview q&a q: why l2 normalize? so that vector length doesn't affect similarity — only direction (meaning) does. two chunks about black holes should be close whether one is 50 words and the other is 500. after normalization, all vectors have the same length (1.0), so the only thing left to compare is the angle between them, which represents meaning. q: cosine similarity vs euclidean distance — which is better for text? cosine similarity is better for text. euclidean distance is sensitive to vector length (a longer doc could produce a bigger vector and appear \"farther\" from a short but identical-meaning doc). cosine only cares about direction — the angle between vectors — which is what semantic similarity actually is. for text retrieval, direction = meaning, length = irrelevant. q: what's the trick with indexflatip? when vectors are l2-normalized (all have length 1.0), the inner product (dot product) of two vectors equals their cosine similarity. faiss's indexflatip computes inner products. so: normalize first → use indexflatip → you get cosine similarity, implemented as fast inner-product math. no special cosine index needed. q: what happens if you forget to normalize? retrieval becomes biased toward longer chunks (more tokens → bigger raw embedding magnitude → appears closer to everything). you'd get inconsistent results that vary with chunk size, not meaning. code docsmind/index/embeddings.py — normalize_embeddings=true docsmind/index/faiss_store.py — indexflatip → next: 04-vector-similarity/readme.md","words":310},{"path":"03-normalization/why-length-1.md","title":"Why Length 1.0 Is Fair","section":"3 · Normalization","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"why-same-length-10-makes-comparison-fair\">Why Same Length (1.0) Makes Comparison Fair<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Without normalization, a longer chunk could have a bigger raw vector and appear similar to everything — not because of meaning, but because of size. Normalization removes this bias so only <em>meaning<\/em> (direction) is compared.<\/div><\/div>\n<h2 id=\"the-problem-without-normalization\">The problem without normalization<\/h2>\n<p>Imagine two chunks about black holes:<\/p>\n<pre><code>Chunk A (short, 20 words):   \"A black hole traps light at its event horizon.\"\nChunk B (long, 200 words):   \"A black hole traps light at its event horizon. It\n                              is the point of no return; anything crossing it,\n                              including light, can never get back out...\"\n\nRaw embedding_A: [0.5,  0.3,  0.8]   → length = √(0.25 + 0.09 + 0.64) = 0.99\nRaw embedding_B: [1.2,  0.7,  1.9]   → length = √(1.44 + 0.49 + 3.61) = 2.35<\/code><\/pre>\n<p>Both chunks are <em>about<\/em> event horizons — same meaning, same direction. But Chunk B's vector is <strong>2.4× longer<\/strong> just because it's a longer piece of text.<\/p>\n<p>Now if a query comes in and we measure Euclidean distance:<\/p>\n<pre><code>Distance(query, Chunk A) = large  (raw vector is small)\nDistance(query, Chunk B) = even larger (raw vector is big)<\/code><\/pre>\n<p>The ranking is polluted by chunk length, not meaning. Not what we want.<\/p>\n<h2 id=\"after-normalization\">After normalization<\/h2>\n<pre><code>Normalized embedding_A: [0.505, 0.303, 0.808]  → length = 1.0\nNormalized embedding_B: [0.510, 0.298, 0.809]  → length = 1.0<\/code><\/pre>\n<p>Both are now the same length. The only remaining difference is <em>direction<\/em> — which is the angle between them, which is the meaning difference.<\/p>\n<pre><code>Cosine similarity(A, B) = 0.999  ← near-identical meaning, correctly detected<\/code><\/pre>\n<h2 id=\"the-direction-meaning-intuition\">The direction = meaning intuition<\/h2>\n<p>Think of each vector as an <strong>arrow<\/strong> in 384-dimensional space.<\/p>\n<pre><code>Before normalization:\n  →    Chunk A (short arrow, same direction)\n  ────────→  Chunk B (long arrow, same direction)\n\nAfter normalization:\n  →  Chunk A (length 1.0)\n  →  Chunk B (length 1.0)  ← now identical<\/code><\/pre>\n<p>Both arrows point the same direction — same meaning. The only difference was scale, which we removed. Now their similarity score is 0.999, correctly reflecting that they're both about event horizons.<\/p>\n<h2 id=\"the-faiss-bonus\">The FAISS bonus<\/h2>\n<p><code>IndexFlatIP<\/code> computes the <strong>inner product<\/strong> (dot product) of two vectors:<\/p>\n<pre><code>inner_product(A, B) = A₁×B₁ + A₂×B₂ + ... + Aₙ×Bₙ<\/code><\/pre>\n<p>When both vectors are normalized (length = 1.0), the inner product equals the cosine similarity exactly. So:<\/p>\n<ul><li>Normalize → use IndexFlatIP → get cosine similarity<\/li><li>No special \"cosine index\" needed, inner product is enough<\/li><li>Inner product is highly optimized in FAISS (SIMD, GPU) → fast<\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"code-example.md\" href=\"#\">code-example.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-problem-without-normalization","text":"The problem without normalization"},{"level":2,"id":"after-normalization","text":"After normalization"},{"level":2,"id":"the-direction-meaning-intuition","text":"The direction = meaning intuition"},{"level":2,"id":"the-faiss-bonus","text":"The FAISS bonus"}],"text":"why same length (1.0) makes comparison fair 💡 tl;dr without normalization, a longer chunk could have a bigger raw vector and appear similar to everything — not because of meaning, but because of size. normalization removes this bias so only meaning (direction) is compared. the problem without normalization imagine two chunks about black holes: chunk a (short, 20 words): \"a black hole traps light at its event horizon.\" chunk b (long, 200 words): \"a black hole traps light at its event horizon. it is the point of no return; anything crossing it, including light, can never get back out...\" raw embedding_a: [0.5, 0.3, 0.8] → length = √(0.25 + 0.09 + 0.64) = 0.99 raw embedding_b: [1.2, 0.7, 1.9] → length = √(1.44 + 0.49 + 3.61) = 2.35 both chunks are about event horizons — same meaning, same direction. but chunk b's vector is 2.4× longer just because it's a longer piece of text. now if a query comes in and we measure euclidean distance: distance(query, chunk a) = large (raw vector is small) distance(query, chunk b) = even larger (raw vector is big) the ranking is polluted by chunk length, not meaning. not what we want. after normalization normalized embedding_a: [0.505, 0.303, 0.808] → length = 1.0 normalized embedding_b: [0.510, 0.298, 0.809] → length = 1.0 both are now the same length. the only remaining difference is direction — which is the angle between them, which is the meaning difference. cosine similarity(a, b) = 0.999 ← near-identical meaning, correctly detected the direction = meaning intuition think of each vector as an arrow in 384-dimensional space. before normalization: → chunk a (short arrow, same direction) ────────→ chunk b (long arrow, same direction) after normalization: → chunk a (length 1.0) → chunk b (length 1.0) ← now identical both arrows point the same direction — same meaning. the only difference was scale, which we removed. now their similarity score is 0.999, correctly reflecting that they're both about event horizons. the faiss bonus indexflatip computes the inner product (dot product) of two vectors: inner_product(a, b) = a₁×b₁ + a₂×b₂ + ... + aₙ×bₙ when both vectors are normalized (length = 1.0), the inner product equals the cosine similarity exactly. so: normalize → use indexflatip → get cosine similarity no special \"cosine index\" needed, inner product is enough inner product is highly optimized in faiss (simd, gpu) → fast → next: code-example.md","words":400},{"path":"03-normalization/l2-normalization-math.md","title":"L2 Normalization — The Math","section":"3 · Normalization","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"l2-normalization-step-by-step\">L2 Normalization — Step by Step<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Divide each number in the vector by the vector's total length, so the new length becomes exactly 1.0.<\/div><\/div>\n<h2 id=\"the-formula\">The formula<\/h2>\n<p>Given a vector <strong>v<\/strong>, its L2 norm (length) is:<\/p>\n<pre><code>‖v‖ = √(v₁² + v₂² + v₃² + ... + vₙ²)<\/code><\/pre>\n<p>The normalized vector is:<\/p>\n<pre><code>v̂ = v / ‖v‖<\/code><\/pre>\n<p>Each element is divided by the total length.<\/p>\n<hr>\n<h2 id=\"worked-example\">Worked example<\/h2>\n<p><strong>Original vector:<\/strong><\/p>\n<pre><code>v = [1.0, 2.0, 3.0]<\/code><\/pre>\n<p><strong>Step 1 — Calculate the length:<\/strong><\/p>\n<pre><code>‖v‖ = √(1.0² + 2.0² + 3.0²)\n    = √(1.0 + 4.0 + 9.0)\n    = √14.0\n    ≈ 3.742<\/code><\/pre>\n<p><strong>Step 2 — Divide each element by the length:<\/strong><\/p>\n<pre><code>v̂ = [1.0/3.742,  2.0/3.742,  3.0/3.742]\n   = [0.267,      0.535,      0.802]<\/code><\/pre>\n<p><strong>Step 3 — Verify the new length is 1.0:<\/strong><\/p>\n<pre><code>‖v̂‖ = √(0.267² + 0.535² + 0.802²)\n     = √(0.071 + 0.286 + 0.643)\n     = √1.000\n     = 1.0  ✓<\/code><\/pre>\n<hr>\n<h2 id=\"what-changed-and-what-didnt\">What changed and what didn't<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Property<\/th><th>Before<\/th><th>After<\/th><\/tr><\/thead><tbody><tr><td>Values<\/td><td>[1.0, 2.0, 3.0]<\/td><td>[0.267, 0.535, 0.802]<\/td><\/tr><tr><td>Length<\/td><td>3.742<\/td><td>1.0<\/td><\/tr><tr><td>Direction<\/td><td>same<\/td><td>same ← this is what matters<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The <em>direction<\/em> of the vector — which encodes meaning — is unchanged. Only the <em>scale<\/em> is removed.<\/p>\n<hr>\n<h2 id=\"why-l2\">Why \"L2\"?<\/h2>\n<p>L2 refers to the <strong>L2 norm<\/strong> (also called Euclidean norm) — square root of the sum of squared elements. The \"2\" means we square each element.<\/p>\n<p>There's also an L1 norm (sum of absolute values) but L2 is standard for embeddings because it corresponds to the Euclidean distance most people intuitively understand.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"why-length-1.md\" href=\"#\">why-length-1.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-formula","text":"The formula"},{"level":2,"id":"worked-example","text":"Worked example"},{"level":2,"id":"what-changed-and-what-didnt","text":"What changed and what didn't"},{"level":2,"id":"why-l2","text":"Why \"L2\"?"}],"text":"l2 normalization — step by step 💡 tl;dr divide each number in the vector by the vector's total length, so the new length becomes exactly 1.0. the formula given a vector v , its l2 norm (length) is: ‖v‖ = √(v₁² + v₂² + v₃² + ... + vₙ²) the normalized vector is: v̂ = v / ‖v‖ each element is divided by the total length. worked example original vector: v = [1.0, 2.0, 3.0] step 1 — calculate the length: ‖v‖ = √(1.0² + 2.0² + 3.0²) = √(1.0 + 4.0 + 9.0) = √14.0 ≈ 3.742 step 2 — divide each element by the length: v̂ = [1.0/3.742, 2.0/3.742, 3.0/3.742] = [0.267, 0.535, 0.802] step 3 — verify the new length is 1.0: ‖v̂‖ = √(0.267² + 0.535² + 0.802²) = √(0.071 + 0.286 + 0.643) = √1.000 = 1.0 ✓ what changed and what didn't property before after values [1.0, 2.0, 3.0] [0.267, 0.535, 0.802] length 3.742 1.0 direction same same ← this is what matters the direction of the vector — which encodes meaning — is unchanged. only the scale is removed. why \"l2\"? l2 refers to the l2 norm (also called euclidean norm) — square root of the sum of squared elements. the \"2\" means we square each element. there's also an l1 norm (sum of absolute values) but l2 is standard for embeddings because it corresponds to the euclidean distance most people intuitively understand. → next: why-length-1.md","words":243},{"path":"03-normalization/code-example.md","title":"Normalization in Code","section":"3 · Normalization","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"normalization-in-code\">Normalization in Code<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Phase 1 normalizes in one line during encoding. FAISS is then set up to use inner product, which equals cosine similarity on normalized vectors.<\/div><\/div>\n<h2 id=\"where-it-happens\">Where it happens<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/embeddings.py<\/span>\n\n<span class=\"tok-keyword\">def<\/span> encode(<span class=\"tok-keyword\">self<\/span>, texts: <span class=\"tok-builtin\">list<\/span>[<span class=\"tok-builtin\">str<\/span>]) -&gt; <span class=\"tok-builtin\">np<\/span>.ndarray:\n    vectors = <span class=\"tok-keyword\">self<\/span>._model.encode(\n        texts,\n        normalize_embeddings=<span class=\"tok-keyword\">True<\/span>,   <span class=\"tok-comment\"># ← L2 normalization applied here<\/span>\n        convert_to_numpy=<span class=\"tok-keyword\">True<\/span>,\n        show_progress_bar=<span class=\"tok-keyword\">False<\/span>,\n    )\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">np<\/span>.asarray(vectors, dtype=<span class=\"tok-builtin\">np<\/span>.float32)<\/code><\/pre>\n<p><code>normalize_embeddings=True<\/code> is a flag from the <code>sentence-transformers<\/code> library. It runs the L2 normalization automatically after the model produces raw vectors.<\/p>\n<h2 id=\"and-in-faiss\">And in FAISS<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/faiss_store.py<\/span>\n\n<span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">faiss<\/span>\n\n<span class=\"tok-comment\"># IP = Inner Product (dot product)<\/span>\n<span class=\"tok-comment\"># Works as cosine similarity because vectors are normalized<\/span>\nindex = <span class=\"tok-builtin\">faiss<\/span>.IndexFlatIP(dim)<\/code><\/pre>\n<p>If normalization was skipped, you'd use <code>IndexFlatL2<\/code> (Euclidean distance) instead — but you'd lose the directional meaning comparison. <code>IndexFlatIP<\/code> on normalized vectors is the standard pattern for semantic search.<\/p>\n<h2 id=\"verify-it-yourself\">Verify it yourself<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n<span class=\"tok-keyword\">from<\/span> sentence_transformers <span class=\"tok-keyword\">import<\/span> SentenceTransformer\n\nmodel = SentenceTransformer(<span class=\"tok-string\">\"BAAI/bge-small-en-v1.5\"<\/span>)\nembeddings = model.encode([<span class=\"tok-string\">\"A black hole traps light at its event horizon\"<\/span>], normalize_embeddings=<span class=\"tok-keyword\">True<\/span>)\n\nlength = <span class=\"tok-builtin\">np<\/span>.linalg.norm(embeddings[<span class=\"tok-number\">0<\/span>])\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"Length: {length:.6f}\"<\/span>)\n<span class=\"tok-comment\"># → Length: 1.000000  ✓<\/span><\/code><\/pre>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../04-vector-similarity/README.md\" href=\"#\">04-vector-similarity/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-it-happens","text":"Where it happens"},{"level":2,"id":"and-in-faiss","text":"And in FAISS"},{"level":2,"id":"verify-it-yourself","text":"Verify it yourself"}],"text":"normalization in code 💡 tl;dr phase 1 normalizes in one line during encoding. faiss is then set up to use inner product, which equals cosine similarity on normalized vectors. where it happens # docsmind/index/embeddings.py def encode( self , texts: list [ str ]) -> np .ndarray: vectors = self ._model.encode( texts, normalize_embeddings= true , # ← l2 normalization applied here convert_to_numpy= true , show_progress_bar= false , ) return np .asarray(vectors, dtype= np .float32) normalize_embeddings=true is a flag from the sentence-transformers library. it runs the l2 normalization automatically after the model produces raw vectors. and in faiss # docsmind/index/faiss_store.py import faiss # ip = inner product (dot product) # works as cosine similarity because vectors are normalized index = faiss .indexflatip(dim) if normalization was skipped, you'd use indexflatl2 (euclidean distance) instead — but you'd lose the directional meaning comparison. indexflatip on normalized vectors is the standard pattern for semantic search. verify it yourself import numpy as np from sentence_transformers import sentencetransformer model = sentencetransformer( \"baai/bge-small-en-v1.5\" ) embeddings = model.encode([ \"a black hole traps light at its event horizon\" ], normalize_embeddings= true ) length = np .linalg.norm(embeddings[ 0 ]) print ( f\"length: {length:.6f}\" ) # → length: 1.000000 ✓ → back to: readme.md → next topic: 04-vector-similarity/readme.md","words":205},{"path":"04-vector-similarity/README.md","title":"Overview","section":"4 · Vector Similarity","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"04-vector-similarity\">04 — Vector Similarity<\/h1>\n<p><strong>The big idea:<\/strong> Once chunks and the query are both vectors, we need a formula to say how \"close\" they are. That formula is cosine similarity. The closer two vectors are in direction, the higher the score, the more relevant the chunk.<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"cosine-similarity.md\" href=\"#\">cosine-similarity.md<\/a><\/td><td>What cosine similarity is and how to compute it<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"similarity-scores.md\" href=\"#\">similarity-scores.md<\/a><\/td><td>How to read a score: 0.0 = different, 1.0 = identical<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"search-example.md\" href=\"#\">search-example.md<\/a><\/td><td>A real question → scores → top-k walkthrough<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: Why cosine similarity and not Euclidean distance?<\/strong> Cosine measures the <em>angle<\/em> between vectors — which represents the <em>direction<\/em> of meaning — and ignores magnitude (vector length). Euclidean distance measures straight-line distance and is affected by magnitude. For text, two sentences about the same topic should be considered similar regardless of their length. After L2 normalization (all vectors length 1.0), cosine similarity and inner product are equivalent, so FAISS's IndexFlatIP gives you cosine similarity for free.<\/p>\n<p><strong>Q: What is a \"good\" similarity score?<\/strong> It depends on the corpus and model. With bge-small on English technical docs, scores above ~0.75 are typically relevant hits. What matters more than the absolute score is the <em>relative ranking<\/em> — you return top-k by score, not by threshold. You tune k (and add a threshold as a filter if needed) based on observed quality.<\/p>\n<p><strong>Q: Exact vs approximate search — when does it matter?<\/strong> Exact search (what Phase 1 does — <code>IndexFlatIP<\/code>) compares the query to every vector and is guaranteed to find the true top-k. For 50 chunks it's instant. For 10 million chunks it's too slow. Approximate nearest neighbor (ANN) indexes like HNSW or IVF skip most vectors and return <em>near<\/em>-top-k results in milliseconds. You trade a small recall loss for massive speed gains. That's Phase 2 territory.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/retrieval/retriever.py<\/code> <code class=\"srcref\" title=\"source file in the repo\">docsmind/index/faiss_store.py<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../05-faiss/README.md\" href=\"#\">05-faiss/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"04 — vector similarity the big idea: once chunks and the query are both vectors, we need a formula to say how \"close\" they are. that formula is cosine similarity. the closer two vectors are in direction, the higher the score, the more relevant the chunk. files in this folder file what it covers cosine-similarity.md what cosine similarity is and how to compute it similarity-scores.md how to read a score: 0.0 = different, 1.0 = identical search-example.md a real question → scores → top-k walkthrough 🎯 interview q&a q: why cosine similarity and not euclidean distance? cosine measures the angle between vectors — which represents the direction of meaning — and ignores magnitude (vector length). euclidean distance measures straight-line distance and is affected by magnitude. for text, two sentences about the same topic should be considered similar regardless of their length. after l2 normalization (all vectors length 1.0), cosine similarity and inner product are equivalent, so faiss's indexflatip gives you cosine similarity for free. q: what is a \"good\" similarity score? it depends on the corpus and model. with bge-small on english technical docs, scores above ~0.75 are typically relevant hits. what matters more than the absolute score is the relative ranking — you return top-k by score, not by threshold. you tune k (and add a threshold as a filter if needed) based on observed quality. q: exact vs approximate search — when does it matter? exact search (what phase 1 does — indexflatip ) compares the query to every vector and is guaranteed to find the true top-k. for 50 chunks it's instant. for 10 million chunks it's too slow. approximate nearest neighbor (ann) indexes like hnsw or ivf skip most vectors and return near -top-k results in milliseconds. you trade a small recall loss for massive speed gains. that's phase 2 territory. code docsmind/retrieval/retriever.py docsmind/index/faiss_store.py → next: 05-faiss/readme.md","words":311},{"path":"04-vector-similarity/cosine-similarity.md","title":"Cosine Similarity","section":"4 · Vector Similarity","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"cosine-similarity\">Cosine Similarity<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"Cosine similarity — the angle between two unit vectors\"><line class=\"dg-line\" x1=\"360\" y1=\"150\" x2=\"360150\" y2=\"150\"/><line class=\"dg-line\" x1=\"360\" y1=\"150\" x2=\"360\" y2=\"0\"/><line class=\"dg-arrow\" x1=\"360\" y1=\"150\" x2=\"464.6162167924669\" y2=\"116.00813061875579\" stroke-width=\"3\"/><line class=\"dg-arrow\" x1=\"360\" y1=\"150\" x2=\"397.62221576582357\" y2=\"46.63381171355009\" stroke-width=\"3\"/><circle class=\"dg-hot\" cx=\"464.6162167924669\" cy=\"116.00813061875579\" r=\"5\"/><circle class=\"dg-hot\" cx=\"397.62221576582357\" cy=\"46.63381171355009\" r=\"5\"/><text class=\"dg-label\" x=\"478.6162167924669\" y=\"120.00813061875579\">query<\/text><text class=\"dg-label\" x=\"387.62221576582357\" y=\"36.63381171355009\">chunk<\/text><text class=\"dg-sub\" x=\"394\" y=\"130\">θ — small angle = similar<\/text><\/svg><figcaption>Cosine similarity — the angle between two unit vectors<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Cosine similarity measures the angle between two vectors. Small angle = similar meaning = high score (close to 1.0). Large angle = different meaning = low score (close to 0.0).<\/div><\/div>\n<h2 id=\"the-geometric-intuition\">The geometric intuition<\/h2>\n<p>Think of each vector as an arrow pointing in 384-dimensional space:<\/p>\n<pre><code>  HNSW chunk A  →\n  HNSW chunk B  →   (nearly same direction, small angle between them)\n  Kubernetes  ↓     (very different direction, large angle)<\/code><\/pre>\n<p>Cosine similarity measures how much two arrows point in the same direction. It doesn't care how long the arrows are (which is why normalization removes length — we already don't want it to matter).<\/p>\n<h2 id=\"the-formula\">The formula<\/h2>\n<p>For two vectors A and B:<\/p>\n<pre><code>cosine_similarity(A, B) = (A · B) / (‖A‖ × ‖B‖)<\/code><\/pre>\n<p>Where:<\/p>\n<ul><li><code>A · B<\/code> = dot product = A₁×B₁ + A₂×B₂ + ... + Aₙ×Bₙ<\/li><li><code>‖A‖<\/code> = length of A<\/li><li><code>‖B‖<\/code> = length of B<\/li><\/ul>\n<h2 id=\"worked-example-tiny-3-dim-vectors\">Worked example (tiny 3-dim vectors)<\/h2>\n<pre><code>A = [0.267, 0.535, 0.802]  (normalized, length = 1.0)\nB = [0.278, 0.511, 0.813]  (normalized, length = 1.0)\n\nDot product = (0.267×0.278) + (0.535×0.511) + (0.802×0.813)\n            = 0.074 + 0.273 + 0.652\n            = 0.999\n\ncosine_similarity = 0.999 / (1.0 × 1.0) = 0.999  ← very similar<\/code><\/pre>\n<p>Because both vectors are normalized (length = 1.0), the denominator is always 1.0 × 1.0 = 1.0. So cosine similarity simplifies to just the dot product:<\/p>\n<pre><code>cosine_similarity(A, B) = A · B     (when both are L2 normalized)<\/code><\/pre>\n<p>This is exactly what FAISS's <code>IndexFlatIP<\/code> (inner product) computes. Normalize → use IndexFlatIP → you get cosine similarity.<\/p>\n<h2 id=\"python\">Python<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\nA = <span class=\"tok-builtin\">np<\/span>.array([<span class=\"tok-number\">0.267<\/span>, <span class=\"tok-number\">0.535<\/span>, <span class=\"tok-number\">0.802<\/span>])\nB = <span class=\"tok-builtin\">np<\/span>.array([<span class=\"tok-number\">0.278<\/span>, <span class=\"tok-number\">0.511<\/span>, <span class=\"tok-number\">0.813<\/span>])\n\n<span class=\"tok-comment\"># Both are normalized, so dot product = cosine similarity<\/span>\nsimilarity = <span class=\"tok-builtin\">np<\/span>.dot(A, B)\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"Similarity: {similarity:.3f}\"<\/span>)  <span class=\"tok-comment\"># → 0.999<\/span><\/code><\/pre>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"similarity-scores.md\" href=\"#\">similarity-scores.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-geometric-intuition","text":"The geometric intuition"},{"level":2,"id":"the-formula","text":"The formula"},{"level":2,"id":"worked-example-tiny-3-dim-vectors","text":"Worked example (tiny 3-dim vectors)"},{"level":2,"id":"python","text":"Python"}],"text":"cosine similarity query chunk θ — small angle = similar cosine similarity — the angle between two unit vectors 💡 tl;dr cosine similarity measures the angle between two vectors. small angle = similar meaning = high score (close to 1.0). large angle = different meaning = low score (close to 0.0). the geometric intuition think of each vector as an arrow pointing in 384-dimensional space: hnsw chunk a → hnsw chunk b → (nearly same direction, small angle between them) kubernetes ↓ (very different direction, large angle) cosine similarity measures how much two arrows point in the same direction. it doesn't care how long the arrows are (which is why normalization removes length — we already don't want it to matter). the formula for two vectors a and b: cosine_similarity(a, b) = (a · b) / (‖a‖ × ‖b‖) where: a · b = dot product = a₁×b₁ + a₂×b₂ + ... + aₙ×bₙ ‖a‖ = length of a ‖b‖ = length of b worked example (tiny 3-dim vectors) a = [0.267, 0.535, 0.802] (normalized, length = 1.0) b = [0.278, 0.511, 0.813] (normalized, length = 1.0) dot product = (0.267×0.278) + (0.535×0.511) + (0.802×0.813) = 0.074 + 0.273 + 0.652 = 0.999 cosine_similarity = 0.999 / (1.0 × 1.0) = 0.999 ← very similar because both vectors are normalized (length = 1.0), the denominator is always 1.0 × 1.0 = 1.0. so cosine similarity simplifies to just the dot product: cosine_similarity(a, b) = a · b (when both are l2 normalized) this is exactly what faiss's indexflatip (inner product) computes. normalize → use indexflatip → you get cosine similarity. python import numpy as np a = np .array([ 0.267 , 0.535 , 0.802 ]) b = np .array([ 0.278 , 0.511 , 0.813 ]) # both are normalized, so dot product = cosine similarity similarity = np .dot(a, b) print ( f\"similarity: {similarity:.3f}\" ) # → 0.999 → next: similarity-scores.md","words":321},{"path":"04-vector-similarity/similarity-scores.md","title":"Reading Similarity Scores","section":"4 · Vector Similarity","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"similarity-scores-how-to-read-them\">Similarity Scores — How to Read Them<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Cosine similarity returns a number between -1.0 and 1.0. For normalized text embeddings you'll typically see 0.0 to 1.0 in practice.<\/div><\/div>\n<h2 id=\"score-ranges\">Score ranges<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Score<\/th><th>Meaning<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>0.95 – 1.0<\/td><td>Nearly identical<\/td><td>Same sentence paraphrased<\/td><\/tr><tr><td>0.80 – 0.95<\/td><td>Highly similar<\/td><td>Same topic, direct hit<\/td><\/tr><tr><td>0.60 – 0.80<\/td><td>Related<\/td><td>Same domain, connected aspect<\/td><\/tr><tr><td>0.40 – 0.60<\/td><td>Loosely related<\/td><td>Same broad area, different topic<\/td><\/tr><tr><td>0.0 – 0.40<\/td><td>Different<\/td><td>Unrelated topics<\/td><\/tr><\/tbody><\/table><\/div>\n<p>These ranges are rough guides — they shift based on the model and corpus. bge-small on this corpus puts direct hits above ~0.80 and clearly-related docs in the 0.60s.<\/p>\n<h2 id=\"what-phase-1-actually-returns\">What Phase 1 actually returns<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/schemas.py<\/span>\n<span class=\"tok-keyword\">class<\/span> SearchResult(BaseModel):\n    chunk: Chunk\n    score: <span class=\"tok-builtin\">float<\/span>   <span class=\"tok-comment\"># cosine similarity, 0.0 to 1.0<\/span><\/code><\/pre>\n<p><strong>Real output<\/strong> from the query <em>\"How do black holes form?\"<\/em> against the space corpus (these are the actual measured scores):<\/p>\n<pre><code>Results:\n  score=0.8141  source=black_holes.md       ← direct hit (retrieved)\n  score=0.6333  source=stellar_lifecycle.md ← genuinely related (retrieved)\n  score=0.5691  source=solar_system.md      ← same domain, off-topic (retrieved)\n  score=0.5240  source=rocket_propulsion.md ← same domain, off-topic (retrieved)\n  score=0.5140  source=the_iss.md           ← 5th place, not in top-4<\/code><\/pre>\n<p><code>black_holes.md<\/code> is the clear winner at 0.81. <code>stellar_lifecycle.md<\/code> at 0.63 is <em>correctly<\/em> second — massive stars collapse into black holes, so it's truly related. The rest are space-domain but off-topic, clustered lower.<\/p>\n<h2 id=\"we-rank-we-dont-threshold\">We rank, we don't threshold<\/h2>\n<p>Phase 1 returns the <strong>top-k by score<\/strong> (k=4 here), not everything above a threshold. Notice that <code>solar_system.md<\/code> (0.57) and <code>rocket_propulsion.md<\/code> (0.52) get retrieved even though they don't really answer the question — they're just the next-highest scores. That's why the <code>INSUFFICIENT_CONTEXT<\/code> guardrail (in the LLM prompt) matters: the model is told to ignore passages that don't actually help, and to flag when none of them do.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"search-example.md\" href=\"#\">search-example.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"score-ranges","text":"Score ranges"},{"level":2,"id":"what-phase-1-actually-returns","text":"What Phase 1 actually returns"},{"level":2,"id":"we-rank-we-dont-threshold","text":"We rank, we don't threshold"}],"text":"similarity scores — how to read them 💡 tl;dr cosine similarity returns a number between -1.0 and 1.0. for normalized text embeddings you'll typically see 0.0 to 1.0 in practice. score ranges score meaning example 0.95 – 1.0 nearly identical same sentence paraphrased 0.80 – 0.95 highly similar same topic, direct hit 0.60 – 0.80 related same domain, connected aspect 0.40 – 0.60 loosely related same broad area, different topic 0.0 – 0.40 different unrelated topics these ranges are rough guides — they shift based on the model and corpus. bge-small on this corpus puts direct hits above ~0.80 and clearly-related docs in the 0.60s. what phase 1 actually returns # docsmind/schemas.py class searchresult(basemodel): chunk: chunk score: float # cosine similarity, 0.0 to 1.0 real output from the query \"how do black holes form?\" against the space corpus (these are the actual measured scores): results: score=0.8141 source=black_holes.md ← direct hit (retrieved) score=0.6333 source=stellar_lifecycle.md ← genuinely related (retrieved) score=0.5691 source=solar_system.md ← same domain, off-topic (retrieved) score=0.5240 source=rocket_propulsion.md ← same domain, off-topic (retrieved) score=0.5140 source=the_iss.md ← 5th place, not in top-4 black_holes.md is the clear winner at 0.81. stellar_lifecycle.md at 0.63 is correctly second — massive stars collapse into black holes, so it's truly related. the rest are space-domain but off-topic, clustered lower. we rank, we don't threshold phase 1 returns the top-k by score (k=4 here), not everything above a threshold. notice that solar_system.md (0.57) and rocket_propulsion.md (0.52) get retrieved even though they don't really answer the question — they're just the next-highest scores. that's why the insufficient_context guardrail (in the llm prompt) matters: the model is told to ignore passages that don't actually help, and to flag when none of them do. → next: search-example.md","words":285},{"path":"04-vector-similarity/search-example.md","title":"Search Example — Question to Top-k","section":"4 · Vector Similarity","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"search-example-question-to-top-k\">Search Example — Question to Top-k<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A full walkthrough of one query through the retrieval layer — from raw question text to ranked chunks with scores.<\/div><\/div>\n<h2 id=\"setup\">Setup<\/h2>\n<p>We have 5 space documents, each one chunk, all stored in FAISS.<\/p>\n<p><strong>Question:<\/strong> <em>\"How do black holes form?\"<\/em><\/p>\n<hr>\n<h2 id=\"step-1-embed-the-question\">Step 1: Embed the question<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/retrieval/retriever.py<\/span>\n\nquery_vec = <span class=\"tok-keyword\">self<\/span>._embedder.encode([<span class=\"tok-string\">\"How do black holes form?\"<\/span>])[<span class=\"tok-number\">0<\/span>]\n<span class=\"tok-comment\"># query_vec shape: (384,)<\/span>\n<span class=\"tok-comment\"># query_vec is normalized (length = 1.0)<\/span><\/code><\/pre>\n<p>The same <code>bge-small-en-v1.5<\/code> model that encoded the chunks encodes the question. Same model → same vector space → comparable vectors.<\/p>\n<hr>\n<h2 id=\"step-2-faiss-searches-all-vectors\">Step 2: FAISS searches all vectors<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/faiss_store.py<\/span>\n\nscores, indices = <span class=\"tok-keyword\">self<\/span>._index.search(query_vec.reshape(<span class=\"tok-number\">1<\/span>, -<span class=\"tok-number\">1<\/span>), top_k=<span class=\"tok-number\">4<\/span>)<\/code><\/pre>\n<p>FAISS computes the inner product (= cosine similarity) between the question vector and all stored chunk vectors. Returns the 4 highest scores with their positions (indices) in the stored array.<\/p>\n<pre><code>Internal FAISS result (real measured values):\n  indices = [0, 4, 1, 2]                  # positions in the stored array\n  scores  = [0.8141, 0.6333, 0.5691, 0.5240]<\/code><\/pre>\n<hr>\n<h2 id=\"step-3-look-up-the-chunks-at-those-positions\">Step 3: Look up the chunks at those positions<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">for<\/span> score, idx <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">zip<\/span>(scores[<span class=\"tok-number\">0<\/span>], indices[<span class=\"tok-number\">0<\/span>]):\n    chunk = <span class=\"tok-keyword\">self<\/span>._chunks[idx]\n    results.append(SearchResult(chunk=chunk, score=<span class=\"tok-builtin\">float<\/span>(score)))<\/code><\/pre>\n<pre><code>SearchResult #1  score=0.8141\n  source: black_holes.md\n  text: \"A black hole is a region of spacetime where gravity is so strong that\n         nothing — not even light — can escape... Stellar-mass black holes form\n         when a massive star collapses in a supernova...\"\n\nSearchResult #2  score=0.6333\n  source: stellar_lifecycle.md\n  text: \"A star much more massive than the Sun... collapses and rebounds in a\n         supernova. The most massive cores collapse completely into a black\n         hole...\"\n\nSearchResult #3  score=0.5691\n  source: solar_system.md\n  text: \"The Sun is a main-sequence star that fuses hydrogen into helium...\n         the gravitational anchor of the entire system...\"\n\nSearchResult #4  score=0.5240\n  source: rocket_propulsion.md\n  text: \"To leave Earth's gravity entirely, a spacecraft must reach escape\n         velocity, about 11.2 kilometers per second...\"<\/code><\/pre>\n<p>Notice the pattern: <code>black_holes.md<\/code> is the strong hit (0.81), <code>stellar_lifecycle.md<\/code> is genuinely related (0.63 — massive stars collapse into black holes), and the last two are space-domain but off-topic, retrieved only because they're the next-highest scores.<\/p>\n<hr>\n<h2 id=\"step-4-hand-off-to-the-pipeline\">Step 4: Hand off to the pipeline<\/h2>\n<p>These 4 chunks (with their sources and scores) go to <code>RAGPipeline.query()<\/code>, which:<\/p>\n<ol><li>Formats them as numbered context passages <code>[1]<\/code>, <code>[2]<\/code>, <code>[3]<\/code>, <code>[4]<\/code><\/li><li>Sends them + the question to the LLM<\/li><li>The LLM answers using only relevant passages and cites by number<\/li><li>The pipeline extracts citations and maps <code>[n]<\/code> back to <code>source<\/code> filenames<\/li><\/ol>\n<p>(In the real run, the model cited <code>[1]<\/code>, <code>[2]<\/code>, and <code>[3]<\/code> and ignored <code>[4]<\/code>.)<\/p>\n<hr>\n<h2 id=\"the-speed\">The speed<\/h2>\n<p>For a handful of chunks: FAISS finishes in &lt; 1 millisecond. For 1 million chunks with a Flat index: ~100ms (linear scan). For 1 million chunks with HNSW: ~1ms (approximate, graph traversal).<\/p>\n<p>That's why Phase 2 adds approximate indexes — they matter at scale.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong> → Next topic: <strong><a class=\"mdlink\" data-href=\"../05-faiss/README.md\" href=\"#\">05-faiss/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"setup","text":"Setup"},{"level":2,"id":"step-1-embed-the-question","text":"Step 1: Embed the question"},{"level":2,"id":"step-2-faiss-searches-all-vectors","text":"Step 2: FAISS searches all vectors"},{"level":2,"id":"step-3-look-up-the-chunks-at-those-positions","text":"Step 3: Look up the chunks at those positions"},{"level":2,"id":"step-4-hand-off-to-the-pipeline","text":"Step 4: Hand off to the pipeline"},{"level":2,"id":"the-speed","text":"The speed"}],"text":"search example — question to top-k 💡 tl;dr a full walkthrough of one query through the retrieval layer — from raw question text to ranked chunks with scores. setup we have 5 space documents, each one chunk, all stored in faiss. question: \"how do black holes form?\" step 1: embed the question # docsmind/retrieval/retriever.py query_vec = self ._embedder.encode([ \"how do black holes form?\" ])[ 0 ] # query_vec shape: (384,) # query_vec is normalized (length = 1.0) the same bge-small-en-v1.5 model that encoded the chunks encodes the question. same model → same vector space → comparable vectors. step 2: faiss searches all vectors # docsmind/index/faiss_store.py scores, indices = self ._index.search(query_vec.reshape( 1 , - 1 ), top_k= 4 ) faiss computes the inner product (= cosine similarity) between the question vector and all stored chunk vectors. returns the 4 highest scores with their positions (indices) in the stored array. internal faiss result (real measured values): indices = [0, 4, 1, 2] # positions in the stored array scores = [0.8141, 0.6333, 0.5691, 0.5240] step 3: look up the chunks at those positions for score, idx in zip (scores[ 0 ], indices[ 0 ]): chunk = self ._chunks[idx] results.append(searchresult(chunk=chunk, score= float (score))) searchresult #1 score=0.8141 source: black_holes.md text: \"a black hole is a region of spacetime where gravity is so strong that nothing — not even light — can escape... stellar-mass black holes form when a massive star collapses in a supernova...\" searchresult #2 score=0.6333 source: stellar_lifecycle.md text: \"a star much more massive than the sun... collapses and rebounds in a supernova. the most massive cores collapse completely into a black hole...\" searchresult #3 score=0.5691 source: solar_system.md text: \"the sun is a main-sequence star that fuses hydrogen into helium... the gravitational anchor of the entire system...\" searchresult #4 score=0.5240 source: rocket_propulsion.md text: \"to leave earth's gravity entirely, a spacecraft must reach escape velocity, about 11.2 kilometers per second...\" notice the pattern: black_holes.md is the strong hit (0.81), stellar_lifecycle.md is genuinely related (0.63 — massive stars collapse into black holes), and the last two are space-domain but off-topic, retrieved only because they're the next-highest scores. step 4: hand off to the pipeline these 4 chunks (with their sources and scores) go to ragpipeline.query() , which: formats them as numbered context passages [1] , [2] , [3] , [4] sends them + the question to the llm the llm answers using only relevant passages and cites by number the pipeline extracts citations and maps [n] back to source filenames (in the real run, the model cited [1] , [2] , and [3] and ignored [4] .) the speed for a handful of chunks: faiss finishes in < 1 millisecond. for 1 million chunks with a flat index: ~100ms (linear scan). for 1 million chunks with hnsw: ~1ms (approximate, graph traversal). that's why phase 2 adds approximate indexes — they matter at scale. → back to: readme.md → next topic: 05-faiss/readme.md","words":486},{"path":"05-faiss/README.md","title":"Overview","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"05-faiss\">05 — FAISS<\/h1>\n<p><strong>The big idea:<\/strong> FAISS is a library that stores vectors and lets you find the most similar ones to a query vector — fast. Think of it as a database optimized for \"find me the nearest neighbors\" rather than \"find me the row where id=42.\"<\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"problem-slow-search.md\" href=\"#\">problem-slow-search.md<\/a><\/td><td>Why brute-force similarity search doesn't scale<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"indexflatip-explained.md\" href=\"#\">indexflatip-explained.md<\/a><\/td><td>Phase 1's index — what it does, why it's the right choice for now<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"how-search-works.md\" href=\"#\">how-search-works.md<\/a><\/td><td>Step-by-step: from query vector to top-k results<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"phase1-vs-phase2.md\" href=\"#\">phase1-vs-phase2.md<\/a><\/td><td>Flat vs IVF vs HNSW vs PQ — the full tradeoff table<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"benchmark-results.md\" href=\"#\">benchmark-results.md<\/a><\/td><td>Phase 2: real measured recall@k, latency &amp; memory for all four<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"code-walkthrough.md\" href=\"#\">code-walkthrough.md<\/a><\/td><td>The actual Phase 1 code explained line by line<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: FAISS vs Pinecone / Weaviate / Qdrant — why use FAISS?<\/strong> FAISS is a library (C++ with Python bindings), not a service. It runs in your process, in memory, no network hop. Pinecone/Weaviate are managed cloud vector DBs — you send data to them over HTTP. For Phase 1 (self-hosted, small corpus, portfolio project): FAISS is simpler, faster, free, and private. For production at scale you'd add Qdrant (open-source, self-hosted DB with a proper query API, filtering, and persistence). That's Phase 2. The <code>VectorStore<\/code> interface in Phase 1 means swapping is a config change.<\/p>\n<p><strong>Q: Why IndexFlatIP in Phase 1 and not HNSW?<\/strong> Flat does an exact search — compares query to every vector. For 50 chunks it returns in &lt; 1ms and recall is 100%. HNSW is an approximate algorithm — it traverses a graph and skips most vectors. Faster at scale, but adds complexity (graph construction time, parameter tuning, approximate results). Phase 1 prioritizes correctness and simplicity. At 50–10,000 vectors, Flat is the right choice.<\/p>\n<p><strong>Q: What is recall@k?<\/strong> If there are 10 truly relevant chunks in the corpus and your retriever returns k=10 results that contain 8 of them, your recall@10 is 8/10 = 80%. It measures how many relevant results you found, not just whether the top result was good. Approximate indexes like HNSW sacrifice a bit of recall for speed — HNSW on a well-tuned corpus typically achieves 95%+ recall@10.<\/p>\n<p><strong>Q: What does FAISS NOT do?<\/strong> FAISS doesn't store your chunk text, metadata, or sources. It only stores and searches vectors (numbers). That's why <code>FaissVectorStore<\/code> keeps a separate <code>self._chunks<\/code> list that maps each vector index position to its chunk object. You search FAISS for indices, then look up the actual text yourself.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/index/faiss_store.py<\/code> <code class=\"srcref\" title=\"source file in the repo\">docsmind/index/base.py<\/code><\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../06-generation/README.md\" href=\"#\">06-generation/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"05 — faiss the big idea: faiss is a library that stores vectors and lets you find the most similar ones to a query vector — fast. think of it as a database optimized for \"find me the nearest neighbors\" rather than \"find me the row where id=42.\" files in this folder file what it covers problem-slow-search.md why brute-force similarity search doesn't scale indexflatip-explained.md phase 1's index — what it does, why it's the right choice for now how-search-works.md step-by-step: from query vector to top-k results phase1-vs-phase2.md flat vs ivf vs hnsw vs pq — the full tradeoff table benchmark-results.md phase 2: real measured recall@k, latency & memory for all four code-walkthrough.md the actual phase 1 code explained line by line 🎯 interview q&a q: faiss vs pinecone / weaviate / qdrant — why use faiss? faiss is a library (c++ with python bindings), not a service. it runs in your process, in memory, no network hop. pinecone/weaviate are managed cloud vector dbs — you send data to them over http. for phase 1 (self-hosted, small corpus, portfolio project): faiss is simpler, faster, free, and private. for production at scale you'd add qdrant (open-source, self-hosted db with a proper query api, filtering, and persistence). that's phase 2. the vectorstore interface in phase 1 means swapping is a config change. q: why indexflatip in phase 1 and not hnsw? flat does an exact search — compares query to every vector. for 50 chunks it returns in < 1ms and recall is 100%. hnsw is an approximate algorithm — it traverses a graph and skips most vectors. faster at scale, but adds complexity (graph construction time, parameter tuning, approximate results). phase 1 prioritizes correctness and simplicity. at 50–10,000 vectors, flat is the right choice. q: what is recall@k? if there are 10 truly relevant chunks in the corpus and your retriever returns k=10 results that contain 8 of them, your recall@10 is 8/10 = 80%. it measures how many relevant results you found, not just whether the top result was good. approximate indexes like hnsw sacrifice a bit of recall for speed — hnsw on a well-tuned corpus typically achieves 95%+ recall@10. q: what does faiss not do? faiss doesn't store your chunk text, metadata, or sources. it only stores and searches vectors (numbers). that's why faissvectorstore keeps a separate self._chunks list that maps each vector index position to its chunk object. you search faiss for indices, then look up the actual text yourself. code docsmind/index/faiss_store.py docsmind/index/base.py → next: 06-generation/readme.md","words":418},{"path":"05-faiss/problem-slow-search.md","title":"The Problem: Brute-Force Doesn't Scale","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"the-problem-brute-force-search-doesnt-scale\">The Problem: Brute-Force Search Doesn't Scale<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> For a small corpus, comparing the query to every vector is fine. For millions of vectors it becomes too slow. FAISS solves this.<\/div><\/div>\n<h2 id=\"the-naive-approach\">The naive approach<\/h2>\n<p>You have 50 chunks, each a 384-dimensional vector. A question comes in.<\/p>\n<pre><code>Step 1: Embed the question → 384 numbers\nStep 2: Compare to chunk 1  → compute similarity score\nStep 3: Compare to chunk 2  → compute similarity score\n...\nStep 51: Compare to chunk 50 → compute similarity score\nStep 52: Sort all 50 scores\nStep 53: Return top-4<\/code><\/pre>\n<p>Total comparisons: <strong>50<\/strong>. Time: <strong>&lt; 1ms<\/strong>. No problem.<\/p>\n<h2 id=\"why-this-breaks-at-scale\">Why this breaks at scale<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Corpus size<\/th><th>Comparisons per query<\/th><th>Approx time (CPU)<\/th><\/tr><\/thead><tbody><tr><td>50 chunks (Phase 1)<\/td><td>50<\/td><td>&lt; 1ms<\/td><\/tr><tr><td>100,000 chunks<\/td><td>100,000<\/td><td>~10ms<\/td><\/tr><tr><td>1,000,000 chunks<\/td><td>1,000,000<\/td><td>~100ms<\/td><\/tr><tr><td>1,000,000,000 chunks<\/td><td>1 billion<\/td><td>~100 seconds<\/td><\/tr><\/tbody><\/table><\/div>\n<p>At millions of vectors, even with highly optimized C++ code, brute-force becomes too slow for real-time queries. You need indexes that let you <strong>skip most vectors<\/strong> and only look at the promising ones.<\/p>\n<h2 id=\"what-faiss-provides\">What FAISS provides<\/h2>\n<p>FAISS is a library of index structures that organize vectors so you can:<\/p>\n<ol><li><strong>Exact search<\/strong> (<code>IndexFlatIP<\/code>) — compare to everything, 100% recall.<\/li><\/ol>\n<p>Right for small corpora.<\/p>\n<ol><li><strong>Approximate search<\/strong> (<code>IndexIVF<\/code>, <code>IndexHNSW<\/code>) — skip most vectors,<\/li><\/ol>\n<p>very fast, ~95–99% recall at scale. Right for large corpora.<\/p>\n<ol><li><strong>Compressed search<\/strong> (<code>IndexPQ<\/code>, <code>IndexIVFPQ<\/code>) — compress vectors to<\/li><\/ol>\n<p>save memory, trade some recall. Right for billion-scale.<\/p>\n<p>Phase 1 uses <strong>#1<\/strong> because the corpus is small. Phase 2 benchmarks <strong>#2 and #3<\/strong>.<\/p>\n<h2 id=\"the-trade-off-at-the-core-of-all-this\">The trade-off at the core of all this<\/h2>\n<pre><code>Exact  → 100% recall, slower as scale grows\nApprox → ~95-99% recall, fast even at millions of vectors<\/code><\/pre>\n<p>For most RAG applications, losing 1–5% of relevant results is acceptable if it means 100× faster queries.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"indexflatip-explained.md\" href=\"#\">indexflatip-explained.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-naive-approach","text":"The naive approach"},{"level":2,"id":"why-this-breaks-at-scale","text":"Why this breaks at scale"},{"level":2,"id":"what-faiss-provides","text":"What FAISS provides"},{"level":2,"id":"the-trade-off-at-the-core-of-all-this","text":"The trade-off at the core of all this"}],"text":"the problem: brute-force search doesn't scale 💡 tl;dr for a small corpus, comparing the query to every vector is fine. for millions of vectors it becomes too slow. faiss solves this. the naive approach you have 50 chunks, each a 384-dimensional vector. a question comes in. step 1: embed the question → 384 numbers step 2: compare to chunk 1 → compute similarity score step 3: compare to chunk 2 → compute similarity score ... step 51: compare to chunk 50 → compute similarity score step 52: sort all 50 scores step 53: return top-4 total comparisons: 50 . time: < 1ms . no problem. why this breaks at scale corpus size comparisons per query approx time (cpu) 50 chunks (phase 1) 50 < 1ms 100,000 chunks 100,000 ~10ms 1,000,000 chunks 1,000,000 ~100ms 1,000,000,000 chunks 1 billion ~100 seconds at millions of vectors, even with highly optimized c++ code, brute-force becomes too slow for real-time queries. you need indexes that let you skip most vectors and only look at the promising ones. what faiss provides faiss is a library of index structures that organize vectors so you can: exact search ( indexflatip ) — compare to everything, 100% recall. right for small corpora. approximate search ( indexivf , indexhnsw ) — skip most vectors, very fast, ~95–99% recall at scale. right for large corpora. compressed search ( indexpq , indexivfpq ) — compress vectors to save memory, trade some recall. right for billion-scale. phase 1 uses #1 because the corpus is small. phase 2 benchmarks #2 and #3 . the trade-off at the core of all this exact → 100% recall, slower as scale grows approx → ~95-99% recall, fast even at millions of vectors for most rag applications, losing 1–5% of relevant results is acceptable if it means 100× faster queries. → next: indexflatip-explained.md","words":305},{"path":"05-faiss/indexflatip-explained.md","title":"IndexFlatIP — Phase 1's Index","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"indexflatip-phase-1s-index\">IndexFlatIP — Phase 1's Index<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <code>IndexFlatIP<\/code> stores all vectors in a flat array and computes the inner product (dot product) between the query and every stored vector. With L2-normalized vectors, this equals cosine similarity. Exact, simple, fast enough for small corpora.<\/div><\/div>\n<h2 id=\"what-flat-means\">What \"Flat\" means<\/h2>\n<p>No structure, no organization. Every vector is stored sequentially:<\/p>\n<pre><code>Index (flat):\n  Position 0:  [0.267, 0.535, 0.802, ...]   ← Chunk 0 vector\n  Position 1:  [0.278, 0.511, 0.813, ...]   ← Chunk 1 vector\n  Position 2:  [-0.031, 0.089, 0.047, ...]  ← Chunk 2 vector\n  ...\n  Position 49: [0.123, -0.456, 0.789, ...]  ← Chunk 49 vector<\/code><\/pre>\n<p>A search goes: compare query to position 0, position 1, ..., position 49. Sort. Return top-k. That's it.<\/p>\n<h2 id=\"what-ip-means\">What \"IP\" means<\/h2>\n<p>IP = <strong>Inner Product<\/strong> = dot product.<\/p>\n<pre><code>inner_product(query, chunk_0) = q₁×c₁ + q₂×c₂ + ... + q₃₈₄×c₃₈₄<\/code><\/pre>\n<p>Because all vectors are L2-normalized (length = 1.0), this equals cosine similarity. See <a class=\"mdlink\" data-href=\"../03-normalization/\" href=\"#\">03-normalization<\/a> for the math.<\/p>\n<h2 id=\"creating-and-using-it\">Creating and using it<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">faiss<\/span>\n\ndim = <span class=\"tok-number\">384<\/span>  <span class=\"tok-comment\"># bge-small output dimension<\/span>\n\n<span class=\"tok-comment\"># Create the index<\/span>\nindex = <span class=\"tok-builtin\">faiss<\/span>.IndexFlatIP(dim)\n\n<span class=\"tok-comment\"># Add chunk vectors (shape: N × 384, float32)<\/span>\nindex.add(chunk_vectors)  <span class=\"tok-comment\"># stored in memory<\/span>\n\n<span class=\"tok-comment\"># Search<\/span>\nscores, indices = index.search(query_vector, k=<span class=\"tok-number\">4<\/span>)\n<span class=\"tok-comment\"># scores:  [[0.891, 0.874, 0.856, 0.841]]  (inner products = cosine similarities)<\/span>\n<span class=\"tok-comment\"># indices: [[12, 3, 8, 15]]                 (positions in the flat array)<\/span><\/code><\/pre>\n<h2 id=\"properties\">Properties<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Property<\/th><th>Value<\/th><\/tr><\/thead><tbody><tr><td>Recall<\/td><td>100% — exact, never misses a true top-k result<\/td><\/tr><tr><td>Search time<\/td><td>O(N) — linear in number of vectors<\/td><\/tr><tr><td>Index build time<\/td><td>Instant — just copy vectors into the array<\/td><\/tr><tr><td>Memory<\/td><td>N × dim × 4 bytes (float32). 50 chunks × 384 × 4 = ~75 KB<\/td><\/tr><tr><td>Training required<\/td><td>No<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"why-its-right-for-phase-1\">Why it's right for Phase 1<\/h2>\n<p>50 chunks × &lt; 1ms search time = the exact index is the simplest, most correct choice. There's no reason to add the complexity of IVF or HNSW for a corpus this small. Phase 1 is about getting the pipeline right; Phase 2 is about making it scale.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"how-search-works.md\" href=\"#\">how-search-works.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-flat-means","text":"What \"Flat\" means"},{"level":2,"id":"what-ip-means","text":"What \"IP\" means"},{"level":2,"id":"creating-and-using-it","text":"Creating and using it"},{"level":2,"id":"properties","text":"Properties"},{"level":2,"id":"why-its-right-for-phase-1","text":"Why it's right for Phase 1"}],"text":"indexflatip — phase 1's index 💡 tl;dr indexflatip stores all vectors in a flat array and computes the inner product (dot product) between the query and every stored vector. with l2-normalized vectors, this equals cosine similarity. exact, simple, fast enough for small corpora. what \"flat\" means no structure, no organization. every vector is stored sequentially: index (flat): position 0: [0.267, 0.535, 0.802, ...] ← chunk 0 vector position 1: [0.278, 0.511, 0.813, ...] ← chunk 1 vector position 2: [-0.031, 0.089, 0.047, ...] ← chunk 2 vector ... position 49: [0.123, -0.456, 0.789, ...] ← chunk 49 vector a search goes: compare query to position 0, position 1, ..., position 49. sort. return top-k. that's it. what \"ip\" means ip = inner product = dot product. inner_product(query, chunk_0) = q₁×c₁ + q₂×c₂ + ... + q₃₈₄×c₃₈₄ because all vectors are l2-normalized (length = 1.0), this equals cosine similarity. see 03-normalization for the math. creating and using it import faiss dim = 384 # bge-small output dimension # create the index index = faiss .indexflatip(dim) # add chunk vectors (shape: n × 384, float32) index.add(chunk_vectors) # stored in memory # search scores, indices = index.search(query_vector, k= 4 ) # scores: [[0.891, 0.874, 0.856, 0.841]] (inner products = cosine similarities) # indices: [[12, 3, 8, 15]] (positions in the flat array) properties property value recall 100% — exact, never misses a true top-k result search time o(n) — linear in number of vectors index build time instant — just copy vectors into the array memory n × dim × 4 bytes (float32). 50 chunks × 384 × 4 = ~75 kb training required no why it's right for phase 1 50 chunks × < 1ms search time = the exact index is the simplest, most correct choice. there's no reason to add the complexity of ivf or hnsw for a corpus this small. phase 1 is about getting the pipeline right; phase 2 is about making it scale. → next: how-search-works.md","words":329},{"path":"05-faiss/how-search-works.md","title":"How FAISS Search Works","section":"5 · FAISS","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"how-faiss-search-works-step-by-step\">How FAISS Search Works — Step by Step<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You hand FAISS a query vector and k. It returns the k most similar vectors (by inner product) and their positions. You use positions to look up the actual chunk text.<\/div><\/div>\n<h2 id=\"the-full-search-flow\">The full search flow<\/h2>\n<pre><code>1. RAGPipeline.query(\"How do black holes form?\")\n       ↓\n2. Retriever.retrieve(question, top_k=4)\n       ↓\n3. Embedder.encode([\"How do black holes form?\"]) → query_vec (384 floats)\n       ↓\n4. FaissVectorStore.search(query_vec, top_k=4)\n       ↓\n5. faiss.IndexFlatIP.search(query_vec.reshape(1,-1), k=4)\n       → scores  = [[0.8141, 0.6333, 0.5691, 0.5240]]\n       → indices = [[0,      4,      1,      2     ]]\n       ↓\n6. Look up self._chunks[0], self._chunks[4], self._chunks[1], self._chunks[2]\n       ↓\n7. Return [SearchResult(chunk=..., score=0.8141), ...]<\/code><\/pre>\n<h2 id=\"faiss-only-knows-positions\">FAISS only knows positions<\/h2>\n<p>FAISS stores vectors, not text. When it returns <code>indices = [12, 3, 8, 15]<\/code>, those are positions in the flat array. The <code>FaissVectorStore<\/code> class maintains a parallel list <code>self._chunks<\/code> that maps position → chunk object:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># docsmind/index/faiss_store.py<\/span>\n\n<span class=\"tok-keyword\">def<\/span> add(<span class=\"tok-keyword\">self<\/span>, chunks: <span class=\"tok-builtin\">list<\/span>[Chunk], embeddings: <span class=\"tok-builtin\">np<\/span>.ndarray) -&gt; <span class=\"tok-keyword\">None<\/span>:\n    <span class=\"tok-keyword\">self<\/span>._index.add(embeddings)   <span class=\"tok-comment\"># FAISS stores vectors<\/span>\n    <span class=\"tok-keyword\">self<\/span>._chunks.extend(chunks)   <span class=\"tok-comment\"># we store chunks, in the same order<\/span>\n\n<span class=\"tok-keyword\">def<\/span> search(<span class=\"tok-keyword\">self<\/span>, query_embedding, top_k):\n    scores, indices = <span class=\"tok-keyword\">self<\/span>._index.search(query, top_k)\n    <span class=\"tok-keyword\">return<\/span> [\n        SearchResult(chunk=<span class=\"tok-keyword\">self<\/span>._chunks[idx], score=<span class=\"tok-builtin\">float<\/span>(score))\n        <span class=\"tok-keyword\">for<\/span> score, idx <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">zip<\/span>(scores[<span class=\"tok-number\">0<\/span>], indices[<span class=\"tok-number\">0<\/span>])\n        <span class=\"tok-keyword\">if<\/span> idx &gt;= <span class=\"tok-number\">0<\/span>  <span class=\"tok-comment\"># FAISS pads with -1 if fewer than top_k results exist<\/span>\n    ]<\/code><\/pre>\n<p>The <code>idx &gt;= 0<\/code> guard handles the edge case where the index has fewer than <code>top_k<\/code> vectors — FAISS pads missing results with index <code>-1<\/code>.<\/p>\n<h2 id=\"persistence\">Persistence<\/h2>\n<p>After building the index, it's saved to disk so it doesn't need to be rebuilt on every server restart:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>, path):\n    <span class=\"tok-builtin\">faiss<\/span>.write_index(<span class=\"tok-keyword\">self<\/span>._index, <span class=\"tok-builtin\">str<\/span>(path / <span class=\"tok-string\">\"index.faiss\"<\/span>))  <span class=\"tok-comment\"># binary<\/span>\n    json.dump({<span class=\"tok-string\">\"chunks\"<\/span>: [...], <span class=\"tok-string\">\"dim\"<\/span>: <span class=\"tok-number\">384<\/span>, ...}, <span class=\"tok-builtin\">open<\/span>(path / <span class=\"tok-string\">\"meta.json\"<\/span>))\n\n<span class=\"tok-decorator\">@classmethod<\/span>\n<span class=\"tok-keyword\">def<\/span> load(cls, path):\n    store = cls.__new__(cls)\n    store._index = <span class=\"tok-builtin\">faiss<\/span>.read_index(<span class=\"tok-builtin\">str<\/span>(path / <span class=\"tok-string\">\"index.faiss\"<\/span>))\n    meta = json.load(<span class=\"tok-builtin\">open<\/span>(path / <span class=\"tok-string\">\"meta.json\"<\/span>))\n    store._chunks = [Chunk(**c) <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> meta[<span class=\"tok-string\">\"chunks\"<\/span>]]\n    <span class=\"tok-keyword\">return<\/span> store<\/code><\/pre>\n<p><code>make ingest<\/code> writes the index. <code>make serve<\/code> loads it. The loaded index is kept in memory for the lifetime of the Fa
